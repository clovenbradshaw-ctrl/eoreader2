<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EO Reader</title>
<script src="https://unpkg.com/compromise"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #22223a;
  --text: #b8b8cc;
  --dim: #555570;
  --bright: #e8e8f0;
  --accent: #6fa3f7;
  --green: #5ce0a0;
  --amber: #f0c060;
  --red: #e86070;
  --violet: #a07cf0;
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Brygada 1918', Georgia, serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

body {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  margin-bottom: 20px;
}

h1 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: var(--bright);
  letter-spacing: -0.03em;
}

h1 span { color: var(--dim); font-weight: 400; font-size: 14px; margin-left: 8px; }

.input-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.input-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 4px;
  outline: none;
}
.input-row input:focus { border-color: var(--accent); }
.input-row input::placeholder { color: var(--dim); }

button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
button:disabled { opacity: 0.25; cursor: not-allowed; }
button:hover:not(:disabled) { opacity: 0.85; }
button.secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
button.secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
button.read-btn { background: var(--violet); }

#status {
  font-size: 10px;
  color: var(--amber);
  margin-top: 8px;
  min-height: 14px;
  letter-spacing: 0.02em;
}

.progress-bar {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-top: 4px;
  overflow: hidden;
  display: none;
}
.progress-bar.active { display: block; }
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.3s;
  width: 0%;
}

/* Summary bar */
.summary {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin: 12px 0;
}
.op-chip {
  padding: 3px 8px;
  font-size: 10px;
  border-radius: 3px;
  border-left: 3px solid;
  background: var(--surface);
  font-weight: 500;
}
.op-chip .ct { color: var(--dim); font-weight: 400; margin-left: 4px; }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.tab {
  padding: 8px 16px;
  font-size: 11px;
  color: var(--dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.panel { display: none; }
.panel.active { display: block; }

/* Clauses panel */
.clause-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: opacity 0.2s;
}
.clause-card:hover { opacity: 1 !important; }

.clause-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--dim);
}

.clause-body {
  padding: 10px;
  font-family: var(--serif);
  font-size: 14px;
  line-height: 1.55;
  color: var(--text);
}

.claims {
  padding: 6px 10px;
  border-top: 1px solid var(--border);
}

.claim-row {
  padding: 4px 0;
  font-size: 11px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  line-height: 1.6;
}

.tag {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: 0.04em;
}
.tag-op { border: 1px solid; }
.tag-site { background: rgba(92,224,160,0.08); color: var(--green); }
.tag-stance { background: var(--surface2); color: var(--dim); }
.tag-type { background: var(--surface2); color: var(--dim); text-transform: uppercase; font-size: 8px; }
.tag-fn { color: var(--violet); font-style: italic; font-size: 10px; font-family: var(--serif); max-width: 300px; }
.tag-reclassified { text-decoration: line-through; opacity: 0.4; margin-right: -4px; }

.flag-bar {
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
}
.flag-pill {
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.flag-drift { background: rgba(240,192,96,0.12); color: var(--amber); }
.flag-surprise { background: rgba(232,96,112,0.12); color: var(--red); }
.flag-silence { background: rgba(85,85,112,0.15); color: var(--dim); }
.flag-density { background: rgba(111,163,247,0.12); color: var(--accent); }
.flag-mode { background: rgba(92,224,160,0.1); color: var(--green); }
.flag-inert { background: rgba(85,85,112,0.1); color: var(--dim); font-style: italic; }

.sal-bar {
  height: 3px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
  margin-top: 4px;
}
.sal-fill { height: 100%; border-radius: 1px; background: var(--accent); }

/* Graph panel */
.entity-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
  overflow: hidden;
}
.entity-head {
  padding: 8px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.entity-head:hover { background: var(--surface2); }
.entity-name { font-weight: 600; color: var(--bright); font-size: 12px; }
.entity-meta { font-size: 9px; color: var(--dim); }
.entity-sites { display: flex; gap: 3px; }
.site-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--dim); opacity: 0.3;
}
.site-dot.occupied { opacity: 1; background: var(--green); }

.ledger {
  padding: 8px 10px;
  display: none;
  font-size: 10px;
}
.ledger.open { display: block; }

.commit-line {
  padding: 3px 0;
  border-left: 2px solid var(--border);
  padding-left: 8px;
  margin-left: 4px;
  display: flex;
  gap: 6px;
  align-items: baseline;
}
.commit-hash { color: var(--amber); font-size: 9px; font-weight: 500; }
.commit-clause { color: var(--dim); font-size: 9px; }
.commit-op { font-weight: 600; font-size: 10px; }
.commit-val { color: var(--text); font-family: var(--serif); font-size: 11px; }
.commit-shift { color: var(--red); font-size: 8px; font-weight: 600; letter-spacing: 0.05em; }
.commit-fn { color: var(--violet); font-style: italic; font-size: 10px; font-family: var(--serif); }

.fold-box {
  margin: 6px 0 6px 14px;
  padding: 8px 10px;
  background: rgba(160,124,240,0.06);
  border-left: 2px solid var(--violet);
  border-radius: 0 4px 4px 0;
  font-family: var(--serif);
  font-size: 12px;
  line-height: 1.5;
  color: var(--bright);
}

/* Register panel */
.frame-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 10px;
  margin-bottom: 6px;
}
.frame-id { color: var(--amber); font-weight: 500; font-size: 10px; }
.frame-text { color: var(--text); margin: 3px 0; font-size: 11px; }
.frame-meta { font-size: 9px; color: var(--dim); }
.frame-bar { height: 3px; background: var(--border); border-radius: 1px; margin-top: 4px; }
.frame-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }

.hist-line {
  font-size: 9px;
  color: var(--dim);
  padding: 2px 0 2px 8px;
  border-left: 2px solid var(--border);
  margin: 1px 0;
}
.hist-line.h-created { border-left-color: var(--amber); }
.hist-line.h-confirmed { border-left-color: var(--green); }
.hist-line.h-surprised { border-left-color: var(--red); }
.hist-line.h-refined { border-left-color: var(--accent); }

.section-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--dim);
  margin: 12px 0 6px;
}

/* LLM panel */
.llm-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.llm-status {
  font-size: 10px;
  color: var(--dim);
}

.reading-result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 10px;
  margin-bottom: 6px;
}
.reading-clause { font-family: var(--serif); font-size: 12px; color: var(--text); margin-bottom: 4px; }
.reading-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }

/* Scrollable panels */
.scroll-panel {
  max-height: calc(100vh - 200px);
  overflow-y: auto;
}
.scroll-panel::-webkit-scrollbar { width: 4px; }
.scroll-panel::-webkit-scrollbar-track { background: var(--bg); }
.scroll-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.link-entity .entity-name::before { content: '⟷ '; color: var(--dim); }

.hyp-box {
  padding: 8px 12px;
  border-radius: 4px;
  font-family: var(--serif);
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 6px;
}
.hyp-doc {
  background: rgba(160,124,240,0.08);
  border-left: 3px solid var(--violet);
  color: var(--bright);
}
.hyp-sec {
  background: rgba(92,224,160,0.05);
  border-left: 3px solid var(--green);
  color: var(--text);
}
.hyp-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-right: 8px;
  opacity: 0.6;
}
.hyp-inline {
  font-family: var(--serif);
  font-size: 11px;
  font-style: italic;
  color: var(--violet);
  padding: 2px 0 0 4px;
  border-left: 2px solid rgba(160,124,240,0.3);
  margin: 3px 0 0 2px;
  padding-left: 8px;
}

@media (max-width: 700px) {
  .app { padding: 12px; }
  .clause-body { font-size: 13px; }
}

/* Graph cursors strip */
#graph-cursors {
  position: sticky; top: 0; z-index: 5;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 6px 4px 8px; margin-bottom: 8px;
}
.cursor-row { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; }
.cursor-label { color: var(--dim); width: 48px; flex-shrink: 0; }
.cursor-body { flex: 1; min-width: 0; }
#span-cursor {
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  background: var(--surface2); padding: 3px 6px; border-radius: 3px;
  border-left: 2px solid var(--dim); cursor: pointer;
}
#span-cursor.src-chat   { border-left-color: var(--accent); }
#span-cursor.src-walk   { border-left-color: var(--violet); }
#span-cursor.src-read   { border-left-color: var(--green); }
#span-cursor.src-ingest { border-left-color: var(--amber); }

.cursor-toggles { display: flex; gap: 3px; }
.src-chip {
  background: none; border: 1px solid var(--border); color: var(--dim);
  padding: 2px 6px; border-radius: 8px; font-size: 9px; font-family: var(--mono);
  cursor: pointer; line-height: 1.2;
}
.src-chip.on { color: var(--text); }
.src-chip.on[data-src="chat"]   { border-color: var(--accent); color: var(--accent); }
.src-chip.on[data-src="walk"]   { border-color: var(--violet); color: var(--violet); }
.src-chip.on[data-src="read"]   { border-color: var(--green);  color: var(--green); }
.src-chip.on[data-src="ingest"] { border-color: var(--amber);  color: var(--amber); }

#comp-cursor { display: flex; height: 12px; border-radius: 2px; overflow: hidden; background: var(--surface2); }
#comp-cursor .stage {
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: rgba(0,0,0,0.7); overflow: hidden;
  transition: width 0.4s ease;
}
.stage-extracted { background: #4b5563; color: #d1d5db; }
.stage-walked    { background: #a78bfa; }
.stage-mini-read { background: #f59e0b; }
.stage-read      { background: #22c55e; }
.stage-folded    { background: #06b6d4; }

/* Node-type tag (terrain) on entity card */
.entity-terrain {
  display: inline-block; font-size: 9px; font-family: var(--mono);
  padding: 1px 5px; border-radius: 2px; margin-right: 6px;
  border: 1px solid; line-height: 1.4; letter-spacing: 0.02em;
}
.t-Void       { color: #6b7280; border-color: #6b7280; }
.t-Entity     { color: #3b82f6; border-color: #3b82f6; }
.t-Kind       { color: #06b6d4; border-color: #06b6d4; }
.t-Field      { color: #f97316; border-color: #f97316; }
.t-Link       { color: #22c55e; border-color: #22c55e; }
.t-Network    { color: #a78bfa; border-color: #a78bfa; }
.t-Atmosphere { color: #eab308; border-color: #eab308; }
.t-Lens       { color: #ef4444; border-color: #ef4444; }
.t-Paradigm   { color: #ec4899; border-color: #ec4899; }

/* Edges sub-line */
.entity-edges {
  padding: 4px 10px 6px; font-family: var(--mono); font-size: 10px;
  color: var(--dim); border-bottom: 1px solid var(--border);
}
.entity-edges .edge {
  display: inline-block; margin-right: 8px; cursor: pointer;
  color: var(--text);
}
.entity-edges .edge:hover { color: var(--accent); }
.entity-edges .edge-count { color: var(--dim); font-size: 9px; }

/* Recency pulse */
@keyframes cardPulse {
  0%   { box-shadow: 0 0 0 0 rgba(111,163,247,0.6); }
  60%  { box-shadow: 0 0 0 6px rgba(111,163,247,0); }
  100% { box-shadow: 0 0 0 0 rgba(111,163,247,0); }
}
.entity-card.card-pulse { animation: cardPulse 0.8s ease-out; }

/* Stage badge on entity card */
.entity-stage {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle;
}
.entity-stage.stage-extracted { background: #4b5563; }
.entity-stage.stage-walked    { background: #a78bfa; }
.entity-stage.stage-mini-read { background: #f59e0b; }
.entity-stage.stage-read      { background: #22c55e; }
.entity-stage.stage-folded    { background: #06b6d4; }

/* Walked clause marker in evidence */
.walked-marker { color: var(--violet); font-weight: 600; }
</style>
</head>
<body>
<div class="app" style="display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto">

  <!-- Slim header -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)">
    <div style="font-weight:600;color:var(--bright);font-size:14px">EO Reader</div>
    <div style="display:flex;gap:6px;align-items:center">
      <select id="model-select" title="LLM model" style="background:var(--surface2);border:1px solid var(--border);color:var(--dim);padding:4px 6px;border-radius:4px;font-family:var(--mono);font-size:10px">
        <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC" selected>Qwen 1.5B (1GB)</option>
        <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen 0.5B (0.5GB) fast</option>
        <option value="SmolLM2-360M-Instruct-q4f16_1-MLC">SmolLM2 360M (tiny)</option>
        <option value="Qwen2.5-3B-Instruct-q4f16_1-MLC">Qwen 3B (2.5GB)</option>
        <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 1B (0.7GB)</option>
        <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3B (1.5GB)</option>
      </select>
      <button onclick="exportLog()" id="export-btn" disabled style="background:none;border:1px solid var(--border);color:var(--dim);padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer" title="Export session log">Copy Log</button>
      <button onclick="resetCentroids()" style="background:none;border:1px solid var(--border);color:var(--dim);padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer" title="Reset centroids">Reset</button>
      <button onclick="toggleInspector()" style="background:none;border:1px solid var(--border);color:var(--dim);padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer" title="Inspector">☰</button>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status" style="font-size:10px;color:var(--amber);font-family:var(--mono);padding:2px 16px;min-height:14px"></div>
  <div class="progress-bar" id="progress" style="height:2px;background:var(--surface2)"><div class="progress-fill" id="progress-fill" style="height:100%;width:0;background:var(--accent);transition:width 0.3s"></div></div>

  <!-- Hidden elements needed by JS -->
  <input id="url-input" type="hidden" value="">
  <div id="summary" style="display:none"></div>
  <div id="read-btn" style="display:none"></div>

  <!-- Chat area -->
  <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px">
    <!-- Welcome message -->
    <div style="text-align:center;padding:60px 20px;color:var(--dim)">
      <div style="font-size:24px;font-weight:600;color:var(--bright);margin-bottom:8px">EO Reader</div>
      <div style="font-size:13px;font-family:var(--serif);line-height:1.6;max-width:400px;margin:0 auto">
        Paste a URL, drop in some text, or ask a question.<br>
        The system reads, classifies, and builds a queryable graph.
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div style="border-top:1px solid var(--border);padding:12px 16px;background:var(--surface)">
    <div style="display:flex;gap:8px;align-items:flex-end">
      <textarea id="chat-input" rows="1" placeholder="Paste a URL, text, or ask a question…" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:12px;font-family:var(--serif);font-size:14px;line-height:1.5;resize:none;max-height:200px;overflow-y:auto" onkeydown="handleInput(event)" oninput="autoGrow(this)"></textarea>
      <button onclick="handleSend()" style="background:var(--accent);color:var(--bg);border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center">↑</button>
    </div>
    <div style="font-size:9px;color:var(--dim);text-align:center;margin-top:4px;font-family:var(--mono)" id="input-hint">URL → fetch & read · long text → process & read · short text → chat</div>
  </div>

  <!-- Inspector drawer (hidden) -->
  <div id="inspector" style="display:none;position:fixed;right:0;top:0;width:400px;height:100vh;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;z-index:100;padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-weight:600;color:var(--bright);font-size:13px">Inspector</span>
      <button onclick="toggleInspector()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px">✕</button>
    </div>
    <div class="tabs" id="tabs" style="margin-bottom:8px">
      <div class="tab active" data-panel="source">Source</div>
      <div class="tab" data-panel="clauses">Clauses</div>
      <div class="tab" data-panel="graph">Graph</div>
      <div class="tab" data-panel="readings">Readings</div>
    </div>
    <div id="source" class="panel active scroll-panel" style="max-height:calc(100vh - 120px);overflow-y:auto">
      <div id="doc-library"></div>
      <div id="doc-detail" style="display:none"></div>
    </div>
    <div id="clauses" class="panel scroll-panel" style="max-height:calc(100vh - 120px);overflow-y:auto"></div>
    <div id="graph" class="panel scroll-panel" style="max-height:calc(100vh - 120px);overflow-y:auto">
      <div id="graph-cursors">
        <div class="cursor-row" style="margin-bottom:6px">
          <span class="cursor-label">span</span>

<script type="module">

// 27 texture descriptions — what text at each position LOOKS LIKE
const OPERATORS = {
  NUL:'Noting absence, restraint, what is NOT the case, negative conditions, silence, withdrawal, what was left out',
  SIG:'Pointing attention, flagging, notably, significantly, in particular, drawing the eye, marking something as worth noticing',

  Entity:'A specific named thing, this person, this place, this object, bounded and particular, John, London, the car',

const STANCES = {

  Dissecting:'Taking a specific thing apart, analyzing this particular, investigating, examining closely',
  Unraveling:'Deconstructing a pattern, showing how a system works or fails, pulling threads, reverse engineering',
  Tending:'Maintaining conditions, sustaining, nurturing without forcing, keeping alive, steady care',
  Binding:'Tying specific things together, connecting this to that, joining, pairing, linking named entities',
  Tracing:'Following threads across time, mapping regularities, tracking a pattern as it develops, longitudinal',

const OP_COLORS = {
  NUL:'#6b7280',SIG:'#8b5cf6',INS:'#22c55e',SEG:'#f97316',
  CON:'#a78bfa',SYN:'#06b6d4',DEF:'#3b82f6',EVA:'#eab308',REC:'#ef4444',
};

// ═══════════════════════════════════════════════════════════


let embedder = null;
let baseCentroids = { operators:{}, terrains:{}, stances:{} };

let correctionCount = 0;
let currentGenre = 'general';

// Search parameters — split into Ground (immutable) and Frame (session-mutable)
const GROUND_PARAMS = Object.freeze({

// Frame params — session-mutable, versioned, can evolve
const SEARCH_PARAMS = {

function saveCentroids() {

  try { localStorage.setItem('eo-centroids-v5', JSON.stringify({ corrections: correctionCount })); } catch(e) {}

async function initEmbeddings() {
  setStatus('Loading embedding model (~80 MB)…');
  const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1');
  embedder = await pipeline('feature-extraction','Xenova/all-MiniLM-L6-v2',{dtype:'fp32'});

  setStatus('Computing 27 base centroids…');
  for (const [n,d] of Object.entries(OPERATORS)) baseCentroids.operators[n] = await embed(d);
  for (const [n,d] of Object.entries(TERRAINS)) baseCentroids.terrains[n] = await embed(d);
  for (const [n,d] of Object.entries(STANCES))  baseCentroids.stances[n]  = await embed(d);

  // refVecs = copy of base, immutable, no offsets
  for(const [n,v] of Object.entries(baseCentroids.operators)) refVecs.operators[n] = [...v];
  for(const [n,v] of Object.entries(baseCentroids.terrains)) refVecs.terrains[n] = [...v];
  for(const [n,v] of Object.entries(baseCentroids.stances)) refVecs.stances[n] = [...v];

  embeddingsReady = true;
  setStatus('Ready.');
}

// Strip LLM preamble and prompt artifacts from output
function stripPreamble(text) {
  let s = text.trim();
  // Remove common preambles
  s = s.replace(/^(Here is|Here are|Here's|Sure,?|Of course,?|The (compressed|summary|answer|description)[^:]*:|I would classify[^:]*:|Based on[^:]*:)\s*/i, '');
  // Remove prompt markers that leaked
  s = s.replace(/>>>/g, '').replace(/<<</g, '').replace(/\[describe the sentence\]/gi, '');
  // Remove quotes
  s = s.replace(/^["']|["']$/g, '');
  // Take first sentence
  const firstSentence = s.split(/(?<=[.!?])\s/)[0] || s;
  return firstSentence.slice(0, 150).trim();
}

async function embed(text) {
  if(!embedder) return new Array(384).fill(0); // zero vector fallback
  try {
    const r = await embedder(text,{pooling:'mean',normalize:true});
    return Array.from(r.data);
  } catch(e) {
    console.warn('Embed failed:', e.message);
    return new Array(384).fill(0); // zero vector on failure
  }
}

function cosSim(a,b) {
  let d=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
  return d/(Math.sqrt(na)*Math.sqrt(nb));
}

function nearest(vec,refMap) {
  let best={name:null,score:-1}, second={name:null,score:-1};
  for(const[n,ref] of Object.entries(refMap)){
    const s=cosSim(vec,ref);
    if(s>best.score){second={...best};best={name:n,score:s};}
    else if(s>second.score) second={name:n,score:s};
  }
  return {name:best.name,score:best.score,runnerUp:second.name,margin:best.score-second.score};
}

// Classify by deriving operator/site/stance from Mode × Domain × Object
function classifyAxes(vec) {
  const op = nearest(vec, refVecs.operators);
  const te = nearest(vec, refVecs.terrains);
  const st = nearest(vec, refVecs.stances);

  return {
    operator: { name: op.name, score: op.score, runnerUp: op.runnerUp, margin: op.margin },
    terrain:  { name: te.name, score: te.score, runnerUp: te.runnerUp, margin: te.margin },
    stance:   { name: st.name, score: st.score, runnerUp: st.runnerUp, margin: st.margin },
  };
}

function averageVec(vecs){
  const dim=vecs[0].length,avg=new Array(dim).fill(0);
  for(const v of vecs) for(let i=0;i<dim;i++) avg[i]+=v[i]/vecs.length;
  return avg;
}

// ═══════════════════════════════════════════════════════════
//  NLP extraction
// ═══════════════════════════════════════════════════════════

const comp = window.nlp || window.compromise;

function cleanText(text) {
  text = text.replace(/\s{2,}/g,' ');
  text = text.replace(/\[\d+\]/g, '');
  text = text.replace(/\[(?:citation needed|a|b|c|d|e|f)\]/gi, '');
  text = text.replace(/([a-z])([A-Z][a-z])/g,'$1. $2');
  return text.trim();
}

// General HTML structure extractor — works on any HTML, not just Wikipedia
function parseStructuredHTML(html, title) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Remove noise elements (general patterns, not site-specific)
  const noiseSelectors = [
    'script', 'style', 'noscript', 'iframe',
    'nav', 'footer', 'header',
    '[role="navigation"]', '[role="banner"]', '[role="contentinfo"]',
    '.reflist', '.references', '.navbox', '.sidebar', '.noprint',
    '.mw-editsection', 'sup.reference',
    '.toc', '#toc',  // table of contents
    '.mbox-small', '.sistersitebox', '.side-box',
    '.ad', '.advertisement', '.social-share',
  ].join(', ');
  doc.querySelectorAll(noiseSelectors).forEach(el => el.remove());

  // Extract key-value metadata from any table with th/td pattern (infobox, sidebar)
  let metaText = '';
  for(const table of doc.querySelectorAll('table')) {
    const rows = table.querySelectorAll('tr');
    let kvCount = 0;
    for(const row of rows) {
      const th = row.querySelector('th');
      const td = row.querySelector('td');
      if(th && td) {
        const key = th.textContent.trim();
        const val = td.textContent.trim().replace(/\s+/g, ' ');
        if(key && val && key.length < 40 && val.length < 200) {
          metaText += `${key}: ${val}. `;
          kvCount++;
        }
      }
    }
    if(kvCount > 2) table.remove(); // remove tables that were metadata, not content
  }

  // Walk DOM in visual order: headings → paragraphs → lists
  const SKIP_SECTIONS = /^(references|external links|see also|notes|further reading|bibliography|sources|footnotes)$/i;
  const sections = [];
  let current = { title: 'Introduction', depth: 0, text: '' };
  let skipping = false;

  for(const node of doc.body.querySelectorAll('h1, h2, h3, h4, p, ul, ol, dl, blockquote, pre, figcaption')) {
    const tag = node.tagName;

    if(/^H[1-4]$/.test(tag)) {
      if(current.text.trim()) sections.push(current);
      const heading = node.textContent.replace(/\[edit\]/g, '').trim();
      const depth = parseInt(tag[1]);
      skipping = SKIP_SECTIONS.test(heading);
      current = { title: heading, depth, text: '' };
    } else if(!skipping) {
      let nodeText = node.textContent.trim().replace(/\s+/g, ' ');
      if(nodeText.length > 10) {
        // Preserve list structure as semicolon-separated items
        if(tag === 'UL' || tag === 'OL') {
          const items = [...node.querySelectorAll('li')].map(li => li.textContent.trim().replace(/\s+/g, ' ')).filter(t => t.length > 5);
          nodeText = items.join('. ');
        }
        current.text += nodeText + ' ';
      }
    }
  }
  if(current.text.trim() && !skipping) sections.push(current);

  // Build output: metadata first, then sections with heading markers
  let out = '';
  if(title) out += `${title}. `;
  if(metaText) out += metaText + '\n\n';
  for(const sec of sections) {
    out += `§${sec.title}. ${sec.text.trim()}\n\n`;
  }
  return out.replace(/\[\d+\]/g, '').replace(/\s{2,}/g, ' ').trim();
}

// Positional shadow operator — assigns operators from token order, no LLM needed
// First mention = INS. Same section elaboration = DEF. New section = SEG. Comparison = CON.
function positionalOperator(clauseIndex, entityMentions, sectionBoundaries) {
  // Is this clause at a section boundary?
  const isNewSection = sectionBoundaries.has(clauseIndex);
  if(isNewSection) return 'SEG';

  // Check each entity: first mention = INS, subsequent = DEF
  const ops = [];
  for(const [entityName, firstIdx] of Object.entries(entityMentions)) {
    if(firstIdx === clauseIndex) ops.push('INS');
    else if(firstIdx < clauseIndex) ops.push('DEF');
  }

  // If clause introduces new entities, INS dominates
  if(ops.includes('INS')) return 'INS';
  // If clause at section boundary with known entities, it's segmenting
  if(isNewSection) return 'SEG';
  // Default: elaboration
  return 'DEF';
}

function protectAbbrev(t){
  return t.replace(/\bMr\.\s*/g,'Mr ').replace(/\bMrs\.\s*/g,'Mrs ')
    .replace(/\bDr\.\s*/g,'Dr ').replace(/\bSt\.\s*/g,'St ')
    .replace(/\bU\.S\.\s*/g,'US ').replace(/\b([A-Z])\.\s*/g,'$1 ');
}
function restoreAbbrev(t){return t.replace(/ /g,'. ').replace(/\.\s+\./g,'.').trim();}

function splitClauses(text){
  // Level 1: split on blank lines (paragraph boundaries)
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
  const clauses = [];
  for(const para of paragraphs) {
    const p = protectAbbrev(para.replace(/\n/g, ' '));
    const sents = p.split(/(?<=[.!?;])\s+|(?<=:)\s+(?=[“"A-Z])/)
      .map(c => restoreAbbrev(c.trim())).filter(c => c.length > 8);
    clauses.push(...sents);
  }
  return clauses;
}

function cleanName(n){return n.replace(/^[“”"',.\s]+/,'').replace(/[“”"',.\s]+$/,'').replace(/[’']s$/i,'').trim();}
function isRealName(n){
  const c=cleanName(n);if(c.length<3)return false;
  // Skip pronouns, common words, determiners, conjunctions, adverbs
  const skip=['he','she','they','it','his','her','their','this','that','the','when','there','what','who','a','an','mr','mrs','dr','but','and','for','my','your','our','here','where','how','why','not','no','so','if','or','as','do','did','we','me','us','you','i','am','is','was','are','were','be','been','have','has','had','will','would','could','should','may','might','shall','can','now','then','yet','still','also','too','very','just','even','much','more','most','well','such','which','than','from','into','upon','with','about','after','before','between','during','under','over','through','above','below','along','until','since','while','though','because','however','therefore','thus','hence','instead','indeed','perhaps','rather','quite','enough','already','soon','later','again','once','twice','never','always','often','sometimes','usually','only','just','already','right','old','young','good','great','true','false','fair','poor','new','first','last','come','go','tell','say','speak','give','take','let','see','look','turn','hold','draw','find','make','put','get','keep','set','show','call','hear','fear','love','hate','know','think','feel','need','want','try','leave','begin','end','enter','exit','ay','nay','sir','madam','alas','oh','thou','thee','thy','thine','art','doth','hast','hath','wilt','shalt','ere','whither'];
  if(skip.includes(c.toLowerCase()))return false;
  if(/^\d/.test(c)||!/[A-Z]/.test(c))return false;
  // Reject sentence fragments — real names don't contain verbs/prepositions
  if(/\b(is|was|are|were|will|would|could|should|have|has|had|not|but|and|or|that|which|who|whom|whose|than|from|with|into|upon|shall|can|may|might|do|did|does)\b/i.test(c) && c.split(/\s+/).length > 2) return false;
  // Reject if it's just a common English word capitalized at sentence start
  if(c.split(/\s+/).length === 1 && /^[A-Z][a-z]+$/.test(c)) {
    const lc = c.toLowerCase();
    if(skip.includes(lc)) return false;
    // Single common words that aren't names
    if(['what','where','when','why','how','here','there','still','being','having','whose','mine','yours','till','towards','between','before','after','true','well','young','black','three','these','those','such','both'].includes(lc)) return false;
  }
  return true;
}

function extractClause(text, corefStack, globalSeenKinds) {
  const doc = comp(text);
  let people = doc.people().out('array').map(cleanName).filter(isRealName);
  let places = doc.places().out('array').map(cleanName).filter(isRealName);
  let orgs = doc.organizations().out('array').map(cleanName).filter(isRealName);

  // Supplementary extraction: capitalized multi-word phrases that compromise misses
  // Catches: movie titles, TV shows, institutions, awards
  const capsPattern = /(?:^|[.!?,;(]\s*)([A-Z][a-z]+(?:\s+(?:of|the|and|in|on|for|at|by|to|&|de|von|van|del|la|le)\s+)?[A-Z][a-z]+(?:\s+[A-Z][a-z]+)*)/g;
  let match;
  while((match = capsPattern.exec(text)) !== null) {
    const name = cleanName(match[1]);
    if(name.length >= 4 && isRealName(name) && !people.includes(name) && !places.includes(name) && !orgs.includes(name)) {
      // Check if it's likely a title/org (not already captured)
      if(name.split(/\s+/).length >= 2 && name.split(/\s+/).length <= 5) {
        orgs.push(name);
      }
    }
  }

  // Strip trailing punctuation artifacts
  const stripTrailing = n => n.replace(/[\s:\-,;.!?(]+$/, '').replace(/^[\s:\-,;.!?(]+/, '').trim();
  people = people.map(stripTrailing).filter(n => n.length > 1);
  places = places.map(stripTrailing).filter(n => n.length > 1);
  orgs = orgs.map(stripTrailing).filter(n => n.length > 1);

  // Reject junk non-entities
  const junkP = /^(page|get|born|edit|jump|hide|toggle|search|main|menu|also|see|list|read|view|image|ref|note|cite|from|left|right|show|more|less|next|prev|sign|log|share|print|save|add|new|old|top|end|via|cc|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)$/i;
  people = people.filter(n => !junkP.test(n) && n.split(/\s+/).length < 6);
  places = places.filter(n => !junkP.test(n) && n.split(/\s+/).length < 6);
  orgs = orgs.filter(n => !junkP.test(n) && n.split(/\s+/).length < 8);

  for(const p of people){const i=corefStack.indexOf(p);if(i>-1)corefStack.splice(i,1);corefStack.unshift(p);}

  const claims = [];
  const seenKinds = globalSeenKinds || new Set();

  // Kind claims (deduplicated)
  for(const p of people){const k=`${p}::person`;if(!seenKinds.has(k)){seenKinds.add(k);claims.push({entity:p,value:'person',span:p,rawType:'kind'});}}
  for(const p of places){const k=`${p}::place`;if(!seenKinds.has(k)){seenKinds.add(k);claims.push({entity:p,value:'place',span:p,rawType:'kind'});}}
  for(const o of orgs){const k=`${o}::org`;if(!seenKinds.has(k)){seenKinds.add(k);claims.push({entity:o,value:'organization',span:o,rawType:'kind'});}}

  // Propositions: X is/are/was/were Y
  const propP=/(?:^|[.;]\s+)([A-Z][^.;]{0,50}?)\s+(?:is|are|was|were)\s+((?:not\s+)?[^.;]{5,80}?)(?:\.|;|$)/gm;
  let m;
  while((m=propP.exec(text))!==null){
    const subj=m[1].trim(),pred=m[2].trim();
    if(pred.length>4&&subj.length>2) claims.push({entity:subj,value:pred,span:m[0].trim(),rawType:'proposition'});
  }

  // Causal
  const causeP=/([A-Za-z][^.;]{0,50}?)\s+(?:produces?|creates?|generates?|enables?|leads?\s+to|results?\s+in)\s+([^.;]{5,80}?)(?:\.|;|$)/gi;
  while((m=causeP.exec(text))!==null) claims.push({entity:m[1].trim(),value:m[2].trim(),span:m[0].trim(),rawType:'causal'});

  // Contrast
  const contP=/not\s+(.{3,40}?)\s+but\s+(.{3,40}?)(?:\.|;|,|$)/gi;
  while((m=contP.exec(text))!==null) claims.push({entity:(m[2]||'').trim(),value:`not ${(m[1]||'').trim()}`,span:m[0].trim(),rawType:'contrast'});

  // Quote
  const quoteP=/[“"]([^"”]{10,})[”"]/g;
  while((m=quoteP.exec(text))!==null) claims.push({entity:corefStack[0]||'?',value:m[1].trim(),span:m[0].trim(),rawType:'quote'});

  return {people,places,orgs,claims,clause:text};
}

// ═══════════════════════════════════════════════════════════
//  Mechanical binding extraction — typed (op, site, stance, subj, pred, obj)
//  Parallel channel to claims. First-draft, regex/heuristic only.
//  Produces the slot-level facts the reading model is meant to recover:
//    DEF(Entity, Binding) fox.name = "Basil"
//    CON(Link,   Binding) fox ≡ Basil
//    DEF(Entity, Tending) fox.weight = 13.7 lb
//    CON(Link,   Tracing) Lovett --said--> "..."
// ═══════════════════════════════════════════════════════════

// Common-noun heads that count as referent-able entities even without
// proper-noun NER. Keep small; the genre tagger can extend it later.
const COMMON_NOUN_HEADS = new Set([
  'fox','dog','cat','bird','horse','animal','wolf','bear','lion','tiger',
  'man','woman','child','boy','girl','suspect','victim','officer','official','spokesperson',
  'zoo','hospital','school','company','agency','department','court','police',
  'ship','car','plane','train','vessel','vehicle',
  'city','town','village','country','river','island','port','cave',
  'parasite','disease','virus','treatment','medication','condition',
  'book','film','study','report','case','incident','event','meeting',
]);

// Stance cues — temporal/aspectual markers that promote Binding to a richer aspect.
const STANCE_CUES = [
  { rx: /\b(?:has|have|had)\s+\w+ed\b/i,                   stance: 'Tracing' },     // present perfect → trajectory
  { rx: /\b(?:currently|at the moment|right now|today|now)\b/i, stance: 'Tending' }, // current state
  { rx: /\bover\s+(?:months|years|weeks|decades|the\s+past)\b/i, stance: 'Tracing' },// longitudinal
  { rx: /\b(?:gained|grown|lost|improved|worsened|increased|decreased|developed)\b/i, stance: 'Tracing' },
  { rx: /\b(?:was|were)\s+(?:born|founded|established|created|built|made)\b/i, stance: 'Making' },
  { rx: /\b(?:emerging|developing|preparing|approaching|becoming)\b/i, stance: 'Cultivating' },
];

function detectStance(span, fallback) {
  for(const cue of STANCE_CUES) if(cue.rx.test(span)) return cue.stance;
  return fallback;
}

// Pull common-noun head referents out of a clause: "the 2-year-old English fox" -> 'fox'.
// Returns array of { head, span } for any (the|a|an|this|his|her|its|their) NN+ phrase
// whose head is in COMMON_NOUN_HEADS.
function extractHeadReferents(text) {
  const out = [];
  // Scan for any token that's a known common-noun head, then look back for a determiner
  // within a small window. Avoids greedy modifier-slot bugs.
  const DET = /\b(the|a|an|this|that|these|those|his|her|its|their|our|my)\b/i;
  const tokenRe = /\b([A-Za-z][\w'-]*)\b/g;
  let m;
  while((m = tokenRe.exec(text)) !== null) {
    const word = m[1];
    const lower = word.toLowerCase();
    const singular = lower.replace(/s$/, '');
    const head = COMMON_NOUN_HEADS.has(lower) ? lower
               : (COMMON_NOUN_HEADS.has(singular) ? singular : null);
    if(!head) continue;
    // Look back up to ~40 chars for a determiner.
    const back = text.slice(Math.max(0, m.index - 40), m.index);
    const dm = back.match(new RegExp(DET.source + '(?:[^.;]*)$', 'i'));
    if(!dm) continue;
    // span = from determiner start to head end
    const detPos = m.index - (back.length - back.lastIndexOf(dm[0]));
    out.push({
      head,
      span: text.slice(detPos, m.index + word.length),
      det: dm[1].toLowerCase(),
      position: m.index,
    });
  }
  // Dedupe by head, keep latest
  const seen = new Map();
  for(const h of out) seen.set(h.head, h);
  return [...seen.values()];
}

// Resolve "the X" against the most-recent common-noun head of type X in the stack,
// or against any proper-name coref if the head matches a known entity's kind.
function resolveDefiniteNP(head, headStack, knownEntities) {
  for(let i = headStack.length - 1; i >= 0; i--) {
    if(headStack[i].head === head) return headStack[i].canonical || head;
  }
  return head; // fall back to the bare head as entity key
}

function pushBinding(out, b) {
  if(!b.subject || !b.object) return;
  if(String(b.subject).toLowerCase() === String(b.object).toLowerCase()) return;
  out.push({
    op: b.op, site: b.site, stance: b.stance,
    subject: String(b.subject).trim(),
    subjectDisplay: b.subjectDisplay || b.subject,
    predicate: b.predicate || null,
    object: String(b.object).trim(),
    span: (b.span || '').slice(0, 160),
    clauseIndex: b.clauseIndex,
    source: b.source || 'mechanical',
    confidence: b.confidence ?? 0.7,
  });
}

const PRONOUN_START = /^\s*(He|She|It|They|His|Her|Their|Its|Him|Them)\b/;

// Pick the most likely subject for a pattern whose verb starts at `at` in `text`.
//   1. If the clause starts with a pronoun → most recent named referent (corefStack[0]).
//   2. Else the rightmost head before `at` (closest head to the verb).
//   3. Else the leftmost head in the clause (matrix subject heuristic).
//   4. Else corefStack[0].
function pickSubject(text, headsInClause, corefStack, at) {
  if(PRONOUN_START.test(text) && corefStack[0]) return corefStack[0];
  if(typeof at === 'number') {
    const before = headsInClause.filter(h => h.position < at);
    if(before.length) return before[before.length-1].head;
  }
  if(headsInClause.length) return headsInClause[0].head;
  if(corefStack[0]) return corefStack[0];
  return null;
}

// Trim a captured object phrase at the first comma/clause boundary.
function trimObject(s) {
  if(!s) return s;
  return s.split(/[,;.](?:\s|$)/)[0].replace(/\s+at\s+the\s+end\s+of.*$/i,'').trim();
}

// Main entry. corefStack is the existing proper-noun coref stack from extractClause.
// headStack is a parallel stack of recent common-noun heads (we maintain it caller-side).
function extractBindings(text, corefStack, headStack, clauseIndex, claims) {
  const out = [];
  const t = text.replace(/\s+/g, ' ').trim();
  const headsInClause = extractHeadReferents(t);

  // 1. Name reveal: "named X" / "called X" / "given a name: X".
  //    Subject = leftmost head in clause (matrix subject; the named referent is what the
  //    sentence is about, which is usually its first head noun).
  const nameP = /\b(?:named|called|dubbed|baptized|christened|given\s+(?:a|the)\s+name(?:\s*:)?)\s+["“']?([A-Z][\w'-]+(?:\s+[A-Z][\w'-]+)?)["”']?/g;
  let m;
  while((m = nameP.exec(t)) !== null) {
    const name = m[1].trim();
    const subject = headsInClause[0]?.head || pickSubject(t, headsInClause, corefStack, m.index);
    if(!subject) continue;
    pushBinding(out, {
      op:'DEF', site:'Entity', stance:'Binding',
      subject, predicate:'name', object:name,
      span:m[0], clauseIndex, source:'mech:name-reveal', confidence:0.9,
    });
    pushBinding(out, {
      op:'CON', site:'Link', stance:'Binding',
      subject, predicate:'≡', object:name,
      span:m[0], clauseIndex, source:'mech:coref-name', confidence:0.8,
    });
  }

  // 2. Age: "2-year-old <head>" or "<head> ... 5 years old". Attach to closest head.
  const ageP = /\b(\d+)[\s-]?year[s-]?old\b|\b(\d+)\s+years?\s+old\b/gi;
  while((m = ageP.exec(t)) !== null) {
    const yrs = m[1] || m[2];
    // Look forward up to 30 chars for a head ("2-year-old fox"), else back.
    const forward = headsInClause.find(h => h.position >= m.index && h.position - m.index < 40);
    const back    = [...headsInClause].reverse().find(h => h.position < m.index && m.index - h.position < 40);
    const subject = forward?.head || back?.head || pickSubject(t, headsInClause, corefStack, m.index);
    if(!subject) continue;
    pushBinding(out, {
      op:'DEF', site:'Entity', stance:'Binding',
      subject, predicate:'age', object:`${yrs} years`,
      span:m[0], clauseIndex, source:'mech:age', confidence:0.9,
    });
  }

  // 3. Measurements: weight, duration. Subject = pronoun-resolved or most recent named referent.
  const measP = /\b(\d+(?:\.\d+)?)\s*(pounds?|lbs?|kilograms?|kg|miles?|km|hours?|minutes?|days?|weeks?|months?|years?)\b/gi;
  while((m = measP.exec(t)) !== null) {
    const unit = m[2].toLowerCase().replace(/s$/, '');
    const isWeight = /\b(?:pounds?|lbs?|kilograms?|kg)\b/i.test(m[0]);
    const isDur    = /\b(?:hours?|minutes?|days?|weeks?|months?|years?)\b/i.test(m[0]);
    if(/year/i.test(m[2])) continue; // years usually covered by ageP
    const predicate = isWeight ? 'weight' : (isDur ? 'duration' : 'measurement');
    const subject = pickSubject(t, headsInClause, corefStack, m.index);
    if(!subject) continue;
    const stance = detectStance(t, 'Tending');
    pushBinding(out, {
      op:'DEF', site:'Entity', stance,
      subject, predicate, object:`${m[1]} ${unit}`,
      span:m[0], clauseIndex, source:'mech:measurement', confidence:0.8,
    });
  }

  // 4. Appositive role: "Keith Lovett, vice president and director ..."
  const roleNouns = /\b(?:president|director|chief|head|founder|ceo|cto|cfo|secretary|chair|chairman|chairwoman|professor|doctor|judge|senator|representative|governor|mayor|spokesperson|spokeswoman|spokesman|manager|officer|coordinator|vice\s+president)\b/i;
  const apposP = /\b([A-Z][\w'-]+(?:\s+[A-Z][\w'-]+)+)\s*,\s+([^,.;]{6,120}?)(?=,\s+(?:said|told|wrote|stated|announced)|\.|$|,\s+but\b|,\s+and\b)/g;
  while((m = apposP.exec(t)) !== null) {
    const subj = m[1].trim();
    const role = m[2].trim();
    if(roleNouns.test(role)) {
      pushBinding(out, {
        op:'DEF', site:'Entity', stance:'Binding',
        subject:subj, predicate:'role', object:role,
        span:m[0], clauseIndex, source:'mech:appos-role', confidence:0.8,
      });
    }
  }

  // 5. Speech: "X said/told/..."
  const speechP = /\b([A-Z][\w'-]+(?:\s+[A-Z][\w'-]+)?)\s+(said|told|stated|announced|declared|wrote|explained|warned|claimed|noted|added)\b/g;
  while((m = speechP.exec(t)) !== null) {
    pushBinding(out, {
      op:'CON', site:'Link', stance:'Tracing',
      subject:m[1].trim(), predicate:m[2].toLowerCase(), object:'(quoted speech)',
      span:m[0], clauseIndex, source:'mech:speech', confidence:0.85,
    });
  }

  // 6a. Active care verb: "ACTOR took <patient> into its care"
  //     Subject = the head/proper appearing before "took". Object = m[2] (the patient).
  const careTookP = /\b(took)\s+(?:the\s+)?([^.;,]{3,50}?)\s+into\s+(?:its|their|his|her)\s+care\b/i;
  m = careTookP.exec(t);
  if(m) {
    const actor = pickSubject(t.slice(0, m.index), headsInClause.filter(h=>h.position<m.index), corefStack, m.index);
    let patient = trimObject(m[2]);
    // patient is a phrase like "the 2-year-old English fox"; try to reduce to head
    const patientHead = extractHeadReferents(patient)[0]?.head || patient;
    if(actor && patientHead && actor !== patientHead) {
      pushBinding(out, {
        op:'CON', site:'Link', stance:'Binding',
        subject:actor, predicate:'cares_for', object:patientHead,
        span:m[0], clauseIndex, source:'mech:verb:cares_for', confidence:0.8,
      });
    }
  }

  // 6b. Passive interception: "PATIENT was secured/intercepted/caught by AGENT"
  const passiveP = /\b(?:was|were|been)\s+(secured|intercepted|detained|stopped|caught|arrested|treated|rescued)\s+(by|for|from)\s+([^.;,]{2,60})/i;
  m = passiveP.exec(t);
  if(m) {
    const verb = m[1].toLowerCase();
    const prep = m[2].toLowerCase();
    const agent = trimObject(m[3]);
    // Patient finding:
    //   - If a pronoun is immediately before the verb ("he was secured"), defer to coref/pickSubject.
    //   - Else look back ~60 chars for a multi-letter proper noun (handles appositives like
    //     "Basil, which rhymes with dazzle, was treated for ...").
    let patient = null;
    const tailWord = t.slice(Math.max(0, m.index - 12), m.index).match(/\b(\w+)\W*$/)?.[1] || '';
    const pronounImmediate = /^(he|she|it|they|him|her|them)$/i.test(tailWord);
    if(!pronounImmediate) {
      const back = t.slice(Math.max(0, m.index - 60), m.index);
      const STOPWORDS = /^(The|That|This|These|Those|And|But|Or|For|With|From|By|In|On|At|To|Of|A|An|He|She|It|They|His|Her|Their|Its|English|French|American|British|German|Italian|Spanish|Russian|Chinese|Japanese|European|African|Asian|Indian|Mexican|Canadian|Australian|January|February|March|April|May|June|July|August|September|October|November|December|Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)$/;
      const properMatches = [...back.matchAll(/\b([A-Z][\w'-]+(?:\s+[A-Z][\w'-]+)*)\b/g)]
        .map(mm => mm[1]).filter(n => !STOPWORDS.test(n));
      if(properMatches.length) patient = properMatches[properMatches.length - 1];
    }
    if(!patient) patient = pickSubject(t.slice(0, m.index), headsInClause.filter(h=>h.position<m.index), corefStack, m.index);
    if(patient && agent) {
      const pred = (verb === 'treated' && prep === 'for') ? 'treated_for'
                 : (verb === 'rescued' && prep === 'by')  ? 'rescued_by'
                 : `${verb}_${prep}`;
      pushBinding(out, {
        op:'CON', site:'Link', stance:'Binding',
        subject:patient, predicate:pred, object:agent,
        span:m[0], clauseIndex, source:`mech:verb:${pred}`, confidence:0.75,
      });
    }
  }

  // 7. Origin: "from <Place>" — attach to subject near the "from" position.
  const fromP = /\bfrom\s+([A-Z][\w'-]+(?:\s+[A-Z][\w'-]+)*(?:,\s+[A-Z][\w'-]+)?)/g;
  while((m = fromP.exec(t)) !== null) {
    const subject = pickSubject(t, headsInClause, corefStack, m.index);
    if(subject) pushBinding(out, {
      op:'DEF', site:'Entity', stance:'Binding',
      subject, predicate:'origin', object:m[1].trim(),
      span:m[0], clauseIndex, source:'mech:origin', confidence:0.6,
    });
  }

  // 8. Kind-level mechanism: "X infects/causes/produces Y" (no determiner on subject).
  const kindDefP = /(?:^|[.;]\s+|but\s+)([A-Z]?[a-z][\w\s-]{2,40}?)\s+(infects?|causes?|produces?|prevents?|enables?|leads?\s+to)\s+([a-z][^.;,]{2,80})/g;
  while((m = kindDefP.exec(t)) !== null) {
    const subj = m[1].trim(), verb = m[2].toLowerCase(), obj = trimObject(m[3]);
    if(subj.split(/\s+/).length > 5) continue;
    pushBinding(out, {
      op:'DEF', site:'Kind', stance:'Composing',
      subject:subj, predicate:verb.replace(/\s+/g, '_'), object:obj,
      span:m[0], clauseIndex, source:'mech:kind-mechanism', confidence:0.6,
    });
  }

  return out;
}

//  Salience, triggers, hashing
// ═══════════════════════════════════════════════════════════

const CHROME_RE = /creative commons|wikipedia|trademark|privacy policy|terms of (?:use|service|sale)|cookie (?:policy|statement)|disclaimers|retrieved from|isbn\b|archived from|registered trademark|wikimedia|site map|contact us|advertise|work with us|accessibility|mobile view|jump to content|toggle the table|main menu|move to sidebar|edit\s*\]|doi:|pmid:|oclc |jstor |s2cid |hdl:|lccn |issn |bibcode|arxiv:|cite |citation needed|please help improve|discuss these issues|talk page|needs additional citations|this article|may not represent|verification needed|original research|subscribe|newsletter|sign up|log in|sign in|share this|follow us|download the app|get the app|podcast|more stories|related stories|recommended for you|sponsor message|fresh air|wild card|planet money|morning edition|weekend edition|all things considered|get npr|more podcasts|search newsletters|shows search|copyright \d{4}|all rights reserved|associated press|getty images|ap photo|share facebook|share twitter|share reddit|never miss a story|by submitting your|youre agreeing|donate|listen live|non-profit newsroom|powered by|watch live|watch alerts|traffic news|weather (?:alerts|forecast|radar)|recipes extras|score connect|tv schedule|station info|tv listings|closings (?:and|&) delays|contest rules|email alerts|be your best|retirement report|out & about|faith millions|skip to (?:main )?content|toggle (?:menu|nav)|search site|close menu/i;

function isChromey(text) {
  if(CHROME_RE.test(text)) return true;
  const words = text.split(/\s+/).length;
  // Reference citation: "Lastname, Firstname (YYYY)." or "Lastname, F."
  if(/^[A-Z][a-z]+,\s+[A-Z]/.test(text) && /\(\d{4}\)/.test(text)) return true;
  if(/^[A-Z][a-z]+,\s+[A-Z]\./.test(text) && words < 15) return true;
  // Reference markers
  if(/^\s*\^/.test(text)) return true;
  // Academic citation fragments
  if(/\bpp\.\s*\d/.test(text) && /\(\d{4}\)/.test(text)) return true;
  if(/\bISBN\s*[\d-]{10}/.test(text)) return true;
  if(/Retrieved\s+\w+\s+\d{1,2},?\s+\d{4}/i.test(text)) return true;
  if(/Archived from the original/i.test(text)) return true;
  // Section headers
  if(/^(References|Further reading|External links|See also|Notes|Categories)\s*$/i.test(text.trim())) return true;
  if(/^Categories:/.test(text.trim())) return true;
  if(/This page was last edited/i.test(text)) return true;
  // Wikipedia infobox/sidebar data
  if((text.match(/\((?:sister|brother|father|mother|born|née|age|m\.\s*\d)/gi) || []).length >= 2) return true;
  // Structured data: many parens, no sentence structure
  if(text.split(/\s+/).length > 10 && !/[.!?]/.test(text.slice(0, 100)) && (text.match(/[()]/g) || []).length > 4) return true;
  // Infobox fragments: ")Word" pattern (value immediately after closing paren)
  if((text.match(/\)[A-Z]/g) || []).length >= 3) return true;
  // Wikipedia table-of-contents / navigation lists without verbs
  if(text.split(/\s+/).length > 8 && !/\b(is|was|are|were|has|have|had|became|made|wrote|directed|produced|starred|played|appeared|won|received|earned)\b/i.test(text) && (text.match(/[A-Z][a-z]+/g) || []).length > 5) return true;
  // Quoted article titles in reference format: "Title". Source. Date.
  if(/^"[^"]+"\.\s*[A-Z]/.test(text) && /\d{4}/.test(text) && words < 20) return true;
  // Pure numbers/dates
  if(/^\d[\d\s\-–,.:;()]*$/.test(text.trim())) return true;
  // Section headers with [edit]
  if(/\[\s*edit\s*\]/i.test(text)) return true;
  // Very short fragments
  if(words < 4 && !/[.!?]/.test(text)) return true;
  // Nav-like: many capitalized words with no verbs
  if(words >= 4 && words <= 15) {
    const caps = text.split(/\s+/).filter(w => /^[A-Z]/.test(w)).length;
    if(caps / words > 0.7 && !/\b(is|was|are|were|has|have|had|do|does|did|will|would|can|could|shall|should|may|might)\b/i.test(text)) return true;
  }
  return false;
}


// ═══════════════════════════════════════════════════════════
//  Speaker Attribution — mechanical quote tracking + lexicon
// ═══════════════════════════════════════════════════════════

const SPEECH_VERBS = /\b(said|says|told|stated|argued|claimed|noted|wrote|added|explained|insisted|warned|acknowledged|confirmed|denied|tweeted|posted|testified|announced|declared|recalled|suggested|responded|replied|contended|maintained|conceded|emphasized)\b/i;
const DOCUMENT_VERBS = /\b(shows?|showed|reveals?|revealed|indicates?|indicated|found|confirms?|confirmed|details?|outlined|reads|documents?|establishes|demonstrates)\b/i;
const DISTANCING_VERBS = /\b(claimed|insisted|alleged|asserted|purported|contended|maintained)\b/i;

class QuoteTracker {
  constructor() {
    this.marks = [];
    this.open = false;
    this.depth = 0;
    this.openedAt = null;
  }

  update(clause, clauseIndex) {
    const result = {
      quoteOpen: this.open,
      depth: this.depth,
      isNewQuote: false,
      isClosingQuote: false,
      carriedSpeaker: null,
      detectedSpeaker: null,
      detectedVia: null,
      detectedType: 'narrator',
    };

    // Count quote marks
    const opens = (clause.match(/[“"]/g) || []).length;
    const closes = (clause.match(/[”"]/g) || []).length;
    // Simple: if odd total, toggle state
    // More robust: track opens and closes separately
    let netChange = 0;
    for(const ch of clause) {
      if(ch === '“' || (ch === '"' && !this.open)) { netChange++; }
      else if(ch === '”' || (ch === '"' && this.open && netChange <= 0)) { netChange--; }
    }

    if(netChange > 0 && !this.open) {
      // New quote opens
      this.open = true;
      this.depth = 1;
      this.openedAt = clauseIndex;
      result.isNewQuote = true;
      result.depth = 1;
    } else if(netChange < 0 && this.open) {
      // Quote closes
      result.isClosingQuote = true;
      this.open = false;
      this.depth = 0;
      this.openedAt = null;
    }

    // Detect scare quotes: short quoted span, no verb = term not speech
    const scareMatch = clause.match(/["“]([^"”]{1,30})["”]/);
    if(scareMatch) {
      const inner = scareMatch[1];
      if(inner.split(/\s+/).length <= 5 && !SPEECH_VERBS.test(inner)) {
        result.isTerm = true;
        if(result.isNewQuote) { result.isNewQuote = false; this.open = false; this.depth = 0; }
      }
    }

    // Detect attribution: [Entity] + speech verb near quote
    const speechMatch = clause.match(/([A-Z][a-z]+(?:\s[A-Z][a-z]+)?)\s+(?:also\s+)?(said|says|told|stated|argued|claimed|noted|wrote|added|explained|insisted|warned|announced|declared)/i);
    if(speechMatch) {
      result.detectedSpeaker = speechMatch[1];
      result.detectedVia = speechMatch[2].toLowerCase();
      result.detectedType = 'person';
      if(DISTANCING_VERBS.test(speechMatch[2])) result.narratorStance = 'distancing';
    }

    // Detect document attribution
    const docMatch = clause.match(/(the\s+(?:audit|report|records|emails?|documents?|memo|filing|data|investigation))\s+(shows?|revealed?|found|confirms?|indicates?|details?)/i);
    if(docMatch) {
      result.detectedSpeaker = docMatch[1];
      result.detectedVia = docMatch[2].toLowerCase();
      result.detectedType = 'document';
    }

    // Detect aggregate attribution
    const aggMatch = clause.match(/(critics|observers|officials|experts|residents|analysts|sources)\s+(say|said|argue|argued|note|noted|warn|warned)/i);
    if(aggMatch) {
      result.detectedSpeaker = aggMatch[1];
      result.detectedVia = aggMatch[2].toLowerCase();
      result.detectedType = 'aggregate';
    }

    // Detect institutional attribution
    const instMatch = clause.match(/(the\s+(?:mayor'?s?\s+office|police|department|administration|commission|board|agency|office|committee))\s+(said|stated|announced|confirmed|denied)/i);
    if(instMatch) {
      result.detectedSpeaker = instMatch[1];
      result.detectedVia = instMatch[2].toLowerCase();
      result.detectedType = 'institution';
    }

    result.quoteOpen = this.open;
    result.depth = this.depth;
    return result;
  }
}


function salience(clause, clauseVec, extraction, register, graphVectors) {
  let score = 0;
  const propClaims = extraction.claims.filter(c => ['proposition','causal','contrast','definition','quote'].includes(c.rawType));
  const kindClaims = extraction.claims.filter(c => c.rawType === 'kind');
  score += propClaims.length * 0.25;
  score += kindClaims.length * 0.05;

  let bestE = 0;
  for(const vec of Object.values(graphVectors)){const s=cosSim(clauseVec,vec);if(s>bestE)bestE=s;}
  score += bestE * 0.15;

  let bestF = 0;
  for(const f of register.frames){const s=cosSim(clauseVec,f.vec);if(s>bestF)bestF=s;}
  score += bestF * 0.2;

  const words = clause.split(/\s+/);
  const stops=/^(the|this|that|with|from|have|been|will|would|could|should|they|their|them|these|those|into|also|just|than|then|when|what|which|where|who|more|most|some|such|each|every|both|were|does|done|here|there|about|after|before|under|over|between|through|a|an|and|but|for|nor|yet|so|or|is|are|was|it|its|not)$/i;
  const content = words.filter(w => w.length>3 && !stops.test(w));
  score += (words.length>0 ? content.length/words.length : 0) * 0.15;

  const copulas = (clause.match(/\b(?:is|are|was|were|means?|becomes?)\b/gi)||[]).length;
  score += Math.min(copulas*0.08, 0.16);

  if(words.length<6) score *= 0.6;
  if(words.length<3) score *= 0.4;
  return score;
}

function computeBaselineDrift(cvs){
  if(cvs.length<8) return 0.10;
  let tot=0,ct=0;
  for(let i=4;i<cvs.length;i++){
    const r=cvs.slice(i-4,i).map(c=>c.vec);
    const p=cvs.slice(Math.max(0,i-8),i-4).map(c=>c.vec);
    if(p.length<2) continue;
    tot += 1-cosSim(averageVec(r),averageVec(p)); ct++;
  }
  return ct>0?tot/ct:0.10;
}

function shouldRead(reg,ci,cv,extraction,results){
  const reasons=[];
  if(reg.clauseVecs.length>=8){
    const rc=averageVec(reg.clauseVecs.slice(-4).map(c=>c.vec));
    const dc=averageVec(reg.clauseVecs.map(c=>c.vec));
    const drift=1-cosSim(rc,dc);
    if(drift>(reg.baselineDrift||0.10)*1.5) reasons.push({type:'drift',drift});
  }
  for(const f of reg.frames){
    if(f.strength<0.3)continue;
    const s=cosSim(cv,f.vec);
    if(s<0.18) reasons.push({type:'surprise',frame:f.id,sim:s});
  }
  if(reg.frames.length>0){
    const lc=Math.max(...reg.frames.map(f=>f.confirmedBy.length>0?Math.max(...f.confirmedBy):f.generatedAt));
    if(ci-lc>6) reasons.push({type:'silence',gap:ci-lc});
  }
  if(extraction&&extraction.claims.length>0){
    const w=extraction.clause.split(/\s+/).length;
    if(extraction.claims.length/w>0.12) reasons.push({type:'density'});
  }
  // Mode shift
  if(reg.clauseVecs.length>=12){
    const mode=arr=>{const c={};for(const r of arr)c[r]=(c[r]||0)+1;return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0];};
    const recent=results.slice(-6).filter(r=>r.rawType==='clause').map(r=>r.operator?.name);
    const prior=results.slice(-12,-6).filter(r=>r.rawType==='clause').map(r=>r.operator?.name);
    if(recent.length>=3&&prior.length>=3){
      const rm=mode(recent),pm=mode(prior);
      if(rm&&pm&&rm!==pm) reasons.push({type:'mode_shift',from:pm,to:rm});
    }
  }
  return reasons.length>0?reasons:null;
}

function siteHash(claims){
  const s=claims.map(c=>`${c.clauseIndex}:${c.operator}:${c.rawType}:${c.value}`).join('|');
  let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return h.toString(16).padStart(8,'0');
}
