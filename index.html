function renderSummary(){
  const ops={};
  for(const r of allResults.filter(r=>r.rawType==='clause')) ops[r.operator.name]=(ops[r.operator.name]||0)+1;
  let html='';
  for(const[op] of Object.entries(OPERATORS)){
    const c=ops[op]||0; if(c===0) continue;
    html+=`<div class="op-chip" style="border-left-color:${OP_COLORS[op]};color:${OP_COLORS[op]}">${op}<span class="ct">${c}</span></div>`;
  }
  const inert=allResults.filter(r=>r.rawType==='inert').length;
  if(inert>0) html+=`<div class="op-chip" style="border-left-color:var(--dim);color:var(--dim)">INERT<span class="ct">${inert}</span></div>`;
  html+=`<div class="op-chip" style="border-left-color:var(--violet);color:var(--violet)">PROPS<span class="ct">${propositions.length}</span></div>`;
  document.getElementById('summary').innerHTML=html;
}

function renderClauses(){
  let html='';
  for(const r of allResults){
    const opacity=Math.max(0.2,Math.min(1,(r.salience||0.3)*2.5));
    const isInert=r.rawType==='inert';
    const isRevived=r.rawType==='revived';

    html+=`<div class="clause-card" style="opacity:${opacity}">`;
    html+=`<div class="clause-head"><span>c${r.clauseIndex+1}</span>`;
    if(isInert) html+=`<span class="flag-pill flag-inert">inert ${(r.salience||0).toFixed(2)}</span>`;
    else if(isRevived) html+=`<span class="flag-pill" style="background:rgba(92,224,160,0.1);color:var(--green)">revived ${(r.salience||0).toFixed(2)}</span>`;
    else html+=`<span>${r.operator.name}(${r.terrain.name}, ${r.stance.name})</span>`;
    html+=`</div>`;
    html+=`<div class="clause-body">${esc(r.clause)}</div>`;

    if(!isInert && r.claims && r.claims.length>0){
      html+=`<div class="claims">`;
      for(const cl of r.claims){
        const opC=OP_COLORS[cl.operator.name]||'#666';
        html+=`<div class="claim-row">`;
        html+=`<span class="tag tag-op" style="border-color:${opC};color:${opC}">${cl.operator.name}(${cl.terrain.name}, ${cl.stance.name})</span>`;
        html+=`<span class="tag tag-type">${cl.rawType}</span>`;
        html+=`<strong style="color:var(--bright)">${esc(cl.entity)}</strong> → ${esc(cl.value)}`;
        html+=`</div>`;
      }
      html+=`</div>`;
    }

    if(r.needsReading && r.flagReasons){
      html+=`<div class="claims"><div class="flag-bar">⚑ `;
      for(const reason of r.flagReasons){
        let cls='flag-drift';
        if(reason.includes('surprise'))cls='flag-surprise';
        if(reason.includes('silence'))cls='flag-silence';
        if(reason.includes('density'))cls='flag-density';
        if(reason.includes('mode'))cls='flag-mode';
        html+=`<span class="flag-pill ${cls}">${reason}</span>`;
      }
      html+=`</div></div>`;
    }

    html+=`<div class="sal-bar"><div class="sal-fill" style="width:${Math.min(100,(r.salience||0)*200)}%"></div></div>`;
    html+=`</div>`;
  }
  document.getElementById('clauses').innerHTML=html;
}

function renderGraph(){
  const sorted=Object.entries(graph.entities).sort((a,b)=>b[1].claims.length-a[1].claims.length);
  let html='';
  const allSites=Object.keys(TERRAINS);

  // Diff against previous render to detect grown entities for the pulse
  const prevState = window._lastEntityState || new Map();
  const nextState = new Map();

  for(const[key,ent] of sorted){
    const isLink=ent.isLink;
    const occupiedSites=Object.keys(ent.ledgers||{});
    const terrain = ent.terrain || 'Entity';
    const stage = ent.stage || 'extracted';
    const claimCount = (ent.claims||[]).length;
    const edgeCount = (ent.edges||[]).length;

    const prev = prevState.get(key);
    const grew = !prev || prev.claims !== claimCount || prev.edges !== edgeCount || prev.stage !== stage;
    nextState.set(key, { claims: claimCount, edges: edgeCount, stage });

    html+=`<div class="entity-card ${isLink?'link-entity':''} ${grew?'card-pulse':''}" data-key="${esc(key)}">`;
    html+=`<div class="entity-head" onclick="this.parentElement.querySelector('.ledger').classList.toggle('open')">`;
    html+=`<div>`;
    html+=`<span class="entity-stage stage-${stage}" title="stage: ${stage}"></span>`;
    html+=`<span class="entity-terrain t-${terrain}" title="node type">${terrain}</span>`;
    html+=`<span class="entity-name">${esc(ent.name)}</span>`;
    if(ent.aliases&&ent.aliases.length>0) html+=`<span class="entity-meta" style="color:var(--green)"> ≡ ${ent.aliases.map(esc).join(', ')}</span>`;
    html+=`<span class="entity-meta"> · ${claimCount} claims · ${(ent.mentions||[]).length} mentions · ${edgeCount} edges</span></div>`;
    html+=`<div class="entity-sites">`;
    for(const s of allSites) html+=`<div class="site-dot ${occupiedSites.includes(s)?'occupied':''}" title="${s}"></div>`;
    html+=`</div></div>`;

    if((ent.edges||[]).length > 0) {
      const topEdges = ent.edges.slice().sort((a,b)=>b.count-a.count).slice(0, 5);
      html+=`<div class="entity-edges">↔ `;
      html+= topEdges.map(e => {
        const tt = Object.entries(e.terrains||{}).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
        const tip = tt ? ` (${tt})` : '';
        const safeKey = (e.key||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        return `<span class="edge" onclick="event.stopPropagation(); window.scrollToEntityCard('${safeKey}')" title="${esc(e.name)}${tip}">${esc(e.name)} <span class="edge-count">×${e.count}</span></span>`;
      }).join('');
      html+=`</div>`;
    }

    html+=`<div class="ledger">`;
    for(const[site,ledger] of Object.entries(ent.ledgers||{})){
      html+=`<div class="section-label">${site} · ${ledger.currentHash} · ${ledger.commits.length} commits</div>`;
      for(const commit of ledger.commits){
        const opC=OP_COLORS[commit.added.operator]||'#666';
        html+=`<div class="commit-line" style="border-left-color:${opC}">`;
        html+=`<span class="commit-hash">${commit.hash.slice(0,6)}</span>`;
        html+=`<span class="commit-clause">c${commit.clauseIndex+1}</span>`;
        html+=`<span class="commit-op" style="color:${opC}">${commit.added.operator}</span>`;
        html+=`<span class="commit-val">${esc((commit.added.value||'').slice(0,60))}</span>`;
        if(commit.isShift) html+=`<span class="commit-shift">← SHIFT</span>`;
        if(commit.added.fn) html+=`<br><span class="commit-fn">${esc(commit.added.fn)}</span>`;
        html+=`</div>`;
      }
    }
    html+=`</div></div>`;
  }

  const target = document.getElementById('graph-entities') || document.getElementById('graph');
  if(target) target.innerHTML = html;
  window._lastEntityState = nextState;

  renderComprehensionCursor();
}
window.renderGraph = renderGraph;

function toggleSpanSource(src) {

function renderComprehensionCursor() {
  const el = document.getElementById('comp-cursor');
  if(!el) return;
  const contentClauses = graph.clauses.filter(c => !c.skip);
  const total = contentClauses.length || 1;
  const counts = { extracted: 0, walked: 0, 'mini-read': 0, read: 0, folded: 0 };
  for(const c of contentClauses) {
    const s = c.stage || 'extracted';
    if(s in counts) counts[s]++;
  }
  // folded comes from entities, not clauses — show as smaller indicator if any
  const foldedEntities = Object.values(graph.entities).filter(e => e.stage === 'folded').length;
  const order = ['extracted','walked','mini-read','read'];
  let html = '';
  for(const s of order) {
    const pct = (counts[s] / total) * 100;
    if(pct < 0.1) continue;
    html += `<span class="stage stage-${s}" style="width:${pct}%" title="${s}: ${counts[s]}/${total}">${pct > 8 ? s : ''}</span>`;
  }
  if(foldedEntities > 0) {
    html += `<span class="stage stage-folded" style="width:auto;padding:0 4px" title="folded entities: ${foldedEntities}">⊕${foldedEntities}</span>`;
  }
  el.innerHTML = html || '<span style="color:var(--dim);font-size:9px;padding:2px 6px">no clauses yet</span>';
}

function renderRegister(){
  let html='';
  if(register.frames.length===0&&register.history.length===0){
    html='<div style="color:var(--dim);padding:20px">No frames generated yet. Process a text first.</div>';
    document.getElementById('register').innerHTML=html;return;
  }

  html+=`<div class="section-label">Active frames · ${register.frames.length}</div>`;
  for(const f of register.frames){
    const pct=Math.round(f.strength*100);
    const barColor=f.drift>0.12?'var(--amber)':'var(--green)';
    html+=`<div class="frame-card">`;
    html+=`<div class="frame-id">${f.id}</div>`;
    html+=`<div class="frame-text">${esc(f.text)}</div>`;
    html+=`<div class="frame-meta">born c${f.generatedAt+1} · confirmed ${f.confirmedBy.length}× · strength ${pct}%</div>`;
    html+=`<div class="frame-bar"><div class="frame-fill" style="width:${pct}%;background:${barColor}"></div></div>`;
    html+=`</div>`;
  }

  html+=`<div class="section-label" style="margin-top:16px">History · ${register.history.length} events</div>`;
  for(const h of register.history){
    const cls=`h-${h.event}`;
    const labels={created:`◆ ${h.frame} born`,refined:`↻ ${h.frame} refined`,confirmed:`✓ ${h.frame}`,surprised:`⚡ ${h.frame}`};
    html+=`<div class="hist-line ${cls}"><strong>c${h.at+1}</strong> ${labels[h.event]||h.event}${h.text?' · '+esc(h.text.slice(0,60)):''}</div>`;
  }
  document.getElementById('register').innerHTML=html;
}

function renderReadings(){
  const readings=window._readings||[];
  if(readings.length===0){
    document.getElementById('readings').innerHTML=`<div style="color:var(--dim);padding:20px">No readings yet. Click "Read All (WebLLM)" after extraction.${correctionCount>0?' ('+correctionCount+' prior corrections in trained centroids)':''}</div>`;
    return;
  }
  const confirmed=readings.filter(r=>r.confirmed).length;
  const corrected=readings.filter(r=>r.reclassified).length;
  const fallbacks=readings.filter(r=>r.fallback).length;
  let html='';

  // EO-op badge — small colored chip for the operator on a revision.
  // REC (frame change) gets the warn color; SYN (refinement) the accent;
  // NUL the dim. Lets you see at a glance whether a revision recast or
  // just sharpened the prior.
  const opBadge = (op, move) => {
    if(!op) return '';
    const col = op === 'REC' ? 'var(--warn)'
      : op === 'SYN' ? 'var(--accent)'
      : op === 'INS' ? '#5588aa'
      : op === 'NUL' ? 'var(--dim)'
      : 'var(--dim)';
    const label = move ? `${op} · ${move}` : op;
    return `<span style="display:inline-block;padding:0 5px;font-size:9px;border:1px solid ${col};color:${col};border-radius:2px;margin-right:6px;font-family:var(--mono);letter-spacing:0.04em">${label}</span>`;
  };

  const hyps = graph.hypotheses || {};
  if(hyps.doc) {
    const docRev = hyps.docRev || 0;
    const revTag = docRev > 0 ? ` <span style="opacity:0.5;font-size:10px;font-weight:normal">rev ${docRev}</span>` : '';
    const lastOpTag = opBadge(hyps.lastMoveOp, hyps.lastMove);
    html+=`<div class="hyp-box hyp-doc"><span class="hyp-label">WORKING HYP · DOC</span>${revTag} ${lastOpTag}${esc(hyps.doc)}</div>`;
    // Show the trail of revisions so you can SEE the reading evolve.
    const priors = hyps.priorDocs || [];
    if(priors.length > 0) {
      html+=`<details style="margin:4px 0 8px 12px;font-size:11px;color:var(--dim)"><summary style="cursor:pointer;opacity:0.7">${priors.length} prior reading${priors.length===1?'':'s'} — overturned</summary>`;
      for(const p of priors) {
        html+=`<div style="padding:2px 0;opacity:0.6">${opBadge(p.supersedingOp, p.supersedingMove)}<span style="opacity:0.5">c${(p.supersededAt||0)+1} ↺</span> <s>${esc(p.text)}</s>${p.why?`<span style="opacity:0.5;margin-left:6px">— ${esc(p.why)}</span>`:''}</div>`;
      }
      html+=`</details>`;
    }
  }
  // Site hypotheses — the model's evolving working hypothesis for who
  // each named site is. The graph IS these hypotheses, not facts. Each
  // revision is stored as an EO event in ent.eoLog (REC when the frame
  // changes, SYN when refined, NUL when held).
  const entHyps = Object.entries(graph.entities || {})
    .filter(([, e]) => e.hypothesis)
    .sort(([, a], [, b]) => (b.mentions?.length || 0) - (a.mentions?.length || 0))
    .slice(0, 10);
  if(entHyps.length > 0) {
    html+=`<div class="section-label" style="margin-top:8px;opacity:0.7">sites · working hypotheses (revisable)</div>`;
    for(const [, e] of entHyps) {
      const priors = e.priorHypotheses || [];
      const rev = e.hypothesisRev || 0;
      const lastOp = opBadge(e.lastMoveOp, e.lastMove);
      html+=`<div class="hyp-box" style="background:rgba(92,224,160,0.04);border-left:3px solid var(--green);font-size:12px">`;
      html+=`<span class="hyp-label" style="color:var(--green)">${esc(e.name)}</span>`;
      if(rev > 0) html+=` <span style="opacity:0.45;font-size:10px">rev ${rev}</span>`;
      html+=` ${lastOp}${esc(e.hypothesis)}`;
      if(priors.length > 0) {
        html+=`<details style="margin-top:2px"><summary style="cursor:pointer;font-size:10px;opacity:0.5">${priors.length} overturned</summary>`;
        for(const p of priors) {
          html+=`<div style="padding:1px 0;font-size:10px;opacity:0.55">${opBadge(p.supersedingOp, p.supersedingMove)}<span style="opacity:0.5">c${(p.supersededAt||0)+1} ↺</span> <s>${esc(p.text)}</s>${p.why?`<span style="opacity:0.5;margin-left:6px">— ${esc(p.why)}</span>`:''}</div>`;
        }
        html+=`</details>`;
      }
      html+=`</div>`;
    }
  }
  if(hyps.sections && hyps.sections.length > 0) {
    for(const s of hyps.sections) {
      html+=`<div class="hyp-box hyp-sec"><span class="hyp-label">SEC c${s.from+1}–${s.to+1}</span> ${esc(s.text)}</div>`;
    }
  }

  html+=`<div class="section-label" style="margin-top:12px">${readings.length} clauses · ✓${confirmed} confirmed · ✎${corrected} corrected · ⊘${fallbacks} fallback · ${correctionCount} learned</div>`;

  const health = graph.health;
  if(health) {
    const icon = health.score > 60 ? '🟢' : health.score > 30 ? '🟡' : '🔴';
    html+=`<div class="hyp-box" style="background:rgba(111,163,247,0.05);border-left:3px solid var(--accent);margin-top:8px">`;
    html+=`<span class="hyp-label">HEALTH</span> ${icon} ${health.score}% `;
    html+=`<span style="opacity:0.6;font-size:11px">confirm ${health.confirmation}% · entropy ${health.entropy}% · fallback ${health.fallback}%`;
    if(health.dominance > 60) html+=` · ⚠ ${health.dominantOp} at ${health.dominance}%`;
    html+=`</span>`;
    if(graph.genre) html+=` <span style="opacity:0.5;font-size:10px">· ${graph.genre}</span>`;
    html+=`</div>`;
  }

  const showAll = readings.length < 60;
  const hasReadingContent = (r) => r.reading && ((r.reading.facts||[]).length || (r.reading.relations||[]).length || (r.reading.judgments||[]).length);
  const toShow = showAll ? readings : readings.filter(r => r.reclassified || r.fallback || r.same || r.readLink || r.fn || r.hyp || hasReadingContent(r));

  let lastHyp = '';
  for(const r of toShow){
    const isConfirmed = r.confirmed && !r.fallback;
    const isFallback = r.fallback;
    const hypChanged = r.hyp && r.hyp !== lastHyp;
    const stance = r.readStance || r.mechanicalStance || '';

    html+=`<div class="reading-result" style="${isConfirmed && !hypChanged ? 'opacity:0.35' : isFallback ? 'opacity:0.5' : ''}">`;
    html+=`<div class="reading-clause">${esc((r.clause||'').slice(0,200))}</div>`;
    html+=`<div class="reading-tags">`;
    if(isFallback){
      html+=`<span class="tag" style="background:rgba(239,68,68,0.08);color:var(--red)">⊘</span>`;
      html+=`<span class="tag tag-op" style="border-color:${OP_COLORS[r.mechanicalOp]};color:${OP_COLORS[r.mechanicalOp]}">${r.mechanicalOp}(${r.mechanicalSite}, ${r.mechanicalStance||''})</span>`;
    } else if(isConfirmed){
      html+=`<span class="tag" style="background:rgba(92,224,160,0.08);color:var(--green)">✓</span>`;
      html+=`<span class="tag tag-op" style="border-color:${OP_COLORS[r.readOp]};color:${OP_COLORS[r.readOp]}">${r.readOp}(${r.readSite}, ${stance})</span>`;
    } else if(r.reclassified){
      html+=`<span class="tag tag-op tag-reclassified" style="border-color:${OP_COLORS[r.mechanicalOp]};color:${OP_COLORS[r.mechanicalOp]}">${r.mechanicalOp}(${r.mechanicalSite}, ${r.mechanicalStance||''})</span>`;
      html+=`<span class="tag tag-op" style="border-color:${OP_COLORS[r.readOp]};color:${OP_COLORS[r.readOp]}">${r.readOp}(${r.readSite}, ${stance})</span>`;
    } else {
      html+=`<span class="tag tag-op" style="border-color:${OP_COLORS[r.readOp]};color:${OP_COLORS[r.readOp]}">${r.readOp}(${r.readSite}, ${stance})</span>`;
    }
    if(r.readLink) html+=`<span class="tag" style="background:rgba(111,163,247,0.1);color:var(--accent)">⟷ ${r.readLink}</span>`;
    if(r.same) html+=`<span class="tag" style="background:rgba(92,224,160,0.1);color:var(--green)">≡ ${r.same}</span>`;
    if(r.fn) html+=`<span class="tag-fn">${esc(r.fn)}</span>`;
    html+=`</div>`;

    // The actual reading: what the model said this clause was about.
    const rd = r.reading;
    const hasRead = rd && ((rd.facts && rd.facts.length) || (rd.relations && rd.relations.length) || (rd.judgments && rd.judgments.length));
    if(hasRead) {
      html+=`<div class="reading-detail" style="margin:4px 0 6px 0;padding:4px 8px;border-left:2px solid var(--accent);background:rgba(111,163,247,0.04);font-size:11px;line-height:1.5">`;
      for(const f of (rd.facts || []).slice(0, 4)) {
        html+=`<div style="color:var(--text)"><span style="color:var(--green)">${esc(f.e)}</span> <span style="color:var(--dim)">→</span> ${esc(f.says)}</div>`;
      }
      for(const rel of (rd.relations || []).slice(0, 2)) {
        html+=`<div style="color:var(--accent)">${esc(rel.from)} <span style="opacity:0.7">[${esc(rel.how)}]</span> ${esc(rel.to)}</div>`;
      }
      for(const jdg of (rd.judgments || []).slice(0, 2)) {
        const mark = jdg.holds ? '✓' : '✗';
        const col = jdg.holds ? 'var(--green)' : 'var(--red)';
        html+=`<div style="color:${col}">${mark} <span style="color:var(--text)">${esc(jdg.about)}:</span> ${esc(jdg.claim)}</div>`;
      }
      html+=`</div>`;
    }
    if(hypChanged) {
      const prevWords = new Set(lastHyp.toLowerCase().split(/\s+/));
      const newWords = new Set(r.hyp.toLowerCase().split(/\s+/));
      const overlap = [...newWords].filter(w => prevWords.has(w)).length;
      const similarity = prevWords.size > 0 ? overlap / Math.max(prevWords.size, newWords.size) : 0;
      if(similarity < 0.7) {
        html+=`<div class="hyp-inline">→ ${esc(r.hyp)}</div>`;
        lastHyp = r.hyp;
      }
    }
    html+=`</div>`;
  }
  if(!showAll) html+=`<div style="color:var(--dim);padding:8px;font-size:10px">${confirmed} confirmed hidden. ${toShow.length} notable shown.</div>`;
  document.getElementById('readings').innerHTML=html;
}

const LOG_ENDPOINT = 'https://n8n.intelechia.com/webhook/site/publish';
const FEED_ENDPOINT = 'https://n8n.intelechia.com/webhook/site/feed';
const LOG_AUTH = 'Bearer Provoking0-Cranium7-Penpal4-Childlike0-Uranium9';

async function publishToLog(entries) {
  try {
    await fetch(LOG_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': LOG_AUTH },
      body: JSON.stringify({ entries }),
    });
  } catch(e) { console.warn('Publish failed:', e); }
}

async function fetchFromLog(query) {
  try {
    const params = new URLSearchParams(query);
    const res = await fetch(`${FEED_ENDPOINT}?${params}`);
    return await res.json();
  } catch(e) { console.warn('Feed fetch failed:', e); return { posts: [] }; }
}

function detectGenre(text, url) {
  if(register.clauseVecs && register.clauseVecs.length > 0) {
    const docVec = averageVec(register.clauseVecs.map(c => c.vec));
    graph.genreVec = docVec;
  }

  if(/wikipedia\.org/i.test(url)) return 'encyclopedia';
  if(/npr\.org|gothamist|nytimes|washingtonpost|reuters|apnews|cnn\.com|bbc\.com/i.test(url)) return 'news';
  if(/substack|medium\.com|blog/i.test(url)) return 'essay';
  if(/arxiv|doi\.org|pubmed|scholar/i.test(url)) return 'academic';
  if(/github\.com/i.test(url)) return 'technical';
  return 'general';
}

async function matchGenreByEmbedding(docVec) {
  const feed = await fetchFromLog({ op: 'DEF', site: 'Kind', limit: 50 });
  if(!feed.posts || feed.posts.length === 0) return null;

  let bestGenre = null, bestSim = -1;
  for(const post of feed.posts) {
    if(post.payload?.genreVec) {
      const sim = cosSim(docVec, post.payload.genreVec);
      if(sim > bestSim) { bestSim = sim; bestGenre = post.slug?.replace('genre:',''); }
    }
  }
  return bestSim > 0.7 ? bestGenre : null;
}

async function publishReadingSession(source, genre, model, readings, hypotheses, centroidSnapshot) {
  const ts = new Date().toISOString();
  const corrections = readings.filter(r => r.reclassified);
  const confirmed = readings.filter(r => r.confirmed);

  const entries = [];

  entries.push({
    op: 'DEF', site: 'Entity', stance: 'Tracing',
    slug: `reading:${ts.slice(0,10)}:${source.slice(0,60).replace(/[^a-zA-Z0-9]/g,'-')}`,
    genre,
    payload: {
      source, model, genre, ts,
      clauses: readings.length,
      corrections: corrections.length,
      confirmed: confirmed.length,
      fallbacks: readings.filter(r => r.fallback).length,
      docHypothesis: hypotheses?.doc || null,
      sectionCount: hypotheses?.sections?.length || 0,
    }
  });

  if(centroidSnapshot) {
    entries.push({
      op: 'DEF', site: 'Paradigm', stance: 'Composing',
      slug: `centroids:${genre}`,
      genre,
      payload: centroidSnapshot,
    });
  }

  const opDist = {};
  for(const r of readings) { opDist[r.readOp] = (opDist[r.readOp]||0) + 1; }
  entries.push({
    op: 'DEF', site: 'Network', stance: 'Tracing',
    slug: `distribution:${genre}:${ts.slice(0,10)}`,
    genre,
    payload: { operators: opDist, total: readings.length },
  });

  for(const c of corrections.slice(0, 20)) {
    entries.push({
      op: 'EVA', site: 'Lens', stance: 'Dissecting',
      slug: `correction:${genre}`,
      genre,
      payload: {
        clause: (c.clause||'').slice(0,100),
        shadow: `${c.mechanicalOp}(${c.mechanicalSite}, ${c.mechanicalStance})`,
        reader: `${c.readOp}(${c.readSite}, ${c.readStance})`,
        fn: c.fn,
        model,
      }
    });
  }

  const chromeResults = allResults.filter(r => r.rawType === 'chrome');
  if(chromeResults.length > 0) {
    const hashes = [...new Set(chromeResults.map(r => r.chromeHash).filter(Boolean))].slice(0, 20);
    const byReason = { pattern: 0, structural: 0 };
    for(const r of chromeResults) byReason[r.chromeReason] = (byReason[r.chromeReason]||0) + 1;
    entries.push({
      op: 'DEF', site: 'Kind', stance: 'Clearing',
      slug: `chrome:${genre}`,
      genre,
      payload: {
        chromeFiltered: chromeResults.length,
        totalClauses: allResults.length,
        byReason,
        hashes,
      }
    });
  }

  await publishToLog(entries);
  return entries.length;
}

async function loadGenreCentroids(genre) {
  const feed = await fetchFromLog({ slug: `centroids:${genre}`, limit: 1 });
  if(feed.posts && feed.posts.length > 0) {
    const latest = feed.posts[feed.posts.length - 1];
    if(latest.payload) {
      return latest.payload;
    }
  }
  return null;
}

//  Health metrics + self-teaching loop
// ═══════════════════════════════════════════════════════════

function computeHealth(readings) {
  if(readings.length === 0) return { score: 0, confirmation: 0, entropy: 0, fallback: 0, details: {} };

  const confirmed = readings.filter(r => r.confirmed).length;
  const fallbacks = readings.filter(r => r.fallback).length;
  const total = readings.length;

  const confirmRate = total > 0 ? confirmed / total : 0;
  const fallbackRate = total > 0 ? fallbacks / total : 0;

  const opCounts = {};
  for(const r of readings) { opCounts[r.readOp] = (opCounts[r.readOp]||0) + 1; }
  const ops = Object.values(opCounts);
  const sum = ops.reduce((a,b) => a+b, 0);
  let entropy = 0;
  if(sum > 0) {
    for(const c of ops) {
      const p = c / sum;
      if(p > 0) entropy -= p * Math.log2(p);
    }
  }
  const maxEntropy = Math.log2(9);
  const normEntropy = maxEntropy > 0 ? entropy / maxEntropy : 0;

  const dominant = Object.entries(opCounts).sort((a,b) => b[1]-a[1])[0];
  const dominance = dominant ? dominant[1] / sum : 0;

  const score = confirmRate * normEntropy * (1 - fallbackRate);

  return {
    score: Math.round(score * 100),
    confirmation: Math.round(confirmRate * 100),
    entropy: Math.round(normEntropy * 100),
    fallback: Math.round(fallbackRate * 100),
    dominantOp: dominant ? dominant[0] : null,
    dominance: Math.round(dominance * 100),
    details: opCounts,
  };
}

function discoverChrome(readings, errors) {
  const candidates = [];
  for(const r of readings.filter(r => r.fallback)) {
    const text = r.clause || '';
    const words = text.split(/\s+/).length;
    const caps = text.split(/\s+/).filter(w => /^[A-Z]/.test(w)).length;
    const hasVerb = /\b(is|was|are|were|has|have|had|said|says|told|made|took|gave|went|came|got)\b/i.test(text);
    if(words < 20 && caps/words > 0.5 && !hasVerb) {
      const sigWords = text.split(/\s+/).filter(w => w.length > 3).slice(0,3).map(w => w.toLowerCase());
      if(sigWords.length >= 2) {
        candidates.push({
          sample: text.slice(0, 80),
          pattern: sigWords.join('|'),
          confidence: 0.6 + (caps/words * 0.3),
        });
      }
    }
  }
  return candidates;
}

async function publishHealth(genre, health, chromeDiscoveries) {
  const entries = [];

  entries.push({
    op: 'EVA', site: 'Paradigm', stance: 'Tracing',
    slug: `health:${genre}`,
    genre,
    payload: health,
  });

  for(const disc of chromeDiscoveries) {
    entries.push({
      op: 'INS', site: 'Kind', stance: 'Clearing',
      slug: `chrome:${genre}:discovered`,
      genre,
      payload: disc,
    });
  }

  if(entries.length > 0) await publishToLog(entries);
  return entries.length;
}

async function loadDiscoveredChrome(genre) {
  const feed = await fetchFromLog({ slug: `chrome:${genre}:discovered`, limit: 50 });
  if(feed.posts && feed.posts.length > 0) {
    const patterns = feed.posts
      .filter(p => p.payload?.pattern && p.payload?.confidence > 0.7)
      .map(p => p.payload.pattern);
    return patterns;
  }
  return [];
}


// ═══════════════════════════════════════════════════════════
//  γ — The Horizon (availability function)
// ═══════════════════════════════════════════════════════════

if(!graph.computedFolds) graph.computedFolds = {};

async function computeEntityFold(entityName, ent, streamEl, cursor) {
  const canonical = resolveEntity(entityName);
  const cursorKey = cursor !== undefined ? `${canonical}@${cursor}` : canonical;
  if(graph.computedFolds[cursorKey]) return graph.computedFolds[cursorKey];

  const maxClause = cursor !== undefined ? cursor : Infinity;

  const log = (msg, style) => {
    if(!streamEl) return;
    const line = document.createElement('div');
    line.style.cssText = `font-size:10px;font-family:var(--mono);margin:1px 0;line-height:1.4;${style||'color:var(--dim)'}`;
    line.textContent = msg;
    streamEl.appendChild(line);
    streamEl.scrollTop = streamEl.scrollHeight;
  };

  log(`thinking about ${canonical}…`);

  const merged = getEntityClaims(entityName);

  const entityClauses = [];
  const mentions = merged.mentions || [];
  for(const idx of mentions) {
    if(idx > maxClause) continue;
    const clause = graph.clauses.find(c => c.index === idx);
    if(clause && !isChromey(clause.text)) entityClauses.push(clause);
  }
  const searchNames = [canonical];
  for(const m of (graph.merges||[])) {
    if(m.full === canonical) searchNames.push(m.short);
    if(m.short === canonical) searchNames.push(m.full);
  }
  for(const c of graph.clauses) {
    if(c.index > maxClause) continue;
    const cLower = c.text.toLowerCase();
    if(searchNames.some(n => cLower.includes(n)) && !entityClauses.find(ec => ec.index === c.index)) {
      if(!isChromey(c.text)) entityClauses.push(c);
    }
  }
  entityClauses.sort((a,b) => a.index - b.index);
  if(entityClauses.length === 0) { log('no mentions found.'); return null; }

  log(`found ${entityClauses.length} mentions`);

  const sections = (graph.hypotheses?.sections || []).filter(s =>
    entityClauses.some(c => c.index >= s.from && c.index <= s.to)
  );

  const trajectory = [];
  for(const c of entityClauses) {
    const r = allResults.find(ar => ar.clauseIndex === c.index);
    if(r) trajectory.push({ op: r.operator?.name || '?', site: r.terrain?.name || '?', text: c.text.slice(0, 120) });
  }
  log(`trajectory: ${trajectory.map(t => t.op).join('→')}`);

  let foldText = '';
  let gpuHealthy = true;
  if(llmEngine && entityClauses.length > 0) {
    const batches = [];
    for(let i = 0; i < entityClauses.length; i += 5) batches.push(entityClauses.slice(i, i + 5));

    for(const batch of batches) {
      for(const c of batch) log(`  c${c.index+1}: ${c.text.slice(0, 70)}`, 'color:var(--text);opacity:0.5');
      // Span cursor: follow the walk
      if(batch[0] && typeof window.setSpanCursor === 'function') window.setSpanCursor(batch[0].index, 'walk');
      // Per-clause stage: 'walked' (unless already at 'read' or 'folded')
      for(const c of batch) {
        const gc = graph.clauses.find(gc => gc.index === c.index);
        if(gc && gc.stage === 'extracted') gc.stage = 'walked';
      }

      try {
        const batchText = batch.map(c => c.text.slice(0, 200)).join('\n');
        const prompt = foldText
          ? `Current understanding of ${entityName}:\n"${foldText}"\n\nNew text about ${entityName}:\n${batchText}\n\nRevise your understanding of ${entityName} into one sentence. Keep what holds. Add what's new.`
          : `These sentences mention ${entityName}:\n${batchText}\n\nWhat do we know about ${entityName} from this? One sentence.`;

        // Live streaming line in the think panel.
        let liveLine = null;
        if(streamEl) {
          liveLine = document.createElement('div');
          liveLine.style.cssText = 'font-size:10px;font-family:var(--mono);margin:1px 0;line-height:1.4;color:var(--amber)';
          liveLine.textContent = '  → ';
          streamEl.appendChild(liveLine);
        }

        const rawFold = await streamWebLLM(llmEngine, {
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 50, temperature: 0.1,
        }, (full) => {
          if(liveLine) {
            liveLine.textContent = `  → ${full}`;
            if(streamEl) streamEl.scrollTop = streamEl.scrollHeight;
          }
        });
        foldText = stripPreamble((rawFold || '').trim());
        if(liveLine) liveLine.textContent = `  → ${foldText}`;
        else log(`  → ${foldText}`, 'color:var(--amber)');
      } catch(e) {
        log(`  ✗ ${e.message || 'error'}`, 'color:var(--red)');
        if(String(e.message||'').includes('GPU') || String(e.message||'').includes('mapAsync')) gpuHealthy = false;
        break;
      }
    }
  }

  if(!foldText) {
    const seen = new Set();
    foldText = trajectory.slice(0, 5).map(t => {
      const key = t.text.slice(0,40);
      if(seen.has(key)) return null;
      seen.add(key);
      return `[${t.op}] ${t.text.slice(0, 80)}`;
    }).filter(Boolean).join('\n');
  }

  log(`fold complete.`, 'color:var(--green)');

  const fold = {
    entity: canonical,
    text: foldText,
    trajectory: trajectory.map(t => `${t.op}(${t.site})`).join('→'),
    clauseIndices: entityClauses.map(c => c.index),
    sections: sections.map(s => s.text),
    mentions: entityClauses.length,
    computedAt: new Date().toISOString(),
    gpuHealthy,
  };

  graph.computedFolds[cursorKey] = fold;
  // Bump entity stage to 'folded' so the comprehension cursor reflects depth
  if(ent) ent.stage = 'folded';
  for(const [k, e] of Object.entries(graph.entities)) {
    if(resolveEntity(k) === canonical) e.stage = 'folded';
  }
  emit('DEF', 'Entity', 'Tracing', `fold:${canonical}@${cursor||'end'}`, foldText.slice(0, 80));

  try {
    await publishToLog([{
      op: 'DEF', site: 'Entity', stance: 'Tracing',
      slug: `fold:${entityName.toLowerCase().replace(/\s+/g,'-')}`,
      genre: currentGenre,
      holon: 'entity',
      payload: fold,
    }]);
  } catch(e) {}

  return fold;
}

function resolveEntity(name) {
  if(!graph.merges || graph.merges.length === 0) return name;
  const lower = name.toLowerCase();
  for(const m of graph.merges) {
    if(m.short === lower) return m.full;
  }
  return lower;
}

function getEntityClaims(name) {
  const canonical = resolveEntity(name);
  const claims = [];
  const mentions = [];
  for(const [key, ent] of Object.entries(graph.entities)) {
    const resolved = resolveEntity(key);
    if(resolved === canonical) {
      claims.push(...(ent.claims || []));
      mentions.push(...(ent.mentions || []));
    }
  }
  return { claims, mentions: [...new Set(mentions)].sort((a,b) => a-b), canonical };
}

async function horizon(question, opts = {}) {
  const maxTokens = opts.maxTokens || 2048;
  const maxContextTokens = opts.maxContext || 500;

  if(!graph.clauses.length) return { context: '', clauses: [], entities: [], error: 'No text loaded' };

  let qVec = null;
  if(embedder && embeddingsReady) {
    try { qVec = await embed(question); } catch(e) { qVec = null; }
  }
  if(!qVec) {
    try {
      const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1');
      embedder = await pipeline('feature-extraction','Xenova/all-MiniLM-L6-v2',{dtype:'fp32'});
      embeddingsReady = true;
      qVec = await embed(question);
    } catch(e) { qVec = null; }
  }

  const qLower = question.toLowerCase();
  const qWords = qLower.split(/\s+/).filter(w => w.length > 3);

  const chromeIndices = new Set(allResults.filter(r => r.rawType === 'chrome' || r.rawType === 'inert').map(r => r.clauseIndex));
  const contentClauses = graph.clauses.filter(c => !chromeIndices.has(c.index) && !isChromey(c.text));

  const isWhoQ = /\bwho\b/i.test(question);
  const isWhatQ = /\bwhat\b.*\babout\b|\bwhat happened|\bwhat is this/i.test(question);
  const isWhyQ = /\bwhy\b/i.test(question);
  const isSaidQ = /\bsaid\b|\bsay\b|\bquote\b|\baccording/i.test(question);
  const preferOps = isWhatQ ? ['DEF','INS'] : isWhyQ ? ['EVA','CON'] : isSaidQ ? ['EVA'] : [];

  const readIndices = new Set(allResults.filter(r => r.reclassified || r.confirmed).map(r => r.clauseIndex));
  const readProgress = readIndices.size > 0 ? Math.max(...readIndices) : -1;
  const totalContent = contentClauses.length;
  const readFraction = readIndices.size / Math.max(totalContent, 1);
  // Posture: when reading is far from done, the graph IS the read.
  // Don't penalize unread evidence — give it a small bonus (surprise weight).
  const walking = readFraction < 0.6;
  const unreadPenalty = walking ? (1.0 + 0.25 * (1 - readFraction)) : (SEARCH_PARAMS.unreadFloor + (1 - SEARCH_PARAMS.unreadFloor) * readFraction);
  const readBonus    = walking ? 1.0 : (1 + SEARCH_PARAMS.readBonusBase * (1 - readFraction));

  let rankedClauses;
  if(qVec) {
    rankedClauses = contentClauses
      .map(c => {
        const cv = register.clauseVecs.find(v => v.index === c.index);
        if(!cv) return null;
        let score = cosSim(qVec, cv.vec);

        const cLower = c.text.toLowerCase();
        const keywordHits = qWords.filter(w => cLower.includes(w)).length;
        if(keywordHits > 0) score += SEARCH_PARAMS.keywordWeight * (keywordHits / Math.max(qWords.length, 1));

        const isRead = readIndices.has(c.index);
        score *= isRead ? readBonus : unreadPenalty;

        const r = allResults.find(ar => ar.clauseIndex === c.index);

        if(r && preferOps.length > 0 && preferOps.includes(r.operator?.name)) score *= 1.2;

        if(r?.centrality) score *= (0.7 + 0.6 * r.centrality);

        if(isSaidQ && r?.quoteState?.depth > 0) score *= 1.3;

        if(c.index < SEARCH_PARAMS.earlyWindow) score *= SEARCH_PARAMS.earlyBonus;

        const isSurprise = graph.surprises?.some(s => s.index === c.index);
        if(isSurprise) score *= 1.4;

        if(opts.sectionRange && window._computeSurprises) {
          const localSurprises = window._computeSurprises(opts.sectionRange[0], opts.sectionRange[1]);
          if(localSurprises.some(s => s.index === c.index)) score *= 1.3;
        }

        return { ...c, sim: score, isRead };
      })
      .filter(Boolean)
      .sort((a, b) => b.sim - a.sim);
  } else {
    rankedClauses = contentClauses
      .map(c => {
        const hits = qWords.filter(w => c.text.toLowerCase().includes(w)).length;
        let score = hits / Math.max(qWords.length, 1);
        const isRead = readIndices.has(c.index);
        score *= isRead ? readBonus : unreadPenalty;
        if(c.index < 15) score *= 1.3;
        return { ...c, sim: score, isRead };
      })
      .filter(c => c.sim > 0)
      .sort((a, b) => b.sim - a.sim);
  }

  const STATE_ABBREVS = {MN:'minnesota',CA:'california',NY:'new york',TX:'texas',FL:'florida',IL:'illinois',PA:'pennsylvania',OH:'ohio',NC:'north carolina',HI:'hawaii'};
  let expandedQ = qLower;
  for(const [abbr, full] of Object.entries(STATE_ABBREVS)) {
    if(qLower.includes(abbr.toLowerCase())) expandedQ += ' ' + full;
  }
  const expandedWords = expandedQ.split(/\s+/).filter(w => w.length > 2);

  const GARBAGE_ENTITIES = /^(rep|sen|gov|mr|ms|mrs|dr|inc|ltd|the|a|an|but|and|or|not)$/i;

  const relevantEntities = Object.entries(graph.entities)
    .filter(([key]) => key.length >= 3 && !GARBAGE_ENTITIES.test(key))
    .map(([key, ent]) => {
      const nameMatch = expandedQ.includes(key) ? 1.0 : 0;
      const claimText = (ent.claims||[]).map(c => (c.value||'')+(c.span||'')).join(' ').toLowerCase();
      const claimMatch = expandedWords.some(w => claimText.includes(w)) ? 0.5 : 0;
      const vecSim = (qVec && graph.vectors[key]) ? cosSim(qVec, graph.vectors[key]) : 0;
      return { key, ent, relevance: Math.max(nameMatch, claimMatch, vecSim) };
    })
    .filter(e => e.relevance > 0.3)
    .sort((a, b) => b.relevance - a.relevance)
    .slice(0, 5);

  let bestSection = null;
  if(graph.hypotheses?.sections) {
    for(const sec of graph.hypotheses.sections) {
      const overlap = sec.text.toLowerCase().split(/\s+/).filter(w => qLower.includes(w)).length;
      if(!bestSection || overlap > bestSection.overlap) bestSection = { ...sec, overlap };
    }
  }

  // A2: synchronous on-demand folds for top entities the reader hasn't reached.
  // A3: edge-driven co-occurrence walk — read ent.edges (populated at ingest)
  // and pull top sibling spans into the evidence pool.
  const folds = [];
  const foldProvenance = []; // { key, source: 'cached' | 'walked' | 'quick' }
  const entsNeedingFolds = [];
  const FOLD_BUDGET_MS = 15000;
  const MAX_ON_DEMAND_FOLDS = 3;
  const foldStart = Date.now();

  for(const { key, ent } of relevantEntities) {
    const cached = graph.computedFolds[key];
    if(cached && cached.text) {
      folds.push(`${ent.name}: ${cached.text} [${(cached.trajectory||'').slice(0,60)}]`);
      foldProvenance.push({ key: ent.name, source: 'cached' });
      continue;
    }
    const mentions = ent.mentions || [];
    const unreachedByReader = mentions.some(m => m > readProgress);
    const walkedCount = foldProvenance.filter(p => p.source === 'walked').length;
    const canBudget = (Date.now() - foldStart) < FOLD_BUDGET_MS && walkedCount < MAX_ON_DEMAND_FOLDS;
    if(walking && unreachedByReader && canBudget && (typeof llmEngine !== 'undefined') && llmEngine) {
      try {
        const fold = await computeEntityFold(key, ent);
        if(fold && fold.text) {
          folds.push(`${ent.name}: ${fold.text}`);
          foldProvenance.push({ key: ent.name, source: 'walked' });
          continue;
        }
      } catch(e) {}
    }
    const claims = (ent.claims||[]).slice(0, 5);
    const quickFold = claims.map(c => {
      const text = (c.span||c.value||'').replace(new RegExp(ent.name,'gi'),'').trim().slice(0,60);
      return text.length > 5 ? `[${c.operator||'?'}] ${text}` : null;
    }).filter(Boolean).join('. ');
    if(quickFold) {
      folds.push(`${ent.name}: ${quickFold}`);
      foldProvenance.push({ key: ent.name, source: 'quick' });
    }
    entsNeedingFolds.push({ key, ent });
  }

  // Background-fill remaining folds for next time
  if(entsNeedingFolds.length > 0) {
    setTimeout(async () => {
      for(const { key, ent } of entsNeedingFolds) {
        try { await computeEntityFold(key, ent); } catch(e) {}
      }
    }, 100);
  }

  // A3: sibling entities via populated edges (or lazy intersection fallback)
  const siblings = [];
  const seedKeys = new Set(relevantEntities.map(re => re.key));
  const edgeAgg = new Map(); // siblingKey -> { ent, count }
  for(const { ent } of relevantEntities) {
    for(const e of (ent.edges || [])) {
      if(seedKeys.has(e.key)) continue;
      const target = graph.entities[e.key];
      if(!target) continue;
      const cur = edgeAgg.get(e.key) || { ent: target, count: 0 };
      cur.count += e.count;
      edgeAgg.set(e.key, cur);
    }
  }
  // Lazy fallback if edges aren't populated yet
  if(edgeAgg.size === 0 && relevantEntities.length > 0) {
    const seedSets = relevantEntities.map(re => ({ key: re.key, set: new Set(re.ent.mentions || []) }));
    for(const [k, e] of Object.entries(graph.entities)) {
      if(seedKeys.has(k) || k.length < 3 || GARBAGE_ENTITIES.test(k)) continue;
      const m = e.mentions || [];
      if(m.length < 2) continue;
      let overlap = 0;
      for(const idx of m) if(seedSets.some(s => s.set.has(idx))) overlap++;
      if(overlap >= 2) edgeAgg.set(k, { ent: e, count: overlap });
    }
  }
  const topSiblings = [...edgeAgg.entries()]
    .sort((a, b) => b[1].count - a[1].count)
    .slice(0, 3)
    .map(([k, v]) => v.ent);
  for(const sib of topSiblings) {
    const span = (sib.claims||[]).map(c => c.span).filter(Boolean)[0];
    if(span) folds.push(`(co-occurring) ${sib.name}: ${span.slice(0, 100)}`);
  }

  let context = '';
  let charBudget = maxContextTokens * 4;

  if(graph.hypotheses?.doc) {
    const line = `Doc: ${graph.hypotheses.doc}\n`;
    context += line; charBudget -= line.length;
  }

  if(bestSection?.text) {
    const line = `Section: ${bestSection.text}\n`;
    context += line; charBudget -= line.length;
  }

  for(const fold of folds) {
    const line = fold.slice(0, 120) + '\n';
    if(charBudget - line.length < 200) break;
    context += line; charBudget -= line.length;
  }

  // A4: clause-neighborhood expansion — include prev/next clauses with each
  // top-ranked evidence clause so the model sees the local context.
  context += '\nEvidence:\n';
  const evidenceClauses = [];
  const includedIdx = new Set();
  for(const c of rankedClauses.slice(0, 8)) {
    if(includedIdx.has(c.index)) continue;
    const prev = graph.clauses.find(cl => cl.index === c.index - 1);
    const next = graph.clauses.find(cl => cl.index === c.index + 1);
    const neighborhood = [prev, c, next].filter(Boolean);
    const marker = c.isRead ? '' : '*';
    const line = `[c${c.index+1}${marker}±1] ` + neighborhood.map(n => (n.text||'').slice(0, 90)).join(' / ') + '\n';
    if(charBudget - line.length < 0) break;
    context += line; charBudget -= line.length;
    evidenceClauses.push(c);
    neighborhood.forEach(n => includedIdx.add(n.index));
  }

  // A5: just-in-time mini-read of top unread evidence (LLM-classify before answering)
  const miniReads = [];
  if(walking && (typeof llmEngine !== 'undefined') && llmEngine) {
    const MINI_READ_N = 3;
    const MINI_READ_BUDGET_MS = 8000;
    const miniStart = Date.now();
    const unreadEvidence = evidenceClauses
      .filter(c => !readIndices.has(c.index))
      .slice(0, MINI_READ_N);
    for(const c of unreadEvidence) {
      if(Date.now() - miniStart > MINI_READ_BUDGET_MS) break;
      try {
        const prev = graph.clauses.find(cl => cl.index === c.index - 1);
        const userMsg = (prev ? (prev.text||'').slice(0,80) + '\n' : '') + `>>> ${(c.text||'').slice(0,180)} <<<`;
        const reply = await llmEngine.chat.completions.create({
          messages: [
            { role: 'system', content: 'Summarize the marked clause in 6 words. JSON only: {"fn":"<six words>"}' },
            { role: 'user', content: userMsg },
          ],
          max_tokens: 50, temperature: 0.1,
        });
        const m = (reply.choices[0]?.message?.content || '').match(/\{[^}]+\}/);
        if(m) {
          let parsed;
          try { parsed = JSON.parse(m[0]); } catch(e) { parsed = null; }
          if(parsed?.fn) {
            miniReads.push({ index: c.index, fn: String(parsed.fn).slice(0,60) });
            const gc = graph.clauses.find(cl => cl.index === c.index);
            if(gc && (gc.stage === 'extracted' || gc.stage === 'walked')) gc.stage = 'mini-read';
          }
        }
      } catch(e) {}
    }
  }
  for(const mr of miniReads) {
    const line = `[c${mr.index+1} just-read] ${mr.fn}\n`;
    if(charBudget - line.length >= 0) { context += line; charBudget -= line.length; }
  }

  return {
    context,
    clauses: evidenceClauses,
    entities: relevantEntities.map(e => e.ent),
    folds,
    foldProvenance,
    miniReads,
    siblings: topSiblings.map(s => s.name),
    walking,
    section: bestSection,
    docHypothesis: graph.hypotheses?.doc,
  };
}
