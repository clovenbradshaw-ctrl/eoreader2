async function exportLog() {
  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const lines = [];
  const hr = '═'.repeat(64);
  const hr2 = '─'.repeat(64);

  lines.push('EO READER — SESSION LOG');
  lines.push(`Exported   ${new Date().toISOString()}`);
  lines.push(`Source     ${document.getElementById('url-input').value || '(pasted text)'}`);
  lines.push(`Genre      ${graph.genre || 'unknown'}`);
  if(graph.health) {
    const h = graph.health;
    const icon = h.score > 60 ? '🟢' : h.score > 30 ? '🟡' : '🔴';
    lines.push(`Health     ${icon} ${h.score}% (confirm ${h.confirmation}% entropy ${h.entropy}% fallback ${h.fallback}%${h.dominance > 60 ? ' ⚠'+h.dominantOp+' '+h.dominance+'%' : ''})`);
  }
  lines.push('');

  const inertCount = allResults.filter(r=>r.rawType==='inert').length;
  const revivedCount = allResults.filter(r=>r.rawType==='revived').length;
  const flaggedCount = allResults.filter(r=>r.needsReading).length;
  const readings = window._readings || [];

  lines.push(hr);
  lines.push('SUMMARY');
  lines.push(hr);
  lines.push(`${graph.clauses.length} clauses · ${Object.keys(graph.entities).length} entities · ${graph.claims.length} claims · ${(graph.bindings||[]).length} bindings · ${propositions.length} propositions`);
  lines.push(`${register.frames.length} frames · ${register.history.length} frame events`);
  const chromeExportCount = allResults.filter(r=>r.rawType==='chrome').length;
  lines.push(`${chromeExportCount} chrome · ${inertCount} inert · ${revivedCount} revived · ${flaggedCount} flagged`);
  if(readings.length>0) lines.push(`${readings.length} read · ${readings.filter(r=>r.reclassified).length} reclassified · ${readings.filter(r=>r.confirmed).length} confirmed`);
  const modelName = document.getElementById('model-select')?.selectedOptions[0]?.text || 'unknown';
  lines.push(`model: ${modelName}`);
  lines.push(`centroid corrections: ${correctionCount}`);

  const ops = {};
  for(const r of allResults.filter(r=>r.rawType==='clause')) ops[r.operator.name]=(ops[r.operator.name]||0)+1;
  lines.push('');
  for(const[op,ct] of Object.entries(ops).sort((a,b)=>b[1]-a[1])) {
    const pct = allResults.filter(r=>r.rawType==='clause').length > 0
      ? Math.round(ct / allResults.filter(r=>r.rawType==='clause').length * 100) : 0;
    lines.push(`${op.padEnd(4)} ${String(ct).padStart(4)} (${pct}%)`);
  }

  lines.push('');
  lines.push(hr);
  lines.push('ENTITIES');
  lines.push(hr);

  const sorted = Object.entries(graph.entities).sort((a,b)=>b[1].claims.length-a[1].claims.length);
  for(const[key,ent] of sorted) {
    const linkTag = ent.isLink ? ' [LINK]' : '';
    lines.push('');
    lines.push(`◆ ${ent.name}${linkTag}  [${ent.claims.length} claims, ${(ent.mentions||[]).length} mentions]`);

    const bySite = {};
    for(const c of ent.claims) {
      if(!bySite[c.site]) bySite[c.site] = [];
      bySite[c.site].push(c);
    }
    for(const[site,claims] of Object.entries(bySite)) {
      lines.push(`  @${site}:`);
      for(const c of claims) {
        const reclass = c.reclassified ? ` ← was ${c.mechanicalOp}(${c.mechanicalSite}, ${c.mechanicalStance||'?'})` : '';
        const fn = c.fn ? `  fn: ${c.fn}` : '';
        lines.push(`    ${c.operator}(${site}, ${c.resolution})  ${c.rawType}: ${c.value}${reclass}`);
        lines.push(`      "${c.span.slice(0,100)}"  (clause ${c.clauseIndex + 1})`);
        if(fn) lines.push(`     ${fn}`);
      }
    }

    if(ent.aliases && ent.aliases.length > 0) {
      lines.push(`  aliases: ${ent.aliases.join(', ')}`);
    }

    if(ent.slots && Object.keys(ent.slots).length > 0) {
      lines.push(`  slots:`);
      for(const[k,v] of Object.entries(ent.slots)) {
        lines.push(`    ${k}: ${String(v).slice(0,80)}`);
      }
    }

    if(ent.bindings && ent.bindings.length > 0) {
      lines.push(`  bindings (${ent.bindings.length}):`);
      for(const b of ent.bindings) {
        const pred = b.predicate ? `.${b.predicate}` : '';
        lines.push(`    ${b.op}(${b.site}, ${b.stance})  ${b.subject}${pred} = ${String(b.object).slice(0,60)}  c${b.clauseIndex+1}  [${b.source}]`);
      }
    }

    if(ent.ledgers && Object.keys(ent.ledgers).length > 0) {
      for(const[site,ledger] of Object.entries(ent.ledgers)) {
        lines.push(`  ledger@${site}  hash: ${ledger.currentHash}  commits: ${ledger.commits.length}`);
        for(const commit of ledger.commits) {
          const shift = commit.isShift ? ' ← SHIFT' : '';
          const fn = commit.added.fn ? `  fn: ${commit.added.fn}` : '';
          lines.push(`    ${commit.hash.slice(0,8)}  c${commit.clauseIndex+1}  ${commit.added.operator}  ${(commit.added.value||'').slice(0,60)}${shift}`);
          if(fn) lines.push(`      ${fn}`);
        }
      }
    }
  }

  lines.push('');
  lines.push(hr);
  lines.push('CLAUSES');
  lines.push(hr);

  for(const r of allResults) {
    const sal = (r.salience||0).toFixed(2);

    if(r.rawType === 'inert') {
      lines.push(`  [${r.clauseIndex+1}] inert · sal ${sal}`);
      lines.push(`      ${r.clause.slice(0,100)}`);
      continue;
    }
    if(r.rawType === 'revived') {
      lines.push(`  [${r.clauseIndex+1}] revived · sal ${sal}`);
      lines.push(`      ${r.clause.slice(0,100)}`);
      continue;
    }

    const flags = r.flagReasons && r.flagReasons.length > 0
      ? ` ⚑ ${r.flagReasons.join(' ')}` : '';
    lines.push(`  [${r.clauseIndex+1}] ${r.operator.name}(${r.terrain.name}, ${r.stance.name}) · sal ${sal}${flags}`);
    lines.push(`      ${r.clause.slice(0,120)}`);

    if(r.claims && r.claims.length > 0) {
      for(const cl of r.claims) {
        lines.push(`    · ${cl.entity} — ${cl.rawType}: ${cl.value}  [${cl.operator.name}(${cl.terrain.name}, ${cl.stance.name})]`);
      }
    }

    if(r.frameEvents && r.frameEvents.length > 0) {
      for(const fe of r.frameEvents) {
        if(fe.type==='confirm') lines.push(`    ✓ ${fe.frameId}`);
        if(fe.type==='surprise') lines.push(`    ⚡ ${fe.frameId}`);
        if(fe.type==='new_frame') lines.push(`    ◆ ${fe.text}`);
        if(fe.type==='refine') lines.push(`    ↻ ${fe.text}`);
      }
    }
  }

  lines.push('');
  lines.push(hr);
  lines.push('HYPOTHESIS REGISTER');
  lines.push(hr);

  if(register.frames.length === 0) {
    lines.push('(no active frames)');
  } else {
    lines.push(`${register.frames.length} active frames`);
    lines.push('');
    for(const f of register.frames) {
      const pct = Math.round(f.strength*100);
      lines.push(`◆ ${f.id}`);
      lines.push(`  ${f.text}`);
      lines.push(`  born c${f.generatedAt+1} · confirmed ${f.confirmedBy.length}× · strength ${pct}% · drift ${(f.drift||0).toFixed(3)}`);
      if(f.triggers) lines.push(`  triggers: ${f.triggers.map(t=>t.type).join(', ')}`);
      lines.push('');
    }
  }

  if(register.history.length > 0) {
    lines.push(hr2);
    lines.push('FRAME HISTORY');
    lines.push(hr2);
    for(const h of register.history) {
      const labels = {created:'◆ born',refined:'↻ refined',confirmed:'✓ confirmed',surprised:'⚡ surprised'};
      lines.push(`  c${h.at+1}  ${h.frame}  ${labels[h.event]||h.event}${h.text ? '  '+h.text.slice(0,60) : ''}`);
    }
  }

  lines.push('');
  lines.push(hr);
  lines.push('READING HYPOTHESES');
  lines.push(hr);
  const hyps = graph.hypotheses || {};
  if(hyps.doc) {
    lines.push(`DOC: ${hyps.doc}`);
  } else {
    lines.push(`DOC: (none generated)`);
  }
  if(hyps.sections && hyps.sections.length > 0) {
    for(const s of hyps.sections) {
      lines.push(`SEC c${s.from+1}–c${s.to+1}: ${s.text}`);
    }
  } else {
    lines.push(`SEC: (no sections — triggers may not have fired)`);
  }
  if(hyps.paragraph) {
    lines.push(`PARA: ${hyps.paragraph}`);
  }
  const readingsWithFn = readings.filter(r => r.fn);
  lines.push(`fn fields: ${readingsWithFn.length}/${readings.length} readings produced fn descriptions`);
  if(readingsWithFn.length > 0) {
    lines.push(`last 5 fns:`);
    for(const r of readingsWithFn.slice(-5)) {
      lines.push(`  c${r.clauseIndex+1}: ${r.fn}`);
    }
  }

  if(readings.length > 0) {
    const modelName = readings[0]?.model || document.getElementById('model-select')?.selectedOptions[0]?.text || 'unknown';
    const firstTs = readings[0]?.timestamp || '';
    const lastTs = readings[readings.length-1]?.timestamp || '';
    lines.push('');
    lines.push(hr);
    lines.push('LLM READING PASS');
    lines.push(hr);
    lines.push(`model:    ${modelName}`);
    lines.push(`started:  ${firstTs}`);
    lines.push(`finished: ${lastTs}`);
    lines.push(`${readings.length} clauses read · ${readings.filter(r=>r.reclassified).length} reclassified · ${readings.filter(r=>r.confirmed).length} confirmed · ${readings.filter(r=>r.fallback).length} fallback`);
    lines.push(`centroid corrections total: ${correctionCount}`);

    const hypChanges = [];
    let lastHyp = '';
    for(const r of readings) {
      if(r.hyp && r.hyp !== lastHyp) {
        hypChanges.push({ clause: r.clauseIndex, hyp: r.hyp });
        lastHyp = r.hyp;
      }
    }
    if(hypChanges.length > 0) {
      lines.push('');
      lines.push('Hypothesis evolution:');
      for(const h of hypChanges) {
        lines.push(`  c${h.clause+1}: "${h.hyp}"`);
      }
    }
    lines.push('');

    for(const r of readings.filter(r => r.reclassified || r.fallback || r.same || r.readLink || r.fn || r.hyp)) {
      const tag = r.fallback ? '⊘' : r.reclassified ? '✎' : '✓';
      const reclass = r.reclassified
        ? `  ← was ${r.mechanicalOp}(${r.mechanicalSite}, ${r.mechanicalStance})` : '';
      const time = r.timestamp ? r.timestamp.slice(11,19) : '';
      lines.push(`  ${tag} c${r.clauseIndex+1} [${time}]  ${r.readOp}(${r.readSite}, ${r.readStance})${reclass}`);
      if(r.readLink) lines.push(`    ⟷ ${r.readLink}`);
      if(r.same) lines.push(`    ≡ ${r.same}`);
      if(r.fn) lines.push(`    fn: ${r.fn}`);
      if(r.hyp) lines.push(`    hyp: ${r.hyp}`);
      lines.push(`    "${(r.clause||'').slice(0,120)}"`);
      lines.push('');
    }
  }


  if(graph.merges && graph.merges.length > 0) {
    lines.push('');
    lines.push(hr);
    lines.push('ENTITY MERGES (CON · Entity · Binding)');
    lines.push(hr);
    lines.push(`${graph.merges.length} merge events`);
    for(const m of graph.merges) {
      lines.push(`  "${m.short}" → "${m.full}" at c${(m.clauseIndex||0)+1} [${m.ts||'?'}]`);
    }
  }

  const speakerReadings = readings.filter(r => r.speaker);
  if(speakerReadings.length > 0) {
    const bySpeakerType = {};
    const bySpeakerName = {};
    let transitions = 0;
    let lastSpeaker = null;
    for(const r of speakerReadings) {
      const t = r.speaker.type || 'narrator';
      bySpeakerType[t] = (bySpeakerType[t]||0) + 1;
      if(r.speaker.name) bySpeakerName[r.speaker.name] = (bySpeakerName[r.speaker.name]||0) + 1;
      if(r.speaker.name !== lastSpeaker) { transitions++; lastSpeaker = r.speaker.name; }
    }

    lines.push('');
    lines.push(hr);
    lines.push('SPEAKER ATTRIBUTION');
    lines.push(hr);
    for(const [t, count] of Object.entries(bySpeakerType).sort((a,b) => b[1]-a[1])) {
      const pct = Math.round(count / speakerReadings.length * 100);
      const names = t === 'narrator' ? '' : ' — ' + Object.entries(bySpeakerName).filter(([n,c]) => c > 0).map(([n,c]) => `${n} ×${c}`).join(', ');
      lines.push(`  ${t}: ${count} (${pct}%)${names}`);
    }
    lines.push(`  transitions: ${transitions}`);
    lines.push('');

    const quoted = speakerReadings.filter(r => r.speaker.depth > 0);
    if(quoted.length > 0) {
      lines.push('  quoted speech:');
      for(const r of quoted.slice(0, 10)) {
        const name = r.speaker.name || 'unknown speaker';
        const via = r.speaker.via ? ` (${r.speaker.via})` : '';
        lines.push(`    c${r.clauseIndex+1} ▸ ${name}${via}: "${(r.clause||'').slice(0,80)}"`);
      }
    }
  }

  const foldEntries = Object.entries(graph.computedFolds || {});
  if(foldEntries.length > 0) {
    lines.push('');
    lines.push(hr);
    lines.push('COMPUTED FOLDS (Meant-Graph)');
    lines.push(hr);
    lines.push(`${foldEntries.length} entity folds computed on demand`);
    lines.push('');
    for(const [name, fold] of foldEntries) {
      lines.push(`  ◆ ${name.toUpperCase()}`);
      lines.push(`    trajectory: ${fold.trajectory || '?'}`);
      lines.push(`    clauses: ${(fold.clauseIndices||[]).map(i=>'c'+(i+1)).join(', ')}`);
      lines.push(`    mentions: ${fold.mentions || 0}`);
      if(fold.sections && fold.sections.length > 0) {
        for(const s of fold.sections) lines.push(`    section: ${s.slice(0,100)}`);
      }
      lines.push(`    fold: "${fold.text || '(empty)'}"`);
      lines.push(`    computed: ${fold.computedAt || '?'}`);
      lines.push('');
    }
  }

  if(chatHistory.length > 0) {
    lines.push('');
    lines.push(hr);
    lines.push('CHAT HISTORY (Horizon projections)');
    lines.push(hr);
    lines.push(`${chatHistory.length} exchanges`);
    lines.push('');
    for(const ch of chatHistory) {
      const timeLabel = ch.ms ? ` (${(ch.ms/1000).toFixed(1)}s${ch.overBudget ? ' ⚠️ over budget' : ''}${ch.shortCircuit ? ' ⚡ short-circuit' : ''})` : '';
      lines.push(`  Q [${ch.ts ? ch.ts.slice(11,19) : '?'}]: ${ch.question}`);
      lines.push(`  A${timeLabel}: ${(ch.answer||'').slice(0, 200)}`);
      if(ch.provenance) {
        const p = ch.provenance;
        const walkedSet = new Set(p.walkedClauseIndices || []);
        const clauseStr = (p.clauseIndices||[]).map(i => 'c' + (i+1) + (walkedSet.has(i) ? '*' : '')).join(', ');
        lines.push(`    π clauses: ${clauseStr}`);
        lines.push(`    π entities: ${(p.entities||[]).join(', ') || 'none'}`);
        const fp = p.foldProvenance || [];
        if(fp.length > 0) {
          const counts = fp.reduce((m,x) => (m[x.source] = (m[x.source]||0) + 1, m), {});
          lines.push(`    π folds: ${p.folds || 0} (${Object.entries(counts).map(([k,v])=>k+':'+v).join(', ')})`);
        } else {
          lines.push(`    π folds: ${p.folds || 0}`);
        }
        if(p.miniReads && p.miniReads.length) lines.push(`    π mini-reads: ${p.miniReads.map(i=>'c'+(i+1)).join(', ')}`);
        if(p.siblings && p.siblings.length) lines.push(`    π siblings: ${p.siblings.join(', ')}`);
        if(p.walking) lines.push(`    π posture: walking (* = unread)`);
        if(p.section) lines.push(`    π section: ${p.section.slice(0,80)}`);
        if(p.docHypothesis) lines.push(`    π doc: ${p.docHypothesis.slice(0,80)}`);
      }
      lines.push('');
    }
  }

  const chromeResults = allResults.filter(r => r.rawType === 'chrome');
  if(chromeResults.length > 0) {
    lines.push('');
    lines.push(hr);
    lines.push('CHROME FILTERED');
    lines.push(hr);
    lines.push(`${chromeResults.length} clauses filtered`);
    const byReason = { pattern: 0, structural: 0 };
    for(const r of chromeResults) byReason[r.chromeReason] = (byReason[r.chromeReason]||0) + 1;
    lines.push(`  by pattern: ${byReason.pattern || 0}`);
    lines.push(`  by structural absence: ${byReason.structural || 0}`);
    lines.push('');
    lines.push('  samples:');
    for(const r of chromeResults.slice(0, 5)) {
      lines.push(`    c${r.clauseIndex+1} [${r.chromeReason}]: ${(r.clause||'').slice(0,80)}`);
    }
  }

  lines.push('');
  lines.push(hr);
  lines.push('SEARCH PARAMETERS');
  lines.push(hr);
  lines.push(`base centroids: 27 (immutable, no learning)`);
  lines.push(`corrections this session: ${correctionCount}`);
  lines.push('');
  lines.push('  tweakable params:');
  for(const [k, v] of Object.entries(SEARCH_PARAMS)) {
    lines.push(`    ${k}: ${JSON.stringify(v)}`);
  }

  if(graph.events && graph.events.length > 0) {
    lines.push('');
    lines.push(hr);
    lines.push('EVENT STREAM (system Given-Log)');
    lines.push(hr);
    lines.push(`${graph.events.length} events`);
    lines.push('');

    const sites = {}, stances = {};
    for(const e of graph.events) {
      sites[e.site] = (sites[e.site]||0) + 1;
      stances[e.stance] = (stances[e.stance]||0) + 1;
    }
    lines.push('  sites: ' + Object.entries(sites).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}:${v}`).join(' '));
    lines.push('  stances: ' + Object.entries(stances).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}:${v}`).join(' '));
    lines.push('');

    for(const e of graph.events) {
      const ts = e.ts ? e.ts.slice(11,19) : '?';
      const ci = e.clauseIndex !== undefined ? ` c${e.clauseIndex+1}` : '';
      lines.push(`  ${ts}  ${e.op}(${e.site}, ${e.stance})  ${e.target}${ci}  ${typeof e.value === 'string' ? e.value.slice(0,60) : ''}`);
    }
  }

  lines.push('');
  lines.push(hr);
  lines.push('SALIENCE DISTRIBUTION');
  lines.push(hr);
  const sals = allResults.map(r=>r.salience||0).sort((a,b)=>a-b);
  if(sals.length > 0) {
    const min = sals[0], max = sals[sals.length-1];
    const mean = sals.reduce((a,b)=>a+b,0)/sals.length;
    const med = sals[Math.floor(sals.length/2)];
    lines.push(`min: ${min.toFixed(3)}  max: ${max.toFixed(3)}  mean: ${mean.toFixed(3)}  median: ${med.toFixed(3)}`);
    lines.push(`below 0.12 (inert): ${sals.filter(s=>s<0.12).length}`);
    lines.push(`0.12–0.30: ${sals.filter(s=>s>=0.12&&s<0.30).length}`);
    lines.push(`0.30–0.50: ${sals.filter(s=>s>=0.30&&s<0.50).length}`);
    lines.push(`above 0.50: ${sals.filter(s=>s>=0.50).length}`);

    lines.push('');
    lines.push('Top 10:');
    const ranked = allResults.filter(r=>r.salience).sort((a,b)=>(b.salience||0)-(a.salience||0));
    for(const r of ranked.slice(0,10)) {
      lines.push(`  c${r.clauseIndex+1}  sal ${(r.salience||0).toFixed(3)}  ${r.clause.slice(0,80)}`);
    }
    lines.push('');
    lines.push('Bottom 10:');
    for(const r of ranked.slice(-10).reverse()) {
      lines.push(`  c${r.clauseIndex+1}  sal ${(r.salience||0).toFixed(3)}  ${r.clause.slice(0,80)}`);
    }
  }

  lines.push('');
  lines.push(hr);
  lines.push('GRAPH JSON');
  lines.push(hr);
  const exportGraph = {
    exportedAt: new Date().toISOString(),
    source: document.getElementById('url-input').value || '(pasted)',
    counts: {
      entities: Object.keys(graph.entities).length,
      claims: graph.claims.length,
      bindings: (graph.bindings || []).length,
      clauses: graph.clauses.length,
      propositions: propositions.length,
      frames: register.frames.length,
    },
    bindings: (graph.bindings || []).map(b => ({
      op:b.op, site:b.site, stance:b.stance,
      subject:b.subject, predicate:b.predicate, object:b.object,
      clauseIndex:b.clauseIndex, source:b.source, confidence:b.confidence,
      span:b.span,
    })),
    entities: {},
    clauses: graph.clauses,
    frames: register.frames.map(f => ({
      id:f.id, text:f.text, strength:f.strength,
      generatedAt:f.generatedAt, confirmedBy:f.confirmedBy,
      drift:f.drift, triggers:f.triggers?.map(t=>t.type),
    })),
    readings: readings.map(r => ({
      clauseIndex:r.clauseIndex, clause:(r.clause||'').slice(0,150),
      mechanical:`${r.mechanicalOp}(${r.mechanicalSite}, ${r.mechanicalStance})`,
      read:`${r.readOp}(${r.readSite}, ${r.readStance})`,
      link:r.readLink, fn:r.fn, same:r.same||null, hyp:r.hyp||null,
      reclassified:r.reclassified, confirmed:r.confirmed||false, fallback:r.fallback||false,
      timestamp:r.timestamp||null, model:r.model||null,
    })),
    hypotheses: graph.hypotheses || {},
    centroidCorrections: correctionCount,
  };
  for(const[key,ent] of Object.entries(graph.entities)) {
    exportGraph.entities[key] = {
      name:ent.name, isLink:ent.isLink||false, aliases:ent.aliases||[],
      slots: ent.slots || {},
      bindings: (ent.bindings || []).map(b => ({
        op:b.op, site:b.site, stance:b.stance,
        predicate:b.predicate, object:b.object,
        clause:b.clauseIndex, source:b.source, confidence:b.confidence,
      })),
      claims:ent.claims.map(c=>({
        op:c.operator, site:c.site, stance:c.resolution,
        type:c.rawType, value:c.value, clause:c.clauseIndex,
        fn:c.fn||null, reclassified:c.reclassified||false,
        mechanical: c.mechanicalOp ? `${c.mechanicalOp}(${c.mechanicalSite})` : null,
      })),
      ledgers: Object.fromEntries(
        Object.entries(ent.ledgers||{}).map(([site,ledger])=>[site,{
          hash:ledger.currentHash,
          commits:ledger.commits.map(c=>({
            hash:c.hash, clause:c.clauseIndex, op:c.added.operator,
            value:(c.added.value||'').slice(0,80), fn:c.added.fn,
            shift:c.isShift, opDist:c.opDist,
          })),
        }])
      ),
    };
  }
  lines.push(JSON.stringify(exportGraph, null, 2));

  const content = lines.join('\n');
  try {
    await navigator.clipboard.writeText(content);
    setStatus(`Copied ${lines.length} lines to clipboard.`);
    appendChat('system', `📋 Log copied to clipboard (${lines.length} lines, ${content.length} chars). Paste into a text editor to save.`);
  } catch(e) {
    appendChat('system', `Export (${lines.length} lines):\n\n${content.slice(0, 3000)}${content.length > 3000 ? '\n\n[…truncated]' : ''}`);
    setStatus('Export shown in chat.');
  }
}

function setStatus(msg){document.getElementById('status').textContent=msg;}
function setProgress(n,total){
  const bar=document.getElementById('progress');
  const fill=document.getElementById('progress-fill');
  if(n<total){bar.classList.add('active');fill.style.width=Math.round(n/total*100)+'%';}
  else{bar.classList.remove('active');}
}

// Tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

// Expose
window.fetchAndProcess=fetchAndProcess;
window.processFromTextarea=processFromTextarea;
window.startReading=startReading;
window.exportLog=exportLog;
window.resetCentroids=resetCentroids;
window.askQuestion=askQuestion;
window.toggleDocDetail = toggleDocDetail;
window.scrollToClause = scrollToClause;

// Unified input — detects URL vs text block vs question
window.handleSend = async function() {
  try {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  input.style.height = 'auto';

  const isURL = /^https?:\/\/\S+$/i.test(text);
  const isLongText = text.length > 200 && !isURL;

  if(isURL) {
    document.getElementById('url-input').value = text;

    const wikiTitleMatch = text.match(/\/wiki\/([^?#]+)/);
    if(wikiTitleMatch) {
      const title = decodeURIComponent(wikiTitleMatch[1]).replace(/_/g, ' ');
      graph.hypotheses = graph.hypotheses || {};
      graph.hypotheses.doc = `This article is about ${title}.`;
    }

    const domain = text.replace(/https?:\/\/(www\.)?/, '').split('/')[0];
    const path = text.replace(/https?:\/\/(www\.)?/, '').split('/').slice(1, 3).join('/');
    const linkHtml = `<div style="display:inline-block;max-width:360px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">🔗</span>
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--accent)">${domain}</div>
          <div style="font-size:10px;color:var(--dim);font-family:var(--mono);word-break:break-all">${path.slice(0,60)}</div>
        </div>
      </div>
    </div>`;
    const msgDiv = document.createElement('div');
    msgDiv.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border)';
    msgDiv.innerHTML = linkHtml;
    document.getElementById('chat-messages').appendChild(msgDiv);
    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

    appendChat('system', 'Fetching and reading…');
    await fetchAndProcess();
  } else if(isLongText) {
    document.getElementById('url-input').value = '(pasted text)';
    const preview = text.slice(0, 100).replace(/\n/g, ' ').trim();
    const title = preview.slice(0, 50) + (preview.length > 50 ? '…' : '');
    const words = text.split(/\s+/).length;
    const cardHtml = `<div style="display:inline-block;max-width:320px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer" onclick="this.querySelector('details')?.toggleAttribute('open')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:18px">📄</span>
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--bright)">${title.replace(/</g,'&lt;')}</div>
          <div style="font-size:10px;color:var(--dim);font-family:var(--mono)">${words.toLocaleString()} words · ${text.length.toLocaleString()} chars</div>
        </div>
      </div>
      <details style="margin-top:4px">
        <summary style="font-size:10px;color:var(--dim);cursor:pointer">Show content</summary>
        <div style="max-height:200px;overflow-y:auto;font-size:11px;color:var(--text);font-family:var(--serif);line-height:1.5;margin-top:6px;padding:8px;background:var(--bg);border-radius:6px;white-space:pre-wrap">${text.slice(0, 2000).replace(/</g,'&lt;')}${text.length > 2000 ? '\n\n…' : ''}</div>
      </details>
    </div>`;
    const msgDiv = document.createElement('div');
    msgDiv.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border)';
    msgDiv.innerHTML = cardHtml;
    document.getElementById('chat-messages').appendChild(msgDiv);
    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

    appendChat('system', 'Processing…');
    if(!embeddingsReady) await initEmbeddings();
    await processText(text);
    if(!readingActive) setTimeout(() => startReading(), 500);
  } else {
    await askQuestion(text);
  }
  } catch(e) {
    console.error('handleSend error:', e);
    setStatus(`Error: ${e.message}`);
    appendChat('system', `Error: ${e.message}`);
  }
};

window.handleInput = function(event) {
  if(event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    handleSend();
  }
};

window.autoGrow = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
};

window.toggleInspector = function() {
  const el = document.getElementById('inspector');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
};

window.sanityCheck = async function() {
  setStatus('Sanity check: loading model…');
  try {
    if(!llmEngine) await initWebLLM();
    setStatus('Sanity check: streaming test call…');
    const t0 = Date.now();
    const raw = (await streamWebLLM(llmEngine, {
      messages:[{role:'user',content:'Reply with only: {"q1":1,"q2":3,"q3":2,"fn":"test"}'}],
      max_tokens: 30, temperature: 0.1,
    }, (full) => {
      setStatus(`… ${full.slice(0, 60)}`);
    }) || '').trim();
    const ms = Date.now() - t0;
    setStatus(`✓ Model responded in ${ms}ms: "${raw.slice(0,60)}"`);
  } catch(e) {
    setStatus(`✗ Model failed: ${e.message || e}`);
  }
};

// Init — load both models at startup, show clear status
(async function boot() {
  try {
    checkOllama().then(ok => {
      if(ok) appendChat('system', `🦙 Ollama connected (${ollamaModel}). Section analysis will run in parallel.`);
    });

    setStatus('Loading embedding model…');
    await initEmbeddings();
    setStatus('Embeddings ready. Loading LLM…');

    const modelId = document.getElementById('model-select').value;
    const modelName = document.getElementById('model-select').selectedOptions[0]?.text || modelId;

    try {
      const webllm = await import('https://esm.run/@mlc-ai/web-llm');
      llmEngine = await webllm.CreateMLCEngine(modelId, {
        initProgressCallback: (p) => {
          setStatus(`${modelName}: ${(p.progress*100).toFixed(0)}% ${p.text || ''}`);
        },
      });
      llmEngine._modelId = modelId;
      setStatus(`Ready. ${modelName} loaded.`);
      document.getElementById('export-btn').disabled = false;
    } catch(e) {
      setStatus(`⚠ ${modelName} failed: ${e.message}. Chat works without LLM.`);
      appendChat('system', `⚠ LLM failed to load: ${e.message}. Answers will be from signals only (no smoothing).`);
      llmEngine = null;
    }
  } catch(e) {
    setStatus(`Error: ${e.message}`);
  }
})();

// Restore saved model selection
const savedModel = localStorage.getItem('eo-reader-model');
if(savedModel) {
  const sel = document.getElementById('model-select');
  if(sel && [...sel.options].some(o => o.value === savedModel)) sel.value = savedModel;
}
// Save on change
document.getElementById('model-select').addEventListener('change', function() {
  localStorage.setItem('eo-reader-model', this.value);
});
