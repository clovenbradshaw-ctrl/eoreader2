//  Main processing
// ═══════════════════════════════════════════════════════════

const graph = { entities:{}, claims:[], bindings:[], clauses:[], vectors:{}, folds:{}, computedFolds:{}, merges:[], events:[], documents:[] };
let currentDocId = null;
function setCurrentDoc(source) {
  currentDocId = source.startsWith('http') ? source.replace(/https?:\/\/(www\.)?/,'').split(/[?#]/)[0].slice(0,60) : `pasted-${Date.now()}`;
  if(!graph.documents.find(d => d.id === currentDocId)) graph.documents.push({ id: currentDocId, source, ts: new Date().toISOString() });
  return currentDocId;
}

// Emit an EO event — the system's own Given-Log
function emit(op, site, stance, target, value, clauseIndex) {
  graph.events.push({
    ts: new Date().toISOString(),
    op, site, stance, target,
    value: typeof value === 'string' ? value.slice(0, 120) : value,
    clauseIndex, docId: currentDocId,
  });
}
let allResults = [];
let register = { frames:[], history:[], clauseVecs:[], baselineDrift:0.10 };
let propositions = []; // extracted props for LLM reading

// ═══════════════════════════════════════════════════════════
// OLLAMA — local LLM server for parallel section agents
// ═══════════════════════════════════════════════════════════

let ollamaAvailable = false;
let ollamaModel = 'llama3.2';
const OLLAMA_URL = 'http://localhost:11434';

async function checkOllama() {
  try {
    const res = await fetch(`${OLLAMA_URL}/api/tags`, { signal: AbortSignal.timeout(2000) });
    if(!res.ok) return false;
    const data = await res.json();
    const models = data.models?.map(m => m.name) || [];
    if(models.length > 0) {
      ollamaModel = models[0];
      ollamaAvailable = true;
      return true;
    }
  } catch(e) {}
  return false;
}

async function ollamaChat(messages, opts = {}) {
  const res = await fetch(`${OLLAMA_URL}/v1/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: ollamaModel,
      messages,
      temperature: opts.temperature || 0.1,
      stream: false,
    }),
  });
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

async function ollamaChatStream(messages, opts = {}, onDelta) {
  let res;
  try {
    res = await fetch(`${OLLAMA_URL}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: ollamaModel,
        messages,
        temperature: opts.temperature || 0.1,
        stream: true,
      }),
    });
  } catch(e) { return ollamaChat(messages, opts); }
  if(!res.body) return ollamaChat(messages, opts);
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let full = '', buf = '';
  while(true) {
    const { done, value } = await reader.read();
    if(done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for(const line of lines) {
      const t = line.trim();
      if(!t.startsWith('data:')) continue;
      const payload = t.slice(5).trim();
      if(!payload || payload === '[DONE]') continue;
      try {
        const j = JSON.parse(payload);
        const delta = j.choices?.[0]?.delta?.content || '';
        if(delta) {
          full += delta;
          if(onDelta) { try { onDelta(full, delta); } catch(_) {} }
        }
      } catch(_) {}
    }
  }
  return full;
}

function parseSectionResponse(response, section) {
  const summary = response.match(/SUMMARY:\s*(.+)/i)?.[1]?.trim() || '';
  const speakers = response.match(/SPEAKERS:\s*(.+)/i)?.[1]?.trim() || '';
  const tone = response.match(/TONE:\s*(\w+)/i)?.[1]?.trim() || '';
  const key = response.match(/KEY:\s*(.+)/i)?.[1]?.trim() || '';
  if(!summary) return null;
  return {
    start: section.start, end: section.end,
    summary: trimRepetition(summary),
    speakers: speakers.split(',').map(s => s.trim()).filter(s => s.length > 1),
    tone, keyLine: key.replace(/^["']|["']$/g, ''), raw: response,
  };
}

async function runSectionAgents(sections, results, engine) {
  const sysPrompt = 'Analyze this section of text. Respond in exactly this format:\nSUMMARY: (one sentence what happens)\nSPEAKERS: (comma-separated list of who speaks)\nTONE: (one word: comic/tragic/tense/romantic/expository/reflective)\nKEY: (the single most important line, quoted verbatim)';

  const windows = sections.map(section => ({
    section,
    text: results.slice(section.start, section.end)
      .filter(r => !r.isChrome && r.clause && r.clause.length > 10)
      .map(r => r.clause).join('\n').slice(0, 1500),
  })).filter(s => s.text.length > 50);

  const sectionReadings = [];

  if(ollamaAvailable) {
    // PARALLEL — all sections at once via Ollama HTTP
    setStatus(`Analyzing ${windows.length} sections in parallel (Ollama: ${ollamaModel})…`);
    const results_ = await Promise.all(
      windows.map(({ section, text }) =>
        ollamaChat([
          { role: 'system', content: sysPrompt },
          { role: 'user', content: text },
        ], { temperature: 0.1 })
        .then(response => ({ section, response }))
        .catch(() => null)
      )
    );
    for(const r of results_.filter(Boolean)) {
      const reading = parseSectionResponse(r.response, r.section);
      if(reading) {
        sectionReadings.push(reading);
        emit('SYN', 'Kind', 'Composing', `section:${r.section.start}-${r.section.end}`, reading.summary.slice(0, 100), r.section.start);
      }
    }
  } else if(engine) {
    // SEQUENTIAL — one at a time via WebLLM
    for(const { section, text } of windows) {
      setStatus(`Section ${sectionReadings.length + 1}/${windows.length}…`);
      try {
        const reply = await engine.chat.completions.create({
          messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content: text }],
          max_tokens: 120, temperature: 0.1,
        });
        const reading = parseSectionResponse((reply.choices[0]?.message?.content || '').trim(), section);
        if(reading) {
          sectionReadings.push(reading);
          emit('SYN', 'Kind', 'Composing', `section:${section.start}-${section.end}`, reading.summary.slice(0, 100), section.start);
        }
      } catch(e) {}
    }
  }

  return sectionReadings;
}

// Detect sections from surprise peaks or structural markers
function detectSections(results, surprises) {
  const sections = [];
  const sectionMarkers = [];

  // Use ACT/SCENE markers if present (dramatic text)
  for(let i = 0; i < results.length; i++) {
    if(/^(ACT\s|SCENE\s|Scene\s|Enter\s)/i.test(results[i]?.clause || '')) {
      sectionMarkers.push(i);
    }
  }

  // Fall back to surprise peaks as section boundaries
  const boundaries = sectionMarkers.length > 3
    ? sectionMarkers
    : (surprises || []).map(s => s.index);

  // Group into sections of reasonable size
  if(boundaries.length < 2) {
    // Single section = whole document
    sections.push({ start: 0, end: results.length });
  } else {
    for(let i = 0; i < boundaries.length; i++) {
      const start = boundaries[i];
      const end = i + 1 < boundaries.length ? boundaries[i + 1] : results.length;
      if(end - start > 10) { // only meaningful sections
        sections.push({ start, end });
      }
    }
  }

  return sections.slice(0, 12); // cap at 12 sections
}

// Store for use during reading
runSectionAgents = runSectionAgents;
detectSections = detectSections;

async function processText(text) {
  if(!embeddingsReady) return;
  setCurrentDoc(document.getElementById('url-input').value || '(pasted)');
  text = cleanText(text);
  const clauses = splitClauses(text);
  const corefStack = [];
  const headStack = [];   // recent common-noun head referents ("the fox" -> {head:'fox', ...})
  allResults = [];
  register = { frames:[], history:[], clauseVecs:[], baselineDrift:0.10 };
  propositions = [];
  graph.entities = {}; graph.claims = []; graph.bindings = []; graph.clauses = []; graph.vectors = {}; graph.folds = {};
  // Reset cursor + diff state for the evolving graph view
  window._lastEntityState = new Map();
  if(window._spanCursor) window._spanCursor.clauseIndex = null;
  let frameCounter = 0;
  const globalSeenKinds = new Set();

  setProgress(0, clauses.length);
  const quoteTracker = new QuoteTracker();

  // Positional tracking: entity first mentions and section boundaries
  const entityFirstMention = {}; // entityName → clauseIndex of first appearance
  const sectionBoundaries = new Set(); // clauseIndices where sections start
  // Pre-scan for section markers (§ from HTML parser, or all-caps lines, or blank-line transitions)
  for(let i = 0; i < clauses.length; i++) {
    if(/^§/.test(clauses[i]) || /^[A-Z][A-Z\s]{3,}$/.test(clauses[i].trim())) {
      sectionBoundaries.add(i);
      // Clean the § marker from the clause text
      clauses[i] = clauses[i].replace(/^§\s*/, '');
    }
  }

  for(let i=0;i<clauses.length;i++){
    if(i%5===0) {
      setStatus(`Extracting ${i+1}/${clauses.length}…`);
      setProgress(i, clauses.length);
      // Yield to UI so progress renders and browser doesn't freeze
      await new Promise(r => setTimeout(r, 0));
    }
    const clause = clauses[i];

    // Track quote state mechanically before any LLM call
    const quoteState = quoteTracker.update(clause, i);

    // Chrome detection FIRST — before embedding (saves ~40% of compute on chrome-heavy pages)
    const chromeByRegex = isChromey(clause);
    if(chromeByRegex) {
      const sal = 0;
      const chromeHash = clause.trim().toLowerCase().replace(/\s+/g,' ').slice(0,50);
      emit('SEG', 'Void', 'Clearing', `c${i+1}`, 'chrome:pattern', i);
      allResults.push({clauseIndex:i,clause,entity:'(chrome)',value:'',span:clause,
        rawType:'chrome',salience:sal,chromeReason:'pattern',chromeHash,quoteState,
        operator:{name:'—'},terrain:{name:'—'},stance:{name:'—'},frameEvents:[],claims:[]});
      graph.clauses.push({index:i,text:clause,salience:sal,terrain:'Void',stage:'extracted',skip:true});
      continue;
    }

    const clauseVec = await embed(clause);
    register.clauseVecs.push({index:i,vec:clauseVec});

    const extraction = extractClause(clause, corefStack, globalSeenKinds);

    // Refresh head-referent stack from this clause (e.g. "the fox" -> {head:'fox'})
    const newHeads = extractHeadReferents(clause);
    for(const h of newHeads) {
      const idx = headStack.findIndex(x => x.head === h.head);
      if(idx > -1) headStack.splice(idx, 1);
      headStack.push({ ...h, clauseIndex: i });
    }
    while(headStack.length > 8) headStack.shift();

    // Mechanical binding extraction (typed slot/edge facts; parallel to claims)
    const newBindings = extractBindings(clause, corefStack, headStack, i, extraction.claims);

    // Track entity first mentions for positional operator assignment
    for(const claim of extraction.claims) {
      const eName = (claim.entity || '').toLowerCase();
      if(eName && !(eName in entityFirstMention)) {
        entityFirstMention[eName] = i;
      }
    }

    // Positional operator: uses token order, not embeddings
    const posOp = positionalOperator(i, entityFirstMention, sectionBoundaries);

    // Tag claims with speaker from mechanical detection
    for(const claim of extraction.claims) {
      claim.speaker = {
        name: quoteState.detectedSpeaker || null,
        depth: quoteState.depth,
        via: quoteState.detectedVia || null,
        type: quoteState.detectedType || 'narrator',
      };
      if(quoteState.narratorStance) claim.narratorStance = quoteState.narratorStance;
    }

    const sal = salience(clause, clauseVec, extraction, register, graph.vectors);

    // Structural chrome: no entities + no propositions + low salience
    const hasEntities = extraction.claims.filter(c => c.rawType === 'kind').length > 0;
    const hasPropositions = extraction.claims.filter(c => ['proposition','causal','contrast','definition','quote'].includes(c.rawType)).length > 0;
    const structuralAbsence = !hasEntities && !hasPropositions && sal < 0.10;

    if(structuralAbsence) {
      const chromeHash = clause.trim().toLowerCase().replace(/\s+/g,' ').slice(0,50);
      emit('SEG', 'Void', 'Clearing', `c${i+1}`, 'chrome:structural', i);
      allResults.push({clauseIndex:i,clause,entity:'(chrome)',value:'',span:clause,
        rawType:'chrome',salience:sal,chromeReason:'structural',chromeHash,quoteState,
        operator:{name:'—'},terrain:{name:'—'},stance:{name:'—'},frameEvents:[],claims:[]});
      graph.clauses.push({index:i,text:clause,salience:sal,terrain:'Void',stage:'extracted',skip:true});
      continue;
    }

    if(sal < 0.12){
      allResults.push({clauseIndex:i,clause,entity:'(inert)',value:'',span:clause,rawType:'inert',salience:sal,
        operator:{name:'—'},terrain:{name:'—'},stance:{name:'—'},frameEvents:[],claims:[]});
      graph.clauses.push({index:i,text:clause,salience:sal,terrain:'Void',stage:'extracted',skip:true});
      continue;
    }

    // Classify claims
    const classifiedClaims = [];
    for(const claim of extraction.claims){
      const sv = await embed(claim.span);
      const cl = {
        ...claim, clauseIndex:i, salience:sal,
        ...classifyAxes(sv),
      };
      classifiedClaims.push(cl);

      // Track propositions for LLM reading
      if(['proposition','causal','contrast','definition'].includes(claim.rawType)){
        propositions.push({
          clauseIndex:i, span:claim.span, entity:claim.entity, value:claim.value, rawType:claim.rawType,
          operator:cl.operator.name, site:cl.terrain.name, stance:cl.stance.name,
        });
      }

      // Build graph
      const key = claim.entity.toLowerCase();
      if(key&&key!=='?'&&!key.startsWith('(')){
        if(!graph.entities[key]) {
          graph.entities[key]={name:claim.entity,terrain:cl.terrain.name,claims:[],edges:[],mentions:[],ledgers:{},stage:'extracted'};
          emit('INS', cl.terrain.name, cl.stance.name, claim.entity, claim.rawType, i);
        }
        graph.entities[key].claims.push({
          entity:claim.entity,value:claim.value,span:claim.span,rawType:claim.rawType,
          operator:cl.operator.name,site:cl.terrain.name,resolution:cl.stance.name,
          notation:`${cl.operator.name}(${cl.terrain.name},${cl.stance.name})`,clauseIndex:i,fn:null,
          speaker: claim.speaker,
        });
        graph.entities[key].mentions.push(i);
        graph.claims.push(graph.entities[key].claims[graph.entities[key].claims.length-1]);
      }
    }

    // Mechanical bindings → graph + per-entity. Promotes common-noun heads
    // (the fox, the zoo) and previously-missed proper nouns to first-class entities.
    for(const b of newBindings) {
      const skey = (b.subject || '').toLowerCase();
      if(!skey) continue;
      if(!graph.entities[skey]) {
        const isCommon = COMMON_NOUN_HEADS.has(skey);
        graph.entities[skey] = {
          name: b.subjectDisplay || b.subject,
          terrain: 'Entity', claims: [], edges: [], mentions: [],
          ledgers: {}, bindings: [], slots: {},
          stage: 'extracted',
          commonNoun: isCommon,
          fromBinding: !isCommon,  // mark proper nouns promoted only by bindings
        };
        emit('INS', 'Entity', 'Cultivating', b.subject,
             isCommon ? 'common-noun-head' : 'binding-subject', i);
      }
      const ent = graph.entities[skey];
      if(!ent.bindings) ent.bindings = [];
      if(!ent.slots) ent.slots = {};
      ent.bindings.push(b);
      ent.mentions.push(i);
      // Flat slots map for DEF/Entity bindings — what entity.<predicate> = <object> looks like
      if(b.op === 'DEF' && b.site === 'Entity' && b.predicate) {
        ent.slots[b.predicate] = b.object;
      }
      graph.bindings.push(b);
      emit(b.op, b.site, b.stance, `${b.subject}.${b.predicate || '?'}`, b.object, i);

      // If this binding is a name-reveal coref, alias the proper-noun entity to the head entity.
      if(b.source === 'mech:coref-name' && b.op === 'CON' && b.predicate === '≡') {
        const okey = (b.object || '').toLowerCase();
        if(okey && okey !== skey) {
          if(!graph.merges) graph.merges = [];
          const dup = graph.merges.some(m => m.short === b.object && m.full === ent.name);
          if(!dup) graph.merges.push({
            short: b.object, full: ent.name,
            clauseIndex: i, ts: new Date().toISOString(), mechanical: true, source: 'binding'
          });
          if(!ent.aliases) ent.aliases = [];
          if(!ent.aliases.includes(b.object)) ent.aliases.push(b.object);
        }
      }
    }

    // Co-occurrence edges — entities sharing this clause
    const entitiesInClause = [...new Set(extraction.claims
      .map(c => (c.entity||'').toLowerCase())
      .filter(k => k && k !== '?' && !k.startsWith('(') && graph.entities[k]))];
    const clauseTerrainGuess = (classifiedClaims[0]?.terrain?.name) || 'Entity';
    for(let a = 0; a < entitiesInClause.length; a++) {
      for(let b = a + 1; b < entitiesInClause.length; b++) {
        const ka = entitiesInClause[a], kb = entitiesInClause[b];
        const ea = graph.entities[ka], eb = graph.entities[kb];
        const upsert = (host, otherKey, otherName) => {
          let e = host.edges.find(x => x.key === otherKey);
          if(!e) { e = { key: otherKey, name: otherName, count: 0, terrains: {}, clauses: [] }; host.edges.push(e); }
          e.count++;
          if(e.clauses.length < 12) e.clauses.push(i);
          e.terrains[clauseTerrainGuess] = (e.terrains[clauseTerrainGuess] || 0) + 1;
        };
        upsert(ea, kb, eb.name);
        upsert(eb, ka, ea.name);
      }
    }

    // Classify whole clause
    const classified = classifyAxes(clauseVec);

    // Positional override: when positional signal is strong, use it over embedding
    // INS (first mention) and SEG (section boundary) are high-confidence positional signals
    if(posOp === 'INS' && classified.operator.name !== 'INS') {
      classified.positionalOp = 'INS';
      if(classified.operator.margin < 0.05) classified.operator.name = 'INS'; // low-confidence embedding → override
    }
    if(posOp === 'SEG') {
      classified.positionalOp = 'SEG';
      classified.operator.name = 'SEG'; // section boundary always wins
    }
    // Store positional op for later comparison
    classified.positionalOp = classified.positionalOp || posOp;
    const op = classified.operator;
    const te = classified.terrain;
    const st = classified.stance;

    // Score against frames
    const frameEvents=[];
    for(const f of register.frames){
      const sim=cosSim(clauseVec,f.vec);
      if(sim>0.50){f.confirmedBy.push(i);f.strength=f.confirmedBy.length/(i-f.generatedAt+1);frameEvents.push({type:'confirm',frameId:f.id});}
      else if(sim<0.20&&f.strength>0.3) frameEvents.push({type:'surprise',frameId:f.id});
    }

    // Update baseline
    if(i===20||(i>20&&i%30===0)) register.baselineDrift=computeBaselineDrift(register.clauseVecs);

    // Triggers
    const triggers = shouldRead(register,i,clauseVec,extraction,allResults);
    if(triggers){
      const rc=averageVec(register.clauseVecs.slice(-4).map(c=>c.vec));
      const dc=averageVec(register.clauseVecs.map(c=>c.vec));
      const drift=1-cosSim(rc,dc);
      const secClassified=classifyAxes(rc);
      const secO=secClassified.operator;
      const secT=secClassified.terrain;
      const ents=[...new Set(allResults.filter(r=>r.clauseIndex>=i-3&&r.clauseIndex<=i&&r.entity&&!r.entity.startsWith('(')).map(r=>r.entity))].slice(0,3);
      const tl=triggers.map(t=>t.type).join('+');
      const hypText=(ents.length>0?ents.join(', ')+': ':'')+secO.name+' at '+secT.name+' ['+tl+']';

      let matched=false;
      for(const ex of register.frames){if(cosSim(rc,ex.vec)>0.55){ex.text=hypText;ex.vec=rc;ex.revisedAt=i;ex.revision++;matched=true;register.history.push({event:'refined',frame:ex.id,at:i,text:hypText});frameEvents.push({type:'refine',frameId:ex.id,text:hypText});break;}}
      if(!matched){
        const nf={id:`hyp_${frameCounter++}`,text:hypText,vec:rc,confirmedBy:[],strength:0.5,generatedAt:i,revisedAt:i,revision:0,drift,triggers};
        register.frames.push(nf);register.history.push({event:'created',frame:nf.id,at:i,text:hypText});frameEvents.push({type:'new_frame',frameId:nf.id,text:hypText});
      }
      for(const f of register.frames){const l=f.confirmedBy.length>0?Math.max(...f.confirmedBy):f.generatedAt;if(i-l>8)f.strength*=0.7;}
      register.frames=register.frames.filter(f=>f.strength>0.1||i-f.generatedAt<4);
    }

    // Flag
    const flagReasons=[];
    if(triggers){
      const recentOps=allResults.slice(-8).filter(r=>r.rawType==='clause').map(r=>r.operator?.name);
      const modeOp=recentOps.sort((a,b)=>recentOps.filter(v=>v===b).length-recentOps.filter(v=>v===a).length)[0];
      if(op.name===modeOp) flagReasons.push('drift+static');
      if(triggers.some(t=>t.type==='surprise')&&op.name==='DEF') flagReasons.push('surprise+DEF');
      if(triggers.some(t=>t.type==='density')) flagReasons.push('density');
      if(triggers.some(t=>t.type==='silence')) flagReasons.push('silence');
      if(triggers.some(t=>t.type==='mode_shift')) flagReasons.push('mode:'+triggers.find(t=>t.type==='mode_shift').from+'→'+triggers.find(t=>t.type==='mode_shift').to);
    }

    allResults.push({
      clauseIndex:i, clause:extraction.clause, entity:'(whole clause)',
      value:clause.slice(0,60),span:clause,rawType:'clause',salience:sal,
      operator:op,terrain:te,stance:st,
      frameEvents,needsReading:flagReasons.length>0,flagReasons,triggers,
      mechanicalOp:op.name, claims:classifiedClaims, quoteState,
    });

    graph.clauses.push({index:i,text:clause,salience:sal,terrain:te.name,stage:'extracted'});

    // Span cursor: track ingest head
    if(typeof window.setSpanCursor === 'function') window.setSpanCursor(i, 'ingest');
    // Incremental graph render so the page evolves visibly during ingest
    if(i % 5 === 0 && typeof window.renderGraph === 'function') {
      try { window.renderGraph(); } catch(e) {}
    }
  }

  // Embed entities for retrieval
  for(const[key,ent] of Object.entries(graph.entities)){
    const t=`${ent.name}: ${ent.claims.slice(0,5).map(c=>c.value).join(', ')}`;
    graph.vectors[key]=await embed(t.slice(0,200));
  }

  // Build ledgers
  rebuildLedgers();

  // Retroactive salience revision
  let revived=0;
  for(const r of allResults){
    if(r.rawType!=='inert') continue;
    const cv=register.clauseVecs.find(c=>c.index===r.clauseIndex);
    if(!cv) continue;
    const re=extractClause(r.clause,[]);
    const ns=salience(r.clause,cv.vec,re,register,graph.vectors);
    r.salience=ns;
    if(ns>=0.12 && !isChromey(r.clause)){r.rawType='revived';revived++;}
  }

  setProgress(clauses.length,clauses.length);
  const chromeCount=allResults.filter(r=>r.rawType==='chrome').length;
  const inert=allResults.filter(r=>r.rawType==='inert').length;
  const flagged=allResults.filter(r=>r.needsReading).length;
  // Compute document centroid — the "topic fingerprint"
  // Clauses closest to centroid are most representative of the document
  // Reference citations, chrome, tangential content will be far from centroid
  const contentVecs = register.clauseVecs.filter(cv => {
    const r = allResults.find(ar => ar.clauseIndex === cv.index);
    return r && r.rawType !== 'chrome' && r.rawType !== 'inert';
  });
  if(contentVecs.length > 0) {
    const dim = contentVecs[0].vec.length;
    const centroid = new Array(dim).fill(0);
    for(const cv of contentVecs) for(let d=0;d<dim;d++) centroid[d] += cv.vec[d] / contentVecs.length;
    // Normalize
    let norm = 0; for(let d=0;d<dim;d++) norm += centroid[d]**2;
    norm = Math.sqrt(norm); for(let d=0;d<dim;d++) centroid[d] /= norm;
    graph.centroid = centroid;

    // Score each clause by centrality (closeness to centroid)
    for(const cv of contentVecs) {
      const centrality = cosSim(cv.vec, centroid);
      const r = allResults.find(ar => ar.clauseIndex === cv.index);
      if(r) r.centrality = centrality;
    }

    // Log: which clauses are most central (most representative of the topic)?
    const topCentral = allResults
      .filter(r => r.centrality && r.rawType !== 'chrome')
      .sort((a,b) => b.centrality - a.centrality)
      .slice(0, 3);
    if(topCentral.length > 0) {
      emit('DEF', 'Kind', 'Tracing', 'centroid', topCentral.map(c => `c${c.clauseIndex+1}:${c.centrality.toFixed(2)}`).join(' '));
    }
  }

  setStatus(`Done. ${allResults.length} clauses, ${Object.keys(graph.entities).length} entities, ${graph.claims.length} claims, ${propositions.length} props, ${chromeCount} chrome, ${inert} inert, ${revived} revived, ${flagged} flagged.`);

  // ═══════════════════════════════════════════════════════════════
  // SURPRISE DETECTION — windowed peaks spread across the text
  //
  // Global skim: divide text into N windows, find the peak surprise
  // in each window. Gives 7-9 spread peaks, not clustered.
  //
  // Scene skim: same algorithm applied to a clause range.
  // The cursor determines the window.
  // ═══════════════════════════════════════════════════════════════

  function computeSurprises(vecs, results, startIdx, endIdx) {
    if(!vecs || vecs.length < 5) return [];
    const dim = vecs[0]?.length;
    if(!dim) return [];

    const start = startIdx || 0;
    const end = endIdx || vecs.length;
    const range = end - start;

    // Compute surprise for each clause in range
    const runningCentroid = new Array(dim).fill(0);
    let count = 0;
    const scored = [];

    for(let i = start; i < end; i++) {
      const vec = vecs[i];
      if(!vec || vec.length !== dim) continue;

      count++;
      for(let d = 0; d < dim; d++) runningCentroid[d] += (vec[d] - runningCentroid[d]) / count;

      if(count < 3) continue;

      const sim = cosSim(vec, runningCentroid);
      const surprise = 1 - sim;
      const clause = results[i]?.clause || '';

      if(clause.length > 15 && !results[i]?.isChrome) {
        scored.push({ index: i, surprise, text: clause, sim });
      }
    }

    // Window the results: divide range into N windows, take peak from each
    const numWindows = Math.min(9, Math.max(3, Math.floor(range / 30)));
    const windowSize = Math.ceil(scored.length / numWindows);
    const peaks = [];

    for(let w = 0; w < numWindows; w++) {
      const windowStart = w * windowSize;
      const windowEnd = Math.min((w + 1) * windowSize, scored.length);
      const windowSlice = scored.slice(windowStart, windowEnd);

      if(windowSlice.length > 0) {
        const peak = windowSlice.reduce((best, c) => c.surprise > best.surprise ? c : best);
        peaks.push(peak);
      }
    }

    return peaks.sort((a, b) => a.index - b.index); // return in document order
  }

  // Compute global surprises (whole document)
  graph.surprises = computeSurprises(register.clauseVecs, allResults, 0, register.clauseVecs.length);

  if(graph.surprises.length > 0) {
    emit('SIG', 'Paradigm', 'Tracing', 'surprise-skim',
      `${graph.surprises.length} peaks across ${register.clauseVecs.length} clauses`, 0);
  }
  const urlInput = document.getElementById('url-input').value;
  const wikiTitle = urlInput.match(/\/wiki\/([^?#]+)/)?.[1]?.replace(/_/g, ' ') || '';
  const contentResults = allResults.filter(r => r.rawType === 'clause' || r.rawType === 'kind');

  let instantHyp = '';

  if(wikiTitle) instantHyp = `This article is about ${decodeURIComponent(wikiTitle)}.`;

  const avgClauseLen = contentResults.reduce((s, r) => s + (r.clause||'').length, 0) / Math.max(contentResults.length, 1);
  const hasDialogue = contentResults.filter(r => /^[A-Z]{2,}[.\s]/.test(r.clause||'')).length > contentResults.length * 0.1;
  const hasShortLines = avgClauseLen < 60;
  const clauseCount = contentResults.length;

  let textShape = '';
  if(hasDialogue) textShape = 'a play or dramatic script';
  else if(hasShortLines && clauseCount > 50) textShape = 'a poem or verse';
  else if(clauseCount > 200) textShape = 'a long-form text';
  else if(clauseCount < 20) textShape = 'a short passage';
  else textShape = 'an article or essay';

  if(!instantHyp) instantHyp = `This appears to be ${textShape}.`;
  else instantHyp += ` It appears to be ${textShape}.`;

  const entityFreq = {};
  for(const [key, ent] of Object.entries(graph.entities)) {
    const mentions = ent.claims?.length || 0;
    if(key.length > 2 && mentions > 0 && isRealName(key)) entityFreq[key] = mentions;
  }
  const topEntities = Object.entries(entityFreq).sort((a,b) => b[1] - a[1]).slice(0, 5);
  if(topEntities.length > 0) {
    const subjects = topEntities.slice(0, 3).map(([name, count]) => `${name} (${count} mentions)`).join(', ');
    instantHyp += ` Key subjects: ${subjects}.`;
  }

  const firstContent = contentResults.find(r => r.clause && r.clause.length > 30 && /[.!?]/.test(r.clause));
  if(firstContent) {
    const firstSentence = firstContent.clause.split(/[.!?]/)[0];
    if(firstSentence.length > 15 && !instantHyp.includes(firstSentence.slice(0, 20))) {
      instantHyp += ` Opens with: "${firstSentence.trim()}."`;
    }
  }

  if(llmEngine && contentResults.length > 5) {
    try {
      const sample = contentResults.slice(0, 5).map(r => r.clause).join('\n').slice(0, 300);
      const surpriseSpans = (graph.surprises || []).slice(0, 5).map(s => s.text).join('\n').slice(0, 300);
      const entityList = topEntities.map(([n]) => n).join(', ');
      const idReply = await llmEngine.chat.completions.create({
        messages: [
          // Do NOT ask "who wrote it" — we don't pass a byline, so a small
          // model will just confabulate from the most-mentioned name in the
          // entity list (e.g. naming a council member as the author). Only
          // ask what the text IS about.
          { role: 'system', content: 'Identify this text in ONE sentence: what is it about and what kind of text is it (article, essay, post, report)? Do NOT name an author unless one is explicitly given. Do not invent a name. Under 25 words.' },
          { role: 'user', content: `Named entities mentioned (these are subjects of the text, NOT the author):\n${entityList}\n\nShape: ${textShape}, ${clauseCount} passages\n\nOpening:\n${sample}\n\nKey passages:\n${surpriseSpans}` },
        ],
        max_tokens: 80,
        temperature: 0.1,
      });
      const identification = (idReply.choices[0]?.message?.content || '').trim();
      // First-pass doc hypothesis. May be wrong — the revision loop in
      // the reading pass will rewrite it as entity hypotheses accumulate.
      if(identification.length > 10) {
        instantHyp = identification;
      }
    } catch(e) { /* LLM not ready yet, use mechanical hypothesis */ }
  }

  const metaClauses = contentResults.slice(0, 15)
    .filter(r => r.clause && /:\s/.test(r.clause) && r.clause.length < 100)
    .map(r => r.clause).join(' ');
  if(metaClauses) instantHyp += ' ' + metaClauses.slice(0, 200);

  if(instantHyp.trim()) {
    graph.hypotheses = graph.hypotheses || {};
    graph.hypotheses.doc = instantHyp.trim();
    emit('SYN', 'Kind', 'Tracing', 'doc-hypothesis', instantHyp.trim().slice(0, 120), 0);
  }

  if(allResults.filter(r=>r.rawType==='clause').length>0) document.getElementById('read-btn').disabled=false;
  document.getElementById('export-btn').disabled=false;
  renderAll();
}

function rebuildLedgers(){
  // First: propagate reader corrections back to entity claims
  for(const r of allResults) {
    if(!r.reclassified && !r.confirmed) continue;
    const correctedOp = r.operator?.name;
    const correctedSite = r.terrain?.name;
    const correctedStance = r.stance?.name;
    if(!correctedOp) continue;

    for(const [key, ent] of Object.entries(graph.entities)) {
      for(const claim of ent.claims) {
        if(claim.clauseIndex === r.clauseIndex) {
          claim.operator = correctedOp;
          claim.site = correctedSite;
          claim.resolution = correctedStance;
          claim.notation = `${correctedOp}(${correctedSite},${correctedStance})`;
          if(r.speaker) claim.speaker = r.speaker;
          if(r.fn) claim.fn = r.fn;
        }
      }
    }
  }

  // Second: mechanical entity merges
  const keys = Object.keys(graph.entities);
  for(const short of keys) {
    if(short.length < 3) continue;
    for(const full of keys) {
      if(short === full || short.length >= full.length) continue;
      const fullWords = full.split(/\s+/);
      const shortWords = short.split(/\s+/);
      if(shortWords.length > 1) continue;
      if(fullWords.length < 2 || fullWords.length > 3) continue;
      if(fullWords[fullWords.length - 1].toLowerCase() !== short.toLowerCase()) continue;
      const firstWord = fullWords[0].toLowerCase();
      if(['the','a','an','of','to','in','for','by','on','at','my','his','her','our','your','their','and','but','or','not','page','book','house','old','till','towards','right'].includes(firstWord)) continue;

      const alreadyMerged = (graph.merges||[]).some(m =>
        (m.short === short && m.full === full) || (m.short === full && m.full === short)
      );
      if(!alreadyMerged) {
        graph.merges.push({ short, full, clauseIndex: -1, ts: new Date().toISOString(), mechanical: true });
        emit('CON', 'Entity', 'Binding', short, `→${full} (mechanical)`, -1);
      }
    }
  }

  // Third: rebuild ledgers from corrected claims
  for(const[key,ent] of Object.entries(graph.entities)){
    ent.ledgers={};
    const bySite={};
    for(const c of ent.claims){if(!bySite[c.site])bySite[c.site]=[];bySite[c.site].push(c);}
    for(const[site,claims] of Object.entries(bySite)){
      claims.sort((a,b)=>a.clauseIndex-b.clauseIndex);
      const ledger={commits:[],currentHash:null};
      const acc=[];
      for(const claim of claims){
        acc.push(claim);
        const hash=siteHash(acc);
        if(hash!==ledger.currentHash){
          const opDist={};for(const c of acc)opDist[c.operator]=(opDist[c.operator]||0)+1;
          const prevOps=ledger.commits.length>0?Object.keys(ledger.commits[ledger.commits.length-1].opDist):[];
          const newOps=Object.keys(opDist).filter(op=>!prevOps.includes(op));
          ledger.commits.push({hash,parent:ledger.currentHash,clauseIndex:claim.clauseIndex,
            added:{operator:claim.operator,rawType:claim.rawType,value:claim.value,fn:claim.fn},
            claimCount:acc.length,opDist:{...opDist},newOperators:newOps,isShift:newOps.length>0});
          ledger.currentHash=hash;
        }
      }
      ent.ledgers[site]=ledger;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  WebLLM reading pass
// ═══════════════════════════════════════════════════════════

let llmEngine = null;
let readingActive = false;
let chatInterruptResolve = null; // set when chat needs the LLM during reading

// Streaming wrapper for WebLLM. Calls onDelta(fullSoFar, delta) for each token.
// Falls back to non-streaming if the engine does not support iteration.
async function streamWebLLM(engine, opts, onDelta) {
  if(!engine) return '';
  try {
    const stream = await engine.chat.completions.create({ ...opts, stream: true });
    if(stream && typeof stream[Symbol.asyncIterator] === 'function') {
      let full = '';
      for await (const chunk of stream) {
        const delta = chunk?.choices?.[0]?.delta?.content || '';
        if(delta) {
          full += delta;
          if(onDelta) { try { onDelta(full, delta); } catch(_) {} }
        }
      }
      return full;
    }
    const full = stream?.choices?.[0]?.message?.content || '';
    if(full && onDelta) { try { onDelta(full, full); } catch(_) {} }
    return full;
  } catch(e) {
    const reply = await engine.chat.completions.create({ ...opts, stream: false });
    const full = reply?.choices?.[0]?.message?.content || '';
    if(full && onDelta) { try { onDelta(full, full); } catch(_) {} }
    return full;
  }
}

// Pre-download LLM weights into browser Cache API (doesn't load into GPU)
async function predownloadLLM() {
  const modelId = document.getElementById('model-select').value;
  const modelName = document.getElementById('model-select').selectedOptions[0]?.text || modelId;
  setStatus(`Ready. ${modelName} will download when reading starts.`);
}

async function initWebLLM(){
  const modelId = document.getElementById('model-select').value;
  const modelName = document.getElementById('model-select').selectedOptions[0]?.text || modelId;
  setStatus(`Loading ${modelName}…`);
  try {
    const webllm = await import('https://esm.run/@mlc-ai/web-llm');
    llmEngine = await webllm.CreateMLCEngine(modelId, {
      initProgressCallback: (p) => {
        setStatus(`${modelName}: ${(p.progress*100).toFixed(0)}% ${p.text || ''}`);
      },
    });
    setStatus(`${modelName} loaded. Starting clause-by-clause reading…`);
  } catch(e) {
    setStatus(`Failed: ${e.message}`);
    appendChat('system', `⚠ ${modelName} failed to load. ${e.message}`);
    llmEngine = null;
    throw e;
  }
}

async function resetCentroids(){
  localStorage.removeItem('eo-centroids-v5');

async function startReading(){
  const readBtn = document.getElementById('read-btn');
  if(readBtn) readBtn.disabled=true;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const readingsTab = document.querySelector('[data-panel="readings"]');
  const readingsPanel = document.getElementById('readings');
  if(readingsTab) readingsTab.classList.add('active');
  if(readingsPanel) { readingsPanel.classList.add('active'); readingsPanel.innerHTML='<div style="color:var(--amber);padding:20px">Preparing to read…</div>'; }

  const source = document.getElementById('url-input').value || '(pasted)';
  const genre = detectGenre(allResults.map(r=>r.clause||'').join(' ').slice(0,500), source);

  const selectedModel = document.getElementById('model-select').value;
  if(llmEngine && llmEngine._modelId !== selectedModel) {
    try { if(llmEngine.unload) await llmEngine.unload(); } catch(e) {}
    llmEngine = null;
  }
  if(!llmEngine) {
    try {
      await initWebLLM();
      if(llmEngine) llmEngine._modelId = selectedModel;
    } catch(e) {
      setStatus(`LLM failed: ${e.message}. Reading requires an LLM.`);
      appendChat('system', `⚠ Cannot read without LLM: ${e.message}`);
      if(readBtn) readBtn.disabled = false;
      return;
    }
  }

  const VALID_OPS = new Set(Object.keys(OPERATORS));
  const VALID_SITES = new Set(Object.keys(TERRAINS));

  const MODE_MAP = ['SEPARATING','CONNECTING','PRODUCING'];
  const DOMAIN_MAP = ['EXISTENCE','ORGANIZATION','MEANING'];
  const OBJECT_MAP = ['BACKGROUND','PARTICULAR','PATTERN'];

  const OP_GRID = [
    ['NUL','SEG','DEF'],
    ['SIG','CON','EVA'],
    ['INS','SYN','REC'],
  ];
  const SITE_GRID = [
    ['Void','Entity','Kind'],
    ['Field','Link','Network'],
    ['Atmosphere','Lens','Paradigm'],
  ];
  const STANCE_GRID = [
    ['Clearing','Dissecting','Unraveling'],
    ['Tending','Binding','Tracing'],
    ['Cultivating','Making','Composing'],
  ];

  // System prompt — adapted from the original eoReader INGEST prompt
  // (see js/prompts.js in clovenbradshaw-ctrl/eoreader). Asks the local
  // model to actually READ the sentence: who is named, what is said
  // about them, what relations are drawn, and what the author judges.
  // The classification axes (q1/q2/q3) ride along but are no longer
  // the point of the call.
  // The per-clause READ prompt. Asks the model to actually read the
  // sentence and report what it says: who is named, what is said
  // about them, what relations are drawn, what is judged. Op/site/
  // stance for the clause are now DERIVED from this reading content
  // (facts → DEF, links → CON, judges → EVA) — no separate axis
  // classification, which a small model would just echo verbatim
  // from any example given.
  const system=`You read ONE sentence and report what it says. Reply with ONLY a JSON object (no prose, no markdown, no code fence):
{"fn":"what THIS sentence does — a short description (4-10 words), NOT a name",
"facts":[{"e":"entity name","says":"attribute or action (4-14 words)"}],
"link":{"from":"name A","to":"name B","how":"short verb"},
"judge":{"about":"entity","claim":"what the text judges","holds":true},
"sp":"speaker name or null","sd":0,
"eq":"short=full or null"}

fn: a verb-phrase description of what the sentence DOES ("reports X", "introduces Y", "claims Z"). NEVER just an entity name. NEVER just a topic. A description.
facts: each entry names ONE specific person/place/org/work and says what the sentence reports about it. Reuse names from priors when they appear. Empty [] if no specific named subject.
link: ONE main relation between two named things, or null. "how" is a short verb ("advises", "founded", "killed", "cited"). null when the sentence has no clear two-thing relation.
judge: the author's evaluation of an entity or claim, or null. Most sentences are null.
sp: who is speaking the sentence (a person name) or null for the narrator.
sd: 0=narrator/exposition, 1=quoted speech, 2=quote-within-quote.
eq: alias map if a short form in this sentence refers to a known full name (e.g. "Walz=Tim Walz"); else null.

HOW TO READ THE USER MESSAGE:
- The bracketed blocks are PRIORS — what the reading so far has established. Confirm what holds, correct what this clause overturns. They are NOT constraints; this clause can introduce something new or contradict a prior.
- [passage so far: …] — the rolling working hypothesis for the passage
- [named in this clause — working hypotheses …] — sites named in this clause along with the current working hypothesis for each. Reuse these names. The hypotheses are revisable.
- [carried forward from last N clauses …] — sites recently in scope. Any pronoun (he, she, they, it) in this clause likely refers to one of them — pick the best match.
- [fast-prior …] — the cheap mechanical reading of this clause. Treat as a hint, not a fact. Override when the actual sentence says otherwise.

CRITICAL RULES:
- Stay inside THIS sentence. The priors are for orientation ONLY. Do NOT copy the working-hypothesis text from the priors into facts.says — facts.says must report what THIS sentence actually says. If a sentence does not say something new about a prior site, that site goes in NEITHER facts NOR link.
- "I", "me", "my", "we", "us" refer to the NARRATOR. Not a named entity. If the subject is "I" with no named co-actor, set facts:[].
- Attribute actions to the entity actually DOING them. "I have asked X about Y" → the narrator asked, X was asked, Y is the topic. Do not say Y did the asking just because Y is mentioned.
- Resolve pronouns (he, she, they, it) using [carried forward …] only when there is a clear antecedent. If unclear, set facts:[].
- fn is a description, not a tag. "reports the Mayor's announcement" ✓ — "Bill Lee" ✗.
- If this clause is web chrome or boilerplate (a CTA, a header, a stray fragment, a subscription form prompt), output empty facts:[] and link:null. Do not invent connections just to have an answer.

Example 1: "I have asked the Tennessean to correct its coverage, which cited John Buntin's report."
→ {"fn":"narrator requests correction of Tennessean's coverage of Buntin's report","facts":[{"e":"Tennessean","says":"was asked to correct its coverage"},{"e":"John Buntin","says":"wrote a report that was cited"}],"link":{"from":"Tennessean","to":"John Buntin","how":"cited"},"judge":null,"sp":null,"sd":0,"eq":null}

Example 2: "Smith, who left Boeing in 2019, now advises the Pentagon on drone policy."
→ {"fn":"reports Smith's career move and current advisory role","facts":[{"e":"Smith","says":"left Boeing in 2019"},{"e":"Smith","says":"advises the Pentagon on drone policy"}],"link":{"from":"Smith","to":"Pentagon","how":"advises"},"judge":null,"sp":null,"sd":0,"eq":null}

Example 3 — boilerplate / chrome: "Click here to become a member."

"${prior}"

${entLines}${sectionsBlock}

${docSourceBlock || '  (none above threshold)'}

WORKING HYPOTHESES about the main sites in this text:
${entLines}${sectionsBlock}

PRIMARY SOURCE — high-salience clauses read so far (verbatim):
${docSourceBlock || '  (none above threshold)'}

    // we already have a prior — what the surrounding text was about,

    // naive extraction from scratch.

      const siteChanged = newSite !== r.terrain.name;
      const stanceChanged = newStance !== r.stance.name;

      const shadowSite = r.terrain.name;
      const shadowStance = r.stance.name;

        emit('EVA', r.terrain?.name, r.stance?.name, `c${r.clauseIndex+1}`, `${shadowOp}→${newOp}`, r.clauseIndex);

      if(gc && gc.stage !== 'folded' && gc.stage !== 'read') gc.stage = 'read';

      const mechDepth = r.quoteState?.depth || 0;
      const mechSpeaker = r.quoteState?.detectedSpeaker || null;
      const mechType = r.quoteState?.detectedType || 'narrator';
      const finalDepth = Math.max(mechDepth, parsedSpeakerDepth);
      const finalSpeaker = parsedSpeaker || mechSpeaker;
      const finalType = parsedSpeaker ? (parsedSpeakerDepth > 0 ? 'person' : mechType) : mechType;

      allReadings.push({
        clauseIndex: r.clauseIndex, clause: r.clause,
        mechanicalOp: shadowOp, mechanicalSite: shadowSite, mechanicalStance: shadowStance,
        readOp: newOp, readSite: newSite, readStance: newStance,
        fn, same: parsedSame, readLink: parsedLink,
        hyp: paraHyp,
        // The structured reading the model produced for this clause.
        // facts → DEFs; relations → CONs; judgments → EVAs.
        reading: {
          facts: parsedFacts,
          relations: parsedRelations,
          judgments: parsedJudgments,
        },
        speaker: { name: finalSpeaker, depth: finalDepth, type: finalType, via: r.quoteState?.detectedVia },
        reclassified: readingType === 'corrected',
        confirmed: readingType === 'confirmed',
        fallback: readingType === 'fallback',
        timestamp: new Date().toISOString(),
        model: document.getElementById('model-select')?.selectedOptions[0]?.text || 'unknown',
      });

      if(parsedSame) {
          const parts = parsedSame.split('=').map(s => s.trim());
          if(parts.length === 2) {
            const short = parts[0].toLowerCase();
            const full = parts[1].toLowerCase();
            if(!graph.merges) graph.merges = [];
            const alreadyMerged = graph.merges.some(m =>
              (m.short === short && m.full === full) || (m.short === full && m.full === short)
            );
            if(!alreadyMerged && short !== full) {
              graph.merges.push({
                short, full,
                clauseIndex: r.clauseIndex,
                ts: new Date().toISOString(),
              });
              emit('CON', 'Entity', 'Binding', short, `→${full}`, r.clauseIndex);
              delete graph.computedFolds[short];
              delete graph.computedFolds[full];
            }
          }
      }
        // (Removed: legacy synthetic Link-site entity creation. The
        // LLM-read CON events below now populate graph.bindings and
        // per-entity edges directly, so we no longer manufacture
        // sentence-shaped "[LINK]" entities.)

      // ── Write LLM reading into the graph ──────────────────────
      // Resolve a free-form name from the model to a canonical entity key.
      // Prefers an existing entity (substring or last-token match), else
      // returns the lowercased name and lazily SIGs a new entity below.
      const resolveReadName = (name) => {
        const lower = String(name || '').toLowerCase().trim();
        if(!lower) return null;
        if(graph.entities[lower]) return lower;
        for(const [k, e] of Object.entries(graph.entities)) {
          const last = k.split(/\s+/).pop();
          if(last === lower) return k;
          if(k.startsWith(lower + ' ') || k.endsWith(' ' + lower)) return k;
        }
        return lower;
      };
      const ensureReadEntity = (name, terrain) => {
        const key = resolveReadName(name);
        if(!key) return null;
        if(!graph.entities[key]) {
          graph.entities[key] = {
            name: name, terrain: terrain || 'Entity',
            claims: [], edges: [], mentions: [], ledgers: {},
            stage: 'read', viaLLM: true,
            eoLog: [{
              op: 'INS', site: terrain || 'Entity', stance: 'Clearing',
              ts: new Date().toISOString(),
              clauseIndex: r.clauseIndex,
              value: 'site introduced from llm-read',
              span: r.clause.slice(0, 200),
              provenance: 'llm-read',
            }],
          };
          emit('INS', terrain || 'Entity', 'Clearing', name, 'llm-read', r.clauseIndex);
        }
        return key;
      };

      const readSpeaker = { name: finalSpeaker, depth: finalDepth, type: finalType, via: r.quoteState?.detectedVia };
      const newClaimsAdded = [];

      // facts → DEF claims (one per fact). Skip exact duplicates.
      for(const f of parsedFacts) {
        const key = ensureReadEntity(f.e, 'Entity');
        if(!key) continue;
        const ent = graph.entities[key];
        const dupe = (ent.claims || []).some(c =>
          c.clauseIndex === r.clauseIndex && c.value === f.says && c.rawType === 'def-llm'
        );
        if(dupe) continue;
        const claim = {
          entity: ent.name, value: f.says, span: r.clause,
          rawType: 'def-llm',
          operator: 'DEF', site: 'Entity', resolution: 'Clearing',
          notation: 'DEF(Entity,Clearing)',
          clauseIndex: r.clauseIndex, fn,
          speaker: readSpeaker,
          provenance: 'llm-read',
        };
        ent.claims.push(claim);
        ent.mentions.push(r.clauseIndex);
        graph.claims.push(claim);
        newClaimsAdded.push(claim);
        ent.eoLog = ent.eoLog || [];
        ent.eoLog.push({
          op: 'DEF', site: 'Entity', stance: 'Clearing',
          ts: new Date().toISOString(),
          clauseIndex: r.clauseIndex,
          value: f.says, span: r.clause.slice(0, 200),
          provenance: 'llm-read',
        });
        emit('DEF', 'Entity', 'Clearing', ent.name, f.says.slice(0, 80), r.clauseIndex);
      }

      // link / links → CON events + graph.bindings entries
      for(const rel of parsedRelations) {
        const fromKey = ensureReadEntity(rel.from, 'Entity');
        const toKey = ensureReadEntity(rel.to, 'Entity');
        if(!fromKey || !toKey || fromKey === toKey) continue;
        const fromEnt = graph.entities[fromKey];
        const toEnt = graph.entities[toKey];
        const dupeEdge = (fromEnt.edges || []).some(e =>
          e.to === toEnt.name && e.relation === rel.how && e.clauseIndex === r.clauseIndex
        );
        if(!dupeEdge) {
          fromEnt.edges = fromEnt.edges || [];
          fromEnt.edges.push({
            from: fromEnt.name, to: toEnt.name, relation: rel.how,
            clauseIndex: r.clauseIndex, span: r.clause, provenance: 'llm-read',
          });
        }
        const binding = {
          subject: fromEnt.name, predicate: rel.how, object: toEnt.name,
          clauseIndex: r.clauseIndex, span: r.clause,
          speaker: readSpeaker, provenance: 'llm-read',
        };
        graph.bindings = graph.bindings || [];
        const dupeBind = graph.bindings.some(b =>
          b.subject === binding.subject && b.predicate === binding.predicate &&
          b.object === binding.object && b.clauseIndex === binding.clauseIndex
        );
        if(!dupeBind) graph.bindings.push(binding);
        const conEntry = {
          op: 'CON', site: 'Network', stance: 'Binding',
          ts: new Date().toISOString(),
          clauseIndex: r.clauseIndex,
          value: `${rel.how}→${toEnt.name}`,
          relation: rel.how, to: toEnt.name,
          span: r.clause.slice(0, 200),
          provenance: 'llm-read',
        };
        fromEnt.eoLog = fromEnt.eoLog || [];
        fromEnt.eoLog.push(conEntry);
        toEnt.eoLog = toEnt.eoLog || [];
        toEnt.eoLog.push({ ...conEntry, value: `←${rel.how} ${fromEnt.name}`, from: fromEnt.name });
        emit('CON', 'Network', 'Binding', fromEnt.name, `${rel.how}→${toEnt.name}`, r.clauseIndex);
      }

      // judge → EVA claim against the named entity
      for(const jdg of parsedJudgments) {
        const key = ensureReadEntity(jdg.about, 'Lens');
        if(!key) continue;
        const ent = graph.entities[key];
        const claim = {
          entity: ent.name, value: jdg.claim, span: r.clause,
          rawType: 'eva-llm',
          operator: 'EVA', site: 'Lens', resolution: 'Tracing',
          notation: 'EVA(Lens,Tracing)',
          clauseIndex: r.clauseIndex, fn,
          status: jdg.holds ? 'holds' : 'fails',
          speaker: readSpeaker,
          provenance: 'llm-read',
        };
        ent.claims.push(claim);
        ent.mentions.push(r.clauseIndex);
        graph.claims.push(claim);
        ent.eoLog = ent.eoLog || [];
        ent.eoLog.push({
          op: 'EVA', site: 'Lens', stance: 'Tracing',
          ts: new Date().toISOString(),
          clauseIndex: r.clauseIndex,
          value: jdg.claim,
          status: jdg.holds ? 'holds' : 'fails',
          span: r.clause.slice(0, 200),
          provenance: 'llm-read',
        });
        emit('EVA', 'Lens', 'Tracing', ent.name,
          `${jdg.holds ? '✓' : '✗'} ${jdg.claim.slice(0, 60)}`, r.clauseIndex);
      }

      // Stash the reading on the clause result so renderReadings + the
      // chat horizon can show what the model actually read, not just
      // an op/site/stance tag.
      r.reading = {
        fn,
        facts: parsedFacts,
        relations: parsedRelations,
        judgments: parsedJudgments,
      };

      // ── Hypotheses evolve ─────────────────────────────────────
      // The graph is a working hypothesis. Every entity ("site") has a
      // one-sentence hypothesis for who/what it is. At intervals — keyed
      // to how many times the site has been read — we revise that
      // hypothesis, feeding the model BOTH the prior hypothesis AND a
      // chunk of primary source content (the actual clauses the site
      // appeared in). The model is allowed to keep, refine, or overturn
      // the prior reading. The trail of revisions is preserved.
      // (See HYPOTHESIS_ENTITY in the original eoReader prompts.js.)
      const touchedEntityKeys = new Set();
      for(const claim of newClaimsAdded) {
        const k = (claim.entity || '').toLowerCase();
        if(k) touchedEntityKeys.add(k);
      }
      for(const key of touchedEntityKeys) {
        const ent = graph.entities[key];
        if(!ent) continue;
        ent._llmFactCount = (ent._llmFactCount || 0) + 1;
        // Revise on 1st, 3rd, 6th, 10th… llm-read fact. Cheap early,
        // sparse later, so sites with many mentions still get
        // periodic re-evaluation without flooding the LLM.
        const triggers = new Set([1, 3, 6, 10, 16, 24, 36]);
        if(!triggers.has(ent._llmFactCount)) continue;
        try {
          // PRIMARY SOURCE: the actual clauses where this site appeared.
          // Distilled facts compress reading; primary text lets the model
          // SEE what the source actually says before revising. Cap to
          // keep the prompt inside what tiny models can handle.
          const seen = new Set();
          const sourceSpans = [];
          let charBudget = 1400;
          const clauseRecs = (ent.mentions || [])
            .map(idx => allResults.find(ar => ar.clauseIndex === idx))
            .filter(Boolean);
          // Most recent + earliest mention first — gives the model both
          // how the site was introduced and how it is currently being used.
          const ordered = [
            ...clauseRecs.slice(-5).reverse(),
            ...clauseRecs.slice(0, 2),
          ];
          for(const cr of ordered) {
            if(seen.has(cr.clauseIndex)) continue;
            const txt = (cr.clause || '').trim().slice(0, 280);
            if(!txt) continue;
            if(txt.length > charBudget) break;
            sourceSpans.push(`  [c${cr.clauseIndex + 1}] "${txt}"`);
            seen.add(cr.clauseIndex);
            charBudget -= txt.length + 10;
          }
          const sourceBlock = sourceSpans.join('\n');

          const llmFacts = (ent.claims || [])
            .filter(c => c.rawType === 'def-llm' || c.rawType === 'eva-llm')
            .slice(-6);
          const factLines = llmFacts.map(c =>
            (c.rawType === 'eva-llm' ? '  ⚖ ' : '  · ') + c.value
          ).join('\n');

          const priorHyp = ent.hypothesis;
          const revCount = (ent.priorHypotheses || []).length;
          const epistemic = `This is a WORKING HYPOTHESIS — a provisional reading. Later evidence may overturn it. Build on the prior reading; do not restart from scratch.`;
          const entPrompt = priorHyp
            ? `${epistemic}

SITE: ${ent.name}
PRIOR WORKING HYPOTHESIS (rev ${revCount}):
"${priorHyp}"

PRIMARY SOURCE — clauses in which ${ent.name} appears (verbatim):
${sourceBlock}

DISTILLED READINGS so far:
${factLines || '  (none)'}

Revise into ONE specific sentence (under 30 words) describing who or what ${ent.name} is in this text. Keep what the source supports. Drop what later clauses overturned. Be specific. ALSO declare what kind of conceptual move this revision is.`
            : `${epistemic}

SITE: ${ent.name}
(no prior hypothesis — first reading)

PRIMARY SOURCE — clauses in which ${ent.name} appears (verbatim):
${sourceBlock}

DISTILLED READINGS:
${factLines || '  (none)'}

Write ONE specific sentence (under 30 words) for who or what ${ent.name} is in this text.`;
          // Ask the model to declare what kind of conceptual move its
          // revision is — so we can store it in EO notation. REC is the
          // operator for changing the frame we are thinking about
          // something in. SYN is composing what's there into a unified
          // reading. NUL is no change.
          const hypReply = await llmEngine.chat.completions.create({
            messages: [
              { role: 'system', content: `You are building a working hypothesis about a named site in a text. Reply with ONLY a JSON object (no prose, no markdown):
{"h":"<one specific sentence under 30 words>",
"move":"recast|refine|correct|hold",
"why":"<a few words for why this move>"}

"move":
- "recast" = changing the FRAME — different role, category, or what kind of thing the site is. Use when the new reading is not just more detail but a different conception.
- "refine" = same frame, more specific. Adding detail or sharpening, not changing what kind of thing the site is.
- "correct" = the prior hypothesis had a factual error and this fixes it.
- "hold" = nothing meaningful to add; the prior still stands.

When there is no prior, use "refine".` },
              { role: 'user', content: entPrompt },
            ],
            max_tokens: 160, temperature: 0.2,
          });
          const raw = (hypReply.choices[0]?.message?.content || '').trim();
          let newHyp = '', move = 'refine', why = '';
          try {
            const cleaned = raw.replace(/```json\s*/g,'').replace(/```/g,'').trim();
            const jsonStr = extractBalancedJson(cleaned) || cleaned.match(/\{[\s\S]+\}/)?.[0];
            if(jsonStr) {
              const j = JSON.parse(jsonStr);
              newHyp = stripPreamble(String(j.h || j.hypothesis || '')).trim();
              const m = String(j.move || j.kind || '').toLowerCase().trim();
              if(['recast','refine','correct','hold'].includes(m)) move = m;
              if(j.why) why = String(j.why).slice(0, 120);
            }
          } catch(_) {}
          // Fallback: model returned just a sentence.
          if(!newHyp) newHyp = stripPreamble(raw).slice(0, 350);
          if(newHyp && newHyp.length > 8 && newHyp.length < 400) {
            const changed = !priorHyp || priorHyp !== newHyp;
            // Map the declared move to an EO operator. This is the
            // typed record of HOW the graph's understanding of this
            // site is changing, stored in EO notation.
            let eoOp, eoStance;
            if(!priorHyp) {
              eoOp = 'INS'; eoStance = 'Composing';
            } else if(move === 'hold' || !changed) {
              eoOp = 'NUL'; eoStance = 'Clearing';
            } else if(move === 'recast') {
              eoOp = 'REC'; eoStance = 'Composing';
            } else if(move === 'correct') {
              eoOp = 'REC'; eoStance = 'Dissecting';
            } else {
              eoOp = 'SYN'; eoStance = 'Composing';
            }

            ent.priorHypotheses = ent.priorHypotheses || [];
            if(priorHyp && priorHyp !== newHyp) {
              ent.priorHypotheses.push({
                text: priorHyp,
                supersededAt: r.clauseIndex,
                supersededBy: 'llm-revision',
                supersedingMove: move,
                supersedingOp: eoOp,
                why,
                factCountAtTime: ent._llmFactCount - 1,
              });
            }

            // Per-site EO log: the typed record of moves that built the
            // current working hypothesis.
            ent.eoLog = ent.eoLog || [];
            ent.eoLog.push({
              op: eoOp, site: 'Entity', stance: eoStance,
              ts: new Date().toISOString(),
              clauseIndex: r.clauseIndex,
              move, why,
              hypothesisBefore: priorHyp || null,
              hypothesisAfter: newHyp,
            });

            if(changed) {
              ent.hypothesis = newHyp;
              ent.hypothesisRev = (ent.hypothesisRev || 0) + 1;
              ent.lastMove = move;
              ent.lastMoveOp = eoOp;
            }
            ent.hypothesisStatus = 'working';
            emit(eoOp, 'Entity', eoStance, ent.name,
              `${move}: ${newHyp.slice(0, 70)}`, r.clauseIndex);
          }
        } catch(_) { /* keep prior hypothesis on revision failure */ }
      }

      // The doc working hypothesis evolves like a site hypothesis does:
      // fired at clause intervals, fired whenever a new section
      // hypothesis lands (sections are natural rollups), and once
      // unconditionally at end of reading. See reviseDocHypothesis
      // helper below.
      if(i > 0 && i % 8 === 0) {
        await reviseDocHypothesis(r.clauseIndex, 'interval');
      }

      prevClauseText = r.clause;

      if(allReadings.length % 3 === 0) {
        window._readings = allReadings;
        window._readingErrors = errors;
        graph.hypotheses = {
          doc: docHyp || graph.hypotheses?.doc || '',
          sections: sectionHyps.length > 0 ? [...sectionHyps] : (graph.hypotheses?.sections || []),
          final: paraHyp || graph.hypotheses?.final || ''
        };
        renderReadings();
      }
    } catch(e) {
      skipped++;
      errors.push({ clause: r.clauseIndex, error: e.message || String(e) });
      prevClauseText = r.clause;
      if(errors.length > 10 && errors.slice(-5).every(e => e.clause >= r.clauseIndex - 5)) {
        setStatus(`Reading stopped early. ${i+1}/${toRead.length} clauses processed.`);
        break;
      }
    }
  }

  if(rawBuffer.length > 0 && llmEngine) {
    try {
      const rawText = rawBuffer.join('\n');
      const paraPrompt = paraHyp
        ? `Current understanding:\n"${paraHyp}"\n\nNew text:\n${rawText}\n\nRevise your understanding into one sentence. Keep what still holds. Add what's new. Drop what was corrected.`
        : `${rawText}\n\nWhat has this text established so far? One sentence. Under 20 words.`;
      const hypReply = await llmEngine.chat.completions.create({
        messages:[{role:'user', content: paraPrompt}],
        max_tokens: 40, temperature: 0.1,
      });
      paraHyp = stripPreamble((hypReply.choices[0]?.message?.content || '').trim());
    } catch(e) {}
  }

  if(paraHyp) {
    sectionHyps.push({ text: paraHyp, from: sectionStart, to: toRead.length > 0 ? toRead[toRead.length-1].clauseIndex : 0 });
  }

  // Final pass: revise the doc working hypothesis against EVERYTHING
  // we've accumulated. Runs unconditionally so even short docs (where
  // the interval-based revision never fired) get one rollup at the end.
  const finalIdx = toRead.length > 0 ? toRead[toRead.length - 1].clauseIndex : 0;
  await reviseDocHypothesis(finalIdx, 'final');

  graph.hypotheses = {
    doc: docHyp || graph.hypotheses?.doc || '',
    sections: sectionHyps.length > 0 ? sectionHyps : (graph.hypotheses?.sections || []),
    paragraph: paraHyp || graph.hypotheses?.paragraph || ''
  };

  rebuildLedgers();
  saveCentroids();

  const modelUsed = document.getElementById('model-select')?.selectedOptions[0]?.text || 'unknown';

  const health = computeHealth(allReadings);
  const chromeDiscoveries = discoverChrome(allReadings, errors);

  const published = await publishReadingSession(source, genre, modelUsed, allReadings, graph.hypotheses, {
    operators: refVecs.operators, terrains: refVecs.terrains, stances: refVecs.stances,
    corrections: correctionCount,
  });

  if(graph.genreVec) {
    await publishToLog([{
      op: 'DEF', site: 'Kind', stance: 'Tracing',
      slug: `genre:${genre}`,
      genre,
      payload: { genreVec: graph.genreVec, source, docHypothesis: graph.hypotheses?.doc },
    }]);
  }

  const hypEntries = [];
  if(docHyp) {
    hypEntries.push({
      op: 'DEF', site: 'Paradigm', stance: 'Tracing',
      slug: `hypothesis:doc:${source.slice(0,40).replace(/[^a-zA-Z0-9]/g,'-')}`,
      genre, holon: 'document',
      payload: { text: docHyp, source, clauseRange: [0, toRead.length], level: 'document' },
    });
  }
  for(const s of sectionHyps) {
    hypEntries.push({
      op: 'DEF', site: 'Network', stance: 'Tracing',
      slug: `hypothesis:sec:${source.slice(0,30).replace(/[^a-zA-Z0-9]/g,'-')}:c${s.from}`,
      genre, holon: 'section',
      payload: { text: s.text, source, clauseRange: [s.from, s.to], level: 'section' },
    });
  }
  if(paraHyp) {
    hypEntries.push({
      op: 'DEF', site: 'Entity', stance: 'Tracing',
      slug: `hypothesis:para:${source.slice(0,30).replace(/[^a-zA-Z0-9]/g,'-')}`,
      genre, holon: 'paragraph',
      payload: { text: paraHyp, source, level: 'paragraph' },
    });
  }
  if(hypEntries.length > 0) await publishToLog(hypEntries);

  await publishHealth(genre, health, chromeDiscoveries);
  graph.genre = genre;
  graph.health = health;

  setProgress(toRead.length, toRead.length);
  const merges = allReadings.filter(r => r.same).length;
  const healthIcon = health.score > 60 ? '🟢' : health.score > 30 ? '🟡' : '🔴';
  setStatus(`Done. ✓${confirmations} ✎${corrections} ⊘${skipped} | ${genre} ${healthIcon}${health.score}% | ${sectionHyps.length} sections | ${correctionCount} learned | ${hypEntries.length} hypotheses`);
  window._readings = allReadings;
  window._readingErrors = errors;

  try {
    if(llmEngine && llmEngine.unload) await llmEngine.unload();
  } catch(e) {}
  llmEngine = null;

  readingActive = false;

  try {
    setStatus('Reloading embedding model…');
    const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1');
    embedder = await pipeline('feature-extraction','Xenova/all-MiniLM-L6-v2',{dtype:'fp32'});
    embeddingsReady = true;
    setStatus(`Done reading. ✓${confirmations} ✎${corrections} ⊘${skipped} | ${sectionHyps.length} sections | ${correctionCount} learned. Embedder reloaded.`);
  } catch(e) {
    setStatus(`Done reading. ✓${confirmations} ✎${corrections} ⊘${skipped} | Embedder reload failed — refresh page for new extraction.`);
  }

  document.getElementById('read-btn').disabled=false;
  renderAll();
}


//  Fetch via proxy
// ═══════════════════════════════════════════════════════════

async function fetchAndProcess(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){setStatus('Enter a URL.');return;}
  if(!embeddingsReady){setStatus('Embedding model still loading…');return;}

  const fetchBtn = document.getElementById('fetch-btn'); if(fetchBtn) fetchBtn.disabled=true;
  setStatus('Fetching via proxy…');

  try{
    let text = '';

    const wikiMatch = url.match(/en\.wikipedia\.org\/wiki\/(.+)/);
    if(wikiMatch) {
      setStatus('Fetching from Wikipedia API…');
      const title = decodeURIComponent(wikiMatch[1]).replace(/_/g, ' ');
      const apiUrl = `https://en.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=text&format=json&origin=*`;
      const r = await fetch(apiUrl);
      if(!r.ok) throw new Error(`Wikipedia API returned ${r.status}`);
      const j = await r.json();
      const html = j?.parse?.text?.['*'] || '';
      text = parseStructuredHTML(html, title);
      setStatus(`Fetched structured content.`);
    } else {
      setStatus('Fetching via proxy…');
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const proxyUrl=`https://n8n.intelechia.com/webhook/feed?url=${encodeURIComponent(url)}`;
      const r=await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);
      if(!r.ok) throw new Error(`Proxy returned ${r.status}`);
      const data=await r.text();
      try{
        const j=JSON.parse(data);
        text=j.text||j.body||j.content||j.article||JSON.stringify(j);
      }catch{text=data;}
      text=text.replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
        .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
        .replace(/<[^>]+>/g,' ')
        .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'')
        .replace(/\s{2,}/g,' ').trim();
    }

    if(text.length<50){setStatus('Fetched content too short. Check the URL.');if(fetchBtn) fetchBtn.disabled=false;return;}

    setStatus(`Fetched ${text.length} chars. Processing…`);
    await processText(text);
    if(document.getElementById('read-btn') && !document.getElementById('read-btn').disabled) {
      setTimeout(() => startReading(), 500);
    }
  }catch(e){
    setStatus(`Error: ${e.message}`);
  }
  if(fetchBtn) fetchBtn.disabled=false;
}

async function processFromTextarea() {
  const text = document.getElementById('text-input').value.trim();
  if(!text || text.length < 50) { setStatus('Paste at least a paragraph of text.'); return; }
  if(!embeddingsReady) { setStatus('Embedding model still loading…'); return; }
  document.getElementById('url-input').value = '(pasted text)';
  setStatus(`Processing ${text.length} chars…`);
  await processText(text);
  if(document.getElementById('read-btn') && !document.getElementById('read-btn').disabled) {
    setTimeout(() => startReading(), 500);
  }
}

function renderSourceExplorer() {
  const libEl = document.getElementById('doc-library');
  const detailEl = document.getElementById('doc-detail');
  if(!libEl || !allResults.length) return;

  const addEl = document.getElementById('add-content');
  if(addEl) addEl.open = false;

  const source = document.getElementById('url-input').value || '(pasted text)';
  const title = source.replace(/https?:\/\/(www\.)?/,'').split('/').slice(0,3).join('/');
  const clauseCount = allResults.filter(r => r.rawType === 'clause').length;
  const chromeCount = allResults.filter(r => r.rawType === 'chrome').length;
  const entityCount = Object.keys(graph.entities).length;
  const readCount = allResults.filter(r => r.reclassified || r.confirmed).length;
  const mergeCount = (graph.merges||[]).length;
  const docHyp = graph.hypotheses?.doc || '';
  const isRead = readCount > 0;

  let cardHtml = `<div onclick="toggleDocDetail()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='var(--surface2)'">`;
  cardHtml += `<div style="font-size:13px;font-weight:600;color:var(--bright);margin-bottom:4px">${title.replace(/</g,'&lt;')}</div>`;
  if(docHyp) cardHtml += `<div style="font-size:12px;color:var(--text);font-family:var(--serif);margin-bottom:6px;line-height:1.4">${docHyp.replace(/</g,'&lt;')}</div>`;
  cardHtml += '<div style="display:flex;gap:12px;font-size:10px;font-family:var(--mono);color:var(--dim)">';
  cardHtml += `<span>${clauseCount} clauses</span>`;
  cardHtml += `<span>${entityCount} entities</span>`;
  if(mergeCount > 0) cardHtml += `<span>${mergeCount} merges</span>`;
  cardHtml += `<span>${chromeCount} chrome</span>`;
  if(isRead) cardHtml += `<span style="color:var(--green)">✓ read (${readCount})</span>`;
  else cardHtml += `<span style="color:var(--amber)">unread</span>`;
  cardHtml += '</div></div>';
  libEl.innerHTML = cardHtml;
}

function toggleDocDetail() {
  const el = document.getElementById('doc-detail');
  if(el.style.display === 'none') {
    el.style.display = 'block';
    renderDocDetail();
  } else {
    el.style.display = 'none';
  }
}

function renderDocDetail() {
  const el = document.getElementById('doc-detail');
  if(!el || !allResults.length) return;

  let html = '';

  const sections = graph.hypotheses?.sections || [];
  if(sections.length > 0) {
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
    for(let s = 0; s < sections.length; s++) {
      html += `<span onclick="scrollToClause(${sections[s].from})" style="font-size:10px;padding:3px 8px;background:var(--surface2);border-radius:4px;cursor:pointer;color:var(--amber);font-family:var(--mono)">§${s+1} c${sections[s].from+1}</span>`;
    }
    html += '</div>';
  }

  let currentSection = 0;
  for(const r of allResults) {
    const op = r.operator?.name || '?';
    const color = OP_COLORS[op] || 'var(--dim)';
    const isChrome = r.rawType === 'chrome';
    const isRead = r.reclassified || r.confirmed;
    const speaker = r.quoteState;

    if(sections[currentSection] && r.clauseIndex >= sections[currentSection]?.from && currentSection > 0) {
    }
    const secMatch = sections.find(s => s.from === r.clauseIndex);
    if(secMatch) {
      html += `<div id="clause-${r.clauseIndex}" style="margin:12px 0 4px;padding:4px 8px;background:var(--amber)10;border-left:3px solid var(--amber);font-size:11px;color:var(--amber);font-family:var(--serif)">${secMatch.text.slice(0,120).replace(/</g,'&lt;')}</div>`;
    }

    const opacity = isChrome ? '0.2' : '1';
    const bg = isRead ? 'rgba(59,130,246,0.04)' : 'transparent';
    const leftBorder = (speaker?.depth > 0) ? 'border-left:3px solid var(--amber);padding-left:8px;' : '';

    html += `<div style="margin:1px 0;padding:3px 6px;opacity:${opacity};background:${bg};${leftBorder}border-radius:2px;line-height:1.5;font-size:12px">`;
    html += `<span style="color:var(--dim);font-size:9px;font-family:var(--mono);display:inline-block;width:28px">c${r.clauseIndex+1}</span>`;
    html += `<span style="color:${color};font-size:9px;font-family:var(--mono);display:inline-block;width:28px">${op}</span>`;

    if(speaker?.depth > 0 && speaker?.detectedSpeaker) {
      html += `<span style="color:var(--amber);font-size:9px;margin-right:4px">▸${speaker.detectedSpeaker}</span>`;
    }
    if(isChrome) {
      html += `<span style="font-size:9px;color:var(--dim)">[chrome] </span>`;
    }

    let text = (r.clause || r.span || '').slice(0, 250);
    let highlighted = text.replace(/</g, '&lt;');
    for(const [key] of Object.entries(graph.entities).slice(0, 15)) {
      if(key.length < 3) continue;
      const re = new RegExp(`(${key.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      highlighted = highlighted.replace(re, '<span style="color:var(--green);font-weight:600">$1</span>');
    }
    html += `<span style="font-family:var(--serif);color:var(--text)">${highlighted}</span>`;
    html += '</div>';
  }

  el.innerHTML = html;
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
