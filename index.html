const chatHistory = [];

function responseHypothesis(subQuestions, promptClassification) {
  return subQuestions.map(sq => ({
    op: sq.op,
    site: sq.site,
    stance: sq.stance,
    text: sq.text,
    notation: sq.notation || `${sq.op}(${sq.site})`,
  }));
}

async function evaluateResponseFit(answer, hypotheses, embedFn) {
  const issues = [];
  let score = 1.0;

  if(!answer || answer.length < 10) {
    return { score: 0, issues: ['Answer is too short or empty.'] };
  }

  let answerClass = null;
  if(embedFn && embeddingsReady) {
    try {
      const answerVec = await embedFn(answer);
      answerClass = classifyAxes(answerVec);
    } catch(e) { /* classification unavailable */ }
  }

  if(answerClass && hypotheses.length > 0) {
    const expectedSite = hypotheses[0].site;
    const expectedOp = hypotheses[0].op;
    const actualSite = answerClass.terrain.name;
    const actualOp = answerClass.operator.name;

    if(expectedSite !== actualSite) {
      if(answerClass.terrain.margin > 0.03) {
        score -= 0.3;
        issues.push(`Question expects ${expectedSite} content but answer classifies as ${actualSite}. The answer may not address what was asked.`);
      }
    }

    if(expectedOp !== actualOp && answerClass.operator.margin > 0.03) {
      score -= 0.15;
      issues.push(`Question is ${expectedOp} type but answer reads as ${actualOp}.`);
    }
  }

  if(hypotheses.length > 1 && answer.split(/[.!?]/).length < hypotheses.length) {
    score -= 0.2;
    issues.push(`Question has ${hypotheses.length} parts but answer has fewer sentences.`);
  }

  return { score: Math.max(0, score), issues };
}

function trimRepetition(text) {
  if(!text) return text;
  const sentences = text.split(/(?<=[.!?])\s+/);
  const seen = new Set();
  const kept = [];
  for(const s of sentences) {
    const normalized = s.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '');
    if(normalized.length < 10) { kept.push(s); continue; }
    if(seen.has(normalized)) break;
    seen.add(normalized);
    kept.push(s);
  }
  return kept.join(' ').trim();
}

function decomposeQuestion(q) {
  const parts = q.split(/\band\b|,\s*(?=[a-z])|;\s*/i).map(p => p.trim()).filter(p => p.length > 3);

  const classify = (text) => {
    const t = text.toLowerCase();
    let op = 'DEF', site = 'Entity', stance = 'Clearing';

    if(/\bwhy\b|\bcause|\breason/.test(t)) { op = 'CON'; site = 'Network'; stance = 'Binding'; }
    else if(/\bhow\b.*\bcompare|\bvs\b|\bversus\b|\bdifference/.test(t)) { op = 'CON'; site = 'Network'; stance = 'Tracing'; }
    else if(/\bhow\b/.test(t)) { op = 'CON'; site = 'Network'; stance = 'Binding'; }
    else if(/\bshould\b|\bworth\b|\bbetter\b|\bworse\b|\bdangerous|\bnormal|\brecommend/.test(t)) { op = 'EVA'; site = 'Atmosphere'; stance = 'Tending'; }
    else if(/\bcompare|\blist\b|\bwhat are the\b/.test(t)) { op = 'SEG'; site = 'Kind'; stance = 'Dissecting'; }
    else if(/\bsummar|\boverview|\btldr/.test(t)) { op = 'SYN'; site = 'Kind'; stance = 'Composing'; }
    else if(/\bwho\b/.test(t)) { op = 'DEF'; site = 'Entity'; stance = 'Clearing'; }
    else if(/\bwhen\b/.test(t)) { op = 'DEF'; site = 'Cycle'; stance = 'Clearing'; }
    else if(/\bwhere\b/.test(t)) { op = 'DEF'; site = 'Locale'; stance = 'Clearing'; }
    else if(/\bwhat\b.*\b(budget|cost|price|revenue|salary|worth|box office|amount|number)/.test(t)) { op = 'DEF'; site = 'Resource'; stance = 'Clearing'; }
    else if(/\bwhat\b.*\bchange|\bevolve|\bshift|\btransform/.test(t)) { op = 'REC'; site = 'Paradigm'; stance = 'Composing'; }
    else if(/\bwhat\b/.test(t)) { op = 'DEF'; site = 'Entity'; stance = 'Clearing'; }

    const sufficiency = {
      DEF: { needs: 'a specific fact or name', check: (a) => /\b(is|was|are|were|has|had)\b/i.test(a) },
      CON: { needs: 'a causal or comparative explanation', check: (a) => /\b(because|due to|caused|since|results?|leads?|compared|whereas|while)\b/i.test(a) },
      EVA: { needs: 'an assessment or judgment', check: (a) => /\b(should|better|worse|dangerous|safe|normal|recommend|consider)\b/i.test(a) },
      SEG: { needs: 'a list or decomposition', check: (a) => a.split(/[.!?]/).length >= 3 || /\b(first|second|also|another|include)\b/i.test(a) },
      SYN: { needs: 'a broad synthesis', check: (a) => a.length > 100 },
      REC: { needs: 'a description of change over time', check: (a) => /\b(changed|evolved|shifted|became|transitioned|before|after|now)\b/i.test(a) },
    };

    return {
      op, site, stance, text: text.trim(),
      needs: sufficiency[op]?.needs || 'a factual statement',
      checkSufficiency: sufficiency[op]?.check || (() => true),
      notation: `${op}(${site}, ${stance})`,
    };
  };

  if(parts.length <= 1) return [classify(q)];
  return parts.map(classify);
}

function restateQuestion(q) {
  const lower = q.toLowerCase().trim();
  const terms = lower.replace(/[?!.,]/g, '').split(/\s+/).filter(w => w.length > 2 && !['what','who','how','why','when','where','does','did','was','the','this','that','about','from','with'].includes(w));

  if(/^what.*about/i.test(lower)) return `→ looking for what this text is about`;
  if(/^who\s+(directed|wrote|produced|created|made)/i.test(lower)) return `→ looking for ${lower.match(/(directed|wrote|produced|created|made)/i)[1]} credits`;
  if(/^who\s+(stars?|acts?|is\s+in|was\s+in|played)/i.test(lower)) return `→ looking for cast and actors`;
  if(/^who\s+is/i.test(lower)) return `→ looking for information about ${terms.slice(-2).join(' ')}`;
  if(/^who\b/i.test(lower)) return `→ looking for people: ${terms.join(', ')}`;
  if(/^when/i.test(lower)) return `→ looking for dates and timing`;
  if(/^where/i.test(lower)) return `→ looking for locations`;
  if(/^why/i.test(lower)) return `→ looking for reasons and causes`;
  if(/^how\s+much/i.test(lower)) return `→ looking for amounts and numbers`;
  if(/^how/i.test(lower)) return `→ looking for process or method`;
  if(terms.length > 0) return `→ searching for: ${terms.slice(0, 4).join(', ')}`;
  return `→ searching…`;
}

function evolveParams(question, signals, wasFastPath, snapshot) {
  const qWords = question.toLowerCase().split(/\s+/).filter(w => w.length > 3);
  const signalText = signals.map(s => s.text).join(' ').toLowerCase();
  const coverage = qWords.filter(w => signalText.includes(w)).length / Math.max(qWords.length, 1);
  const readRatio = signals.filter(s => s.isRead).length / Math.max(signals.length, 1);
  const diversity = new Set(signals.map(s => s.op)).size;

  const fitness = (coverage * 0.4) + (readRatio * 0.3) + (Math.min(diversity, 4) / 4 * 0.3);

  emit('EVA', 'Paradigm', 'Composing', 'search-fitness',
    `${fitness.toFixed(2)} cov:${coverage.toFixed(2)} read:${readRatio.toFixed(2)} div:${diversity} fast:${wasFastPath}`);

  if(fitness < 0.5) {
    const mutableKeys = ['readBonusBase','unreadFloor','keywordWeight','earlyBonus','earlyWindow','centralityWeight','operatorFitBoost','speakerBoost'];
    const numMutations = fitness < 0.3 ? 2 : 1;
    SEARCH_PARAMS._version++;
    for(let m = 0; m < numMutations; m++) {
      const key = mutableKeys[Math.floor(Math.random() * mutableKeys.length)];
      const current = SEARCH_PARAMS[key];
      const delta = current * (0.15 * (Math.random() > 0.5 ? 1 : -1));
      const newVal = Math.max(0.05, current + delta);
      SEARCH_PARAMS[key] = Math.round(newVal * 100) / 100;
      emit('REC', 'Paradigm', 'Composing', `frame:${key}`, `${current}→${SEARCH_PARAMS[key]} (v${SEARCH_PARAMS._version})`);
    }
  }
}

let currentAnswerAbort = null;

function epistemicCard(level, text, opts = {}) {
  const styles = {
    KNOWN:        { color: 'var(--green, #22c55e)',  bg: 'color-mix(in srgb, var(--green, #22c55e) 8%, transparent)' },
    HYPOTHESIZED: { color: 'var(--violet, #a78bfa)',  bg: 'color-mix(in srgb, var(--violet, #a78bfa) 8%, transparent)' },
    CITED:        { color: 'var(--accent, #6fa3f7)',  bg: 'color-mix(in srgb, var(--accent, #6fa3f7) 5%, transparent)' },
    INTERPRETED:  { color: 'var(--amber, #f0c060)',   bg: 'rgba(240,192,96,0.05)' },
    SYNTHETIC:    { color: 'var(--violet, #a78bfa)',  bg: 'color-mix(in srgb, var(--violet, #a78bfa) 8%, transparent)' },
    SCENE:        { color: 'var(--accent, #6fa3f7)',  bg: 'color-mix(in srgb, var(--accent, #6fa3f7) 5%, transparent)' },
    SIGNAL:       { color: 'var(--dim)',              bg: 'transparent' },
    ERROR:        { color: 'var(--red, #ef4444)',     bg: 'color-mix(in srgb, var(--red, #ef4444) 5%, transparent)' },
  };
  const s = styles[level] || styles.SIGNAL;
  const label = level === 'SYNTHETIC' ? '✨ SYNTHETIC — model knowledge + evidence' : level;
  const sublabel = opts.sublabel ? ` <span style="opacity:0.6">${opts.sublabel}</span>` : '';
  const fontSize = opts.small ? '12px' : '14px';
  const escaped = text.replace(/</g, '&lt;').replace(/\n/g, '<br>');
  return `<div style="border-left:3px solid ${s.color};padding:6px 10px;margin:4px 0;background:${s.bg};border-radius:0 4px 4px 0;animation:fadeIn 0.3s ease-in">` +
    `<div style="font-size:9px;color:${s.color};font-family:var(--mono);margin-bottom:2px">${label}${sublabel}</div>` +
    `<div style="font-family:var(--serif);font-size:${fontSize};line-height:1.7;color:var(--text)">${escaped}</div>` +
    (opts.warning ? `<div style="margin-top:4px;font-size:10px;color:var(--red)">⚠ ${opts.warning}</div>` : '') +
    `</div>`;
}

async function askQuestion(directText) {
  const input = document.getElementById('chat-input');
  const question = directText || input.value.trim();
  if(!question) return;
  if(!directText) { input.value = ''; input.style.height = 'auto'; }

  if(currentAnswerAbort) {
    currentAnswerAbort.aborted = true;
    currentAnswerAbort = null;
  }
  const abort = { aborted: false };
  currentAnswerAbort = abort;
  let resumeReading = null;

  appendChat('user', question);

  const casual = /^(hi|hello|hey|how are you|how'?s it going|what'?s up|thanks|thank you|ok|okay|cool|nice|got it|sure|yes|no|nah|yep|nope|good morning|good evening|sup)\s*[.!?]*$/i;
  if(casual.test(question.trim())) {
    appendChat('assistant', question.match(/thank/i) ? "You're welcome! Ask me anything about the text." :
      question.match(/how are/i) ? "I'm reading! Ask me anything about what's loaded." :
      question.match(/hi|hello|hey|sup|morning|evening/i) ? "Hi! Paste a URL or text to get started, or ask about what's loaded." :
      "Got it. What else would you like to know?", 'SIGNAL');
    currentAnswerAbort = null;
    return;
  }

  const isCreative = /\b(write|compose|create|generate|draft|make)\b.*\b(poem|story|essay|song|haiku|limerick|letter|email|report|paragraph)\b/i.test(question);
  if(isCreative && (graph.clauses.length > 0 || graph.hypotheses?.doc)) {
    const factual = graph.hypotheses?.doc || graph.clauses.slice(0, 3).map(c => c.text).join(' ').slice(0, 200);
    if(factual) {
      const factDiv = document.createElement('div');
      factDiv.style.cssText = 'font-size:12px;color:var(--dim);font-family:var(--mono);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:8px';
      factDiv.textContent = `📋 Source: ${factual.slice(0, 150)}`;
      document.getElementById('chat-messages').appendChild(factDiv);
    }

    if(llmEngine) {
      if(readingActive) {
        try {
          await Promise.race([
            new Promise(resolve => { chatInterruptResolve = (resume) => { resumeReading = resume; chatInterruptResolve = null; resolve(); }; }),
            new Promise((_, reject) => setTimeout(() => reject(), 3000))
          ]);
        } catch(e) { chatInterruptResolve = null; }
      }

      try {
        appendChat('system', 'Generating creative content…');
        const topClauses = graph.clauses.slice(0, 8).map(c => c.text).filter(t => t.length > 20).slice(0, 4);

        const synthDiv = document.createElement('div');
        synthDiv.style.cssText = 'padding:8px 0';
        synthDiv.innerHTML = `<div style="font-size:10px;color:var(--violet);font-family:var(--mono);margin-bottom:4px">✨ creative / synthetic</div><div class="synth-body" style="font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap"></div>`;
        document.getElementById('chat-messages').appendChild(synthDiv);
        const synthBody = synthDiv.querySelector('.synth-body');
        const scroller = document.getElementById('chat-messages');

        const raw = await streamWebLLM(llmEngine, {
          messages: [
            { role: 'system', content: `You are a creative writer. ${question}. Use ONLY facts from the source material below as inspiration. Be creative and original.` },
            { role: 'user', content: ((graph.hypotheses?.doc || '') + '\n' + topClauses.join('\n')).slice(0, 800) },
          ],
          max_tokens: 300,
          temperature: 0.8,
          frequency_penalty: 1.5,
        }, (full) => {
          synthBody.textContent = full;
          scroller.scrollTop = scroller.scrollHeight;
        });
        let output = trimRepetition((raw || '').trim());
        synthBody.textContent = output;

        chatHistory.push({ ts: new Date().toISOString(), question, answer: output, creative: true });
      } catch(e) {
        appendChat('assistant', `Creative generation failed: ${e.message}. The source is about: ${factual.slice(0, 100)}`, 'ERROR');
      }
    } else {
      appendChat('assistant', `I'd need the LLM to generate creative content. Here's what I know: ${factual.slice(0, 200)}`, 'SIGNAL');
    }

    currentAnswerAbort = null;
    if(resumeReading) { appendChat('system', 'Resuming reader…'); resumeReading(); }
    return;
  }

  const isContinuation = /^(say more|tell me more|more detail|go on|continue|elaborate|expand|keep going|more|and\??)\s*[.!?]*$/i.test(question.trim());
  if(isContinuation && chatHistory.length > 0) {
    const lastEntry = chatHistory[chatHistory.length - 1];
    const docHypFull = graph.hypotheses?.doc || '';
    if(docHypFull.length > (lastEntry.answer||'').length) {
      appendChat('assistant', docHypFull, 'HYPOTHESIZED');
    } else {
      appendChat('assistant', `Let me look deeper into: "${(lastEntry.question||'').slice(0,40)}"`, 'SIGNAL');
      document.getElementById('chat-input').value = lastEntry.question || 'tell me more about this';
      currentAnswerAbort = null;
      await askQuestion();
    }
    currentAnswerAbort = null;
    return;
  }

  const isFeedback = /^(that'?s?\s+(not|wrong|incorrect|right|correct|bad|terrible|awful|good|great|better|worse|a bad|a good)|no\s*[,.]|not\s+(?:right|correct|what|the)|actually\s*[,.]|but\s+(?:that|it|the)|you'?re\s+wrong|wrong\s+answer|bad\s+(?:answer|response)|try\s+again)/i.test(question.trim());
  const isAssertion = /^(yeah|yes|it does|it is|it was|there is|they do|she does|he does)\b/i.test(question.trim());

  if((isFeedback || isAssertion) && chatHistory.length > 0) {
    const lastEntry = chatHistory[chatHistory.length - 1];
    if(isAssertion) {
      appendChat('assistant', `Let me look again for: "${lastEntry.question}"`, 'SIGNAL');
      document.getElementById('chat-input').value = lastEntry.question;
      currentAnswerAbort = null;
      await askQuestion();
      return;
    }
    appendChat('assistant', `Noted. The previous answer about "${(lastEntry.question||'').slice(0,40)}" may have been inaccurate. What should I look for?`, 'SIGNAL');
    currentAnswerAbort = null;
    return;
  }

  const docHyp = graph.hypotheses?.doc || '';
  const isAboutQ = /^what('?s| is) (this|the) (about|document|article|page|text|movie|film)|^what('?s| is) this\??$|^who is this|^tell me about this|^summarize$|^summary$|^tldr$|^tl;?dr$/i.test(question.trim());
  if(isAboutQ && docHyp.length > 15) {
    const sentences = docHyp.split(/[.!?]/).filter(s => s.trim().length > 10);
    const answer = sentences.length > 0 ? sentences.slice(0, 3).map(s => s.trim() + '.').join(' ') : docHyp.slice(0, 200);
    appendChat('assistant', answer, 'HYPOTHESIZED');
    chatHistory.push({ ts: new Date().toISOString(), question, answer, fastPath: true, provenance: { entities: [], folds: 0 } });
    currentAnswerAbort = null;
    return;
  }

  if(!graph.clauses.length) {
    if(docHyp) {
      appendChat('assistant', docHyp, 'HYPOTHESIZED');
      currentAnswerAbort = null;
      return;
    }
    appendChat('assistant', 'No text loaded yet. Paste a URL or some text to get started.', 'SIGNAL');
    currentAnswerAbort = null;
    return;
  }

  let resolvedQuestion = question;
  if(chatHistory.length > 0) {
    const lastEntry = chatHistory[chatHistory.length - 1];
    const lastEntities = lastEntry.provenance?.entities || [];
    const lastAnswer = lastEntry.answer || '';

    const pronouns = question.match(/\b(she|her|he|him|his|they|them|it|its|the movie|the film|the article|the text)\b/gi) || [];
    if(pronouns.length > 0 && lastEntities.length > 0) {
      let replacement = lastEntities[0];
      for(const ent of lastEntities) {
        if(lastAnswer.toLowerCase().includes(ent.toLowerCase())) {
          replacement = ent;
          break;
        }
      }
      resolvedQuestion = question.replace(/\b(she|her)\b/gi, replacement);
      resolvedQuestion = resolvedQuestion.replace(/\b(he|him|his)\b/gi, replacement);
      if(resolvedQuestion !== question) {
        const resolveEl = document.createElement('div');
        resolveEl.style.cssText = 'color:var(--dim);font-size:11px;font-family:var(--mono);padding:2px 0';
        resolveEl.textContent = `(resolved: ${resolvedQuestion})`;
        document.getElementById('chat-messages').appendChild(resolveEl);
      }
    }
  }

  let promptClassification = null;
  let promptVec = null;
  let promptEntities = [];

  if(embeddingsReady && embedder) {
    promptVec = await embed(resolvedQuestion);

    promptClassification = classifyAxes(promptVec);

    if(comp) {
      const pDoc = comp(resolvedQuestion);
      promptEntities = [
        ...pDoc.people().out('array'),
        ...pDoc.places().out('array'),
        ...pDoc.organizations().out('array'),
      ].filter(e => e.length > 2);
    }

    emit('SIG',
      promptClassification.terrain.name,
      promptClassification.stance.name,
      'user-query',
      resolvedQuestion.slice(0, 120),
      graph.clauses.length
    );

    emit('SIG',
      promptClassification.terrain.name,
      promptClassification.stance.name,
      'user-query-classified',
      `${promptClassification.operator.name}(${promptClassification.terrain.name}, ${promptClassification.stance.name}) entities:[${promptEntities.join(',')}]`,
      graph.clauses.length
    );
  }

  const classifiedOp = promptClassification?.operator?.name || 'DEF';
  const classifiedSite = promptClassification?.terrain?.name || 'Entity';

  // Internal classification — kept off the visible thread but available for
  // the AI to judge answers and for chatHistory provenance.
  const internalClassification = promptClassification
    ? `${classifiedOp}(${classifiedSite}): ${resolvedQuestion.split(/\s+/).filter(w=>w.length>3).slice(0,4).join(', ')}`
    : restateQuestion(resolvedQuestion);

  let readerBusy = false;
  if(readingActive) {
    appendChat('system', 'Pausing reader…');
    try {
      await Promise.race([
        new Promise(resolve => {
          chatInterruptResolve = (readingResume) => {
            resumeReading = readingResume;
            chatInterruptResolve = null;
            resolve();
          };
        }),
        new Promise((_, reject) => setTimeout(() => reject(new Error('pause timeout')), 5000))
      ]);
    } catch(e) {
      chatInterruptResolve = null;
      readerBusy = true;
      appendChat('system', 'Reader busy — answering from signals only…');
    }
  }

  appendChat('system', 'Projecting horizon…');

  let projection;
  try {
    projection = await Promise.race([
      horizon(resolvedQuestion),
      new Promise((_, reject) => setTimeout(() => reject(new Error('horizon timeout')), 25000))
    ]);
  } catch(e) {
    const fallback = docHyp || 'Still processing. Try again in a moment.';
    appendChat('assistant', fallback, 'SIGNAL');
    currentAnswerAbort = null;
    if(resumeReading) { appendChat('system', 'Resuming reader…'); resumeReading(); }
    return;
  }

  if(abort.aborted) return;

  // A6: narrate the walk and pin the span cursor to the top evidence clause
  if(projection.walking) {
    const wf = (projection.foldProvenance || []).filter(p => p.source === 'walked').length;
    const mr = (projection.miniReads || []).length;
    const sb = (projection.siblings || []).length;
    updateLastChat('system', `Walking graph (${wf} folds, ${mr} mini-reads, ${sb} siblings)…`);
  }
  if(projection.clauses && projection.clauses[0] && typeof window.setSpanCursor === 'function') {
    window.setSpanCursor(projection.clauses[0].index, 'chat');
  }

  if(window._readingPriorityQueue && projection.clauses) {
    const readSet = new Set(allResults.filter(r => r.reclassified || r.confirmed).map(r => r.clauseIndex));
    const unread = projection.clauses.filter(c => !readSet.has(c.index)).map(c => c.index);
    if(unread.length > 0) window._readingPriorityQueue.push(...unread);
  }

  if(!projection.context) {
    const totalC = allResults.filter(r => r.rawType === 'clause').length;
    const readC = allResults.filter(r => r.reclassified || r.confirmed).length;
    const readPct = Math.round(readC / Math.max(totalC, 1) * 100);
    const msg = readPct < 50
      ? `I haven't found information about that yet — the reader is at ${readPct}%. Try again once more has been read.`
      : `I don't see that in this document (${readPct}% read).`;
    appendChat('assistant', msg, 'SIGNAL');
    currentAnswerAbort = null;
    if(resumeReading) { appendChat('system', 'Resuming reader…'); resumeReading(); }
    return;
  }

  const provenanceNote = `Found ${projection.clauses.length} clauses, ${projection.entities.length} entities, ${projection.folds.length} folds`;
  updateLastChat('system', provenanceNote + '. Asking model…');

  const ctxEl = document.createElement('details');
  ctxEl.style.cssText = 'font-size:11px;color:var(--dim);margin:4px 0;cursor:pointer';
  const escaped = projection.context.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  ctxEl.innerHTML = '<summary style="opacity:0.6;font-family:var(--mono)">▸ show prompt context</summary>' +
    '<pre style="white-space:pre-wrap;padding:8px;background:var(--surface2);border-radius:4px;margin-top:4px;max-height:300px;overflow-y:auto;font-size:10px">' +
    escaped + '</pre>';
  document.getElementById('chat-messages').appendChild(ctxEl);

    const qLower = question.toLowerCase();
    const answerDiv = document.createElement('div');
    answerDiv.style.cssText = 'margin:8px 0';

    const answerText = document.createElement('div');
    answerText.style.cssText = 'font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--text);padding:4px 0';
    answerText.textContent = 'Thinking…';
    answerDiv.appendChild(answerText);

    const detailsEl = document.createElement('details');
    detailsEl.style.cssText = 'margin-top:6px;font-size:11px;color:var(--dim)';
    detailsEl.innerHTML = '<summary style="cursor:pointer;opacity:0.5">details</summary>';
    answerDiv.appendChild(detailsEl);

    document.getElementById('chat-messages').appendChild(answerDiv);
    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

    const leadSignals = [];
    if(projection.docHypothesis) {
      leadSignals.push({ op: 'SYN', text: projection.docHypothesis, prefix: '', index: -1, isRead: true, isHypothesis: true });
    }
    const firstContent = allResults.find(r => r.rawType === 'clause' && r.clauseIndex < 5);
    if(firstContent && firstContent.clause) {
      let text = firstContent.clause.trim().slice(0, 250);
      if(!leadSignals.some(s => s.text.includes(text.slice(0, 30)))) {
        leadSignals.push({ op: 'DEF', text, prefix: '', index: firstContent.clauseIndex, isRead: !!firstContent.reclassified });
      }
    }

    const opConnectors = {DEF:'',INS:'',SIG:'Notably, ',SEG:'Specifically, ',CON:'Additionally, ',EVA:'',NUL:'However, ',SYN:'Together, ',REC:'In a shift, '};
    const byOp = {};
    for(const c of projection.clauses.slice(0, 10)) {
      const r = allResults.find(ar => ar.clauseIndex === c.index);
      const op = r?.operator?.name || 'DEF';
      const sal = r?.salience || 0;
      const speaker = r?.quoteState;
      if(!byOp[op] || sal > byOp[op].sal) {
        byOp[op] = { text: c.text.trim().slice(0, 250), sal, index: c.index, op, speaker, isRead: r?.reclassified || r?.confirmed };
      }
    }
    const helixOrder = ['DEF','INS','SIG','SEG','CON','EVA','NUL','SYN','REC'];
    const signals = [];
    for(const op of helixOrder) {
      if(!byOp[op]) continue;
      const s = byOp[op];
      let prefix = opConnectors[op] || '';
      if(s.speaker?.depth > 0 && s.speaker?.detectedSpeaker) prefix = `${s.speaker.detectedSpeaker} ${s.speaker.detectedVia||'said'}: `;
      signals.push({ ...s, prefix });
    }

    const allSignals = [...leadSignals];
    const seenTexts = new Set(leadSignals.map(s => s.text.slice(0, 40)));
    for(const sig of signals) {
      if(!seenTexts.has(sig.text.slice(0, 40))) { allSignals.push(sig); seenTexts.add(sig.text.slice(0, 40)); }
    }

    const isWhoQ = /\bwho\b/i.test(question);
    const qWords = qLower.split(/\s+/).filter(w => w.length > 3);
    const signalText = allSignals.map(s => s.text).join(' ').toLowerCase();
    const coverage = qWords.filter(w => signalText.includes(w)).length / Math.max(qWords.length, 1);
    const readRatio = allSignals.filter(s => s.isRead).length / Math.max(allSignals.length, 1);
    const opDiversity = allSignals.length;
    let complete = true;
    if(isWhoQ) {
      const names = signalText.match(/[A-Z][a-z]+(?:\s[A-Z][a-z]+)*/g) || [];
      if([...new Set(names)].filter(n => n.length > 3).length < 2) complete = false;
    }
    const topText = allSignals.slice(0, 2).map(s => s.text).join(' ');
    if(!/[.!?]/.test(topText.slice(0, 150))) complete = false;
    if((topText.match(/[()]/g) || []).length > 6) complete = false;
    if((topText.match(/\)\s*[A-Z]/g) || []).length > 2) complete = false;
    if(topText.split(/\s+/).length < 8) complete = false;

    const isIdentQ = /^(what('?s| is| are| was)|identify|describe|tell me about|who wrote|what kind|what book|what document|what text|summarize|summary)/i.test(resolvedQuestion || question);
    const directAnswer = (coverage > 0.3 && opDiversity >= 2 && complete && !isIdentQ);
    const paramSnapshot = JSON.parse(JSON.stringify(SEARCH_PARAMS));

    let detailsHtml = '<div style="padding:6px 0">';
    detailsHtml += `<div style="font-family:var(--mono);font-size:10px;margin-bottom:4px">coverage:${Math.round(coverage*100)}% signals:${allSignals.length} read:${Math.round(readRatio*100)}% ${directAnswer?'fast-path':'llm-path'}</div>`;
    for(const sig of allSignals.slice(0, 5)) {
      const color = OP_COLORS[sig.op] || 'var(--dim)';
      const icon = sig.isRead ? '●' : '○';
      detailsHtml += `<div style="font-size:11px;color:var(--text);border-left:2px solid ${color};padding-left:6px;margin:2px 0;opacity:0.7">${icon} ${sig.prefix}${sig.text.slice(0,150).replace(/</g,'&lt;')}</div>`;
    }
    detailsHtml += '</div>';
    detailsEl.innerHTML = `<summary style="cursor:pointer;opacity:0.5">${allSignals.length} signals · ${projection.entities.length} entities · ${projection.folds.length} folds</summary>` + detailsHtml;

    const askStart = Date.now();
    const qWords2 = (resolvedQuestion || question).toLowerCase().split(/\s+/);
    const isIdentification = /^(what('?s| is| are| was)|identify|describe|tell me about|who wrote|what kind|what book|what document|what text)/i.test(resolvedQuestion || question) && qWords2.length < 12;
    const isSimple = qWords2.length < 8;
    const timeBudgetMs = isIdentification ? 3000 : isSimple ? 6000 : 12000;
    const quickDocHyp = graph.hypotheses?.doc || '';

    if(isIdentification && quickDocHyp && quickDocHyp.length > 30) {
      let quickAnswer = quickDocHyp
        .replace(/^(Here is the summary[^:]*:)\s*/gi, '')
        .replace(/\n\nAs for who wrote it[^]*$/i, '')
        .replace(/\n\nAs for[^]*$/i, '')
        .trim();
      const sentences = quickAnswer.match(/[^.!?]+[.!?]+/g) || [quickAnswer];
      quickAnswer = sentences.slice(0, 2).join(' ').trim();

      const sectionSummaries = (graph.sectionReadings || [])
        .filter(s => s.summary && s.summary.length > 15)
        .map(s => s.summary)
        .slice(0, 3);

      if(quickAnswer.length > 20) {
        let html = `<div style="border-left:3px solid var(--violet);padding:6px 10px;margin:4px 0;background:color-mix(in srgb, var(--violet) 8%, transparent);border-radius:0 4px 4px 0;animation:fadeIn 0.3s ease-in">`;
        html += `<div style="font-size:10px;color:var(--violet);font-family:var(--mono);margin-bottom:2px">HYPOTHESIZED</div>`;
        html += `<div style="font-style:italic">${quickAnswer.replace(/</g,'&lt;')}</div>`;
        html += `</div>`;

        if(sectionSummaries.length > 0) {
          for(const summary of sectionSummaries) {
            html += `<div style="border-left:3px solid var(--accent);padding:6px 10px;margin:4px 0;background:color-mix(in srgb, var(--accent) 5%, transparent);border-radius:0 4px 4px 0">`;
            html += `<div style="font-size:10px;color:var(--accent);font-family:var(--mono);margin-bottom:2px">SCENE</div>`;
            html += `<div>${summary.replace(/</g,'&lt;')}</div>`;
            html += `</div>`;
          }
        } else {
          const topClauses = projection.clauses
            .filter(c => c.text && c.text.length > 30 && /[.!?]/.test(c.text))
            .slice(0, 2);
          for(const c of topClauses) {
            html += `<div style="border-left:3px solid var(--blue, #4a9eff);padding:4px 10px;margin:3px 0;font-size:12px;color:var(--dim);border-radius:0 4px 4px 0">`;
            html += `<span style="font-family:var(--mono);font-size:9px;color:var(--blue, #4a9eff)">CITED c${c.index+1}</span> `;
            html += `${c.text.slice(0,150).replace(/</g,'&lt;')}`;
            html += `</div>`;
          }
        }

        answerText.innerHTML = html;
        chatHistory.push({ ts: new Date().toISOString(), question, answer: quickAnswer, shortCircuit: true, ms: Date.now() - askStart,
          provenance: { clauseIndices: projection.clauses.map(c=>c.index), entities: projection.entities.map(e=>e.name), folds: projection.folds.length, docHypothesis: quickDocHyp }
        });
        updateLastChat('system', `⚡ ${Date.now() - askStart}ms · doc hypothesis`);
        return;
      }
    }

    if(directAnswer) {
      let html = '';
      const fastDocHyp = graph.hypotheses?.doc || '';
      if(fastDocHyp.length > 10) {
        const defSentence = fastDocHyp.split(/[.!?]/).find(s => s.trim().length > 15) || fastDocHyp.split('.')[0];
        html += epistemicCard('HYPOTHESIZED', defSentence.trim() + '.');
      }

      for(const sig of allSignals.slice(0, 3)) {
        if(sig.isHypothesis) continue;
        const text = sig.text.trim();
        if(/[.!?]/.test(text.slice(0, 150)) && text.split(/\s+/).length > 5) {
          let clean = text;
          if(clean.length > 200) { const cut = clean.lastIndexOf('.', 200); if(cut > 50) clean = clean.slice(0, cut + 1); }
          html += epistemicCard('CITED', clean, { small: true });
        }
      }

      if(!html) html = epistemicCard('SIGNAL', 'Insufficient evidence for a grounded answer.');
      answerText.innerHTML = html;

      const fullAnswer = fastDocHyp || allSignals.slice(0,2).map(s=>s.text).join(' ');
      chatHistory.push({ ts: new Date().toISOString(), question, answer: fullAnswer, fastPath: true,
        provenance: { clauseIndices: projection.clauses.map(c=>c.index), entities: projection.entities.map(e=>e.name), folds: projection.folds.length }
      });
      evolveParams(question, allSignals, true, paramSnapshot);
    } else {

    const knownDiv = document.createElement('div');
    const localDocHyp = graph.hypotheses?.doc || '';
    if(localDocHyp) {
      const def = localDocHyp.split(/[.!?]/).find(s => s.trim().length > 15) || localDocHyp.split('.')[0];
      knownDiv.innerHTML = epistemicCard('HYPOTHESIZED', def.trim() + '.', { sublabel: 'thinking…' });
      answerDiv.insertBefore(knownDiv, answerText);
    }
    answerText.textContent = '';
    const smoothedDiv = answerText;

    if(abort.aborted) { currentAnswerAbort = null; return; }

    const entsNeedingFolds = projection.entities
      .filter(ent => {
        const name = (ent.name||'');
        if(name.length < 3) return false;
        if(!isRealName(name)) return false;
        if(name.split(/\s+/).length > 4) return false;
        return true;
      })
      .map(ent => ({ key: (ent.name||'').toLowerCase(), ent }))
      .filter(({key}) => key && !graph.computedFolds[key]);

    const elapsed = Date.now() - askStart;
    const foldBudget = Math.max(0, timeBudgetMs - elapsed - 2000);
    if(entsNeedingFolds.length > 0 && llmEngine && foldBudget > 1000) {
      const thinkDiv = document.createElement('div');
      thinkDiv.style.cssText = 'background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;margin:6px 0;max-height:160px;overflow-y:auto';
      detailsEl.appendChild(thinkDiv);
      for(const { key, ent } of entsNeedingFolds) {
        if(Date.now() - askStart > timeBudgetMs - 2000) break;
        await computeEntityFold(key, ent, thinkDiv);
      }
    }

    let plan = '';

    const totalClauses = allResults.filter(r => r.rawType === 'clause').length;
    const readCount = allResults.filter(r => r.reclassified || r.confirmed).length;
    if(readCount > 0 && readCount < totalClauses) {
      plan += `[${readCount}/${totalClauses} clauses read]\n\n`;
    }

    if(projection.docHypothesis) plan += `HYPOTHESIZED: ${projection.docHypothesis}\n\n`;

    if(projection.section?.text) plan += `SECTION: ${projection.section.text.slice(0,120)}\n\n`;

    if(graph.sectionReadings?.length > 0) {
      const relevantSections = graph.sectionReadings.filter(s => {
        const sectionClauses = projection.clauses.filter(c => c.index >= s.start && c.index < s.end);
        return sectionClauses.length > 0;
      });
      if(relevantSections.length > 0) {
        for(const s of relevantSections.slice(0, 2)) {
          plan += `SCENE [c${s.start}-c${s.end}]: ${s.summary}`;
          if(s.speakers.length > 0) plan += ` Speakers: ${s.speakers.join(', ')}.`;
          if(s.tone) plan += ` Tone: ${s.tone}.`;
          plan += '\n';
        }
        plan += '\n';
      }
    }

    let planHasFolds = false;
    const validEntities = projection.entities.filter(ent =>
      (ent.name||'').length >= 3 && !/^(rep|sen|gov|mr|ms|mrs|dr|inc|ltd|the)$/i.test(ent.name||'')
    );
    for(const ent of validEntities.slice(0, 3)) {
      const entKey = (ent.name||'').toLowerCase();
      const fold = graph.computedFolds[entKey];
      if(fold && fold.text) {
        plan += `About ${ent.name}: ${fold.text}\n`;
        planHasFolds = true;
      }
    }
    if(planHasFolds) plan += '\n';


    const quotes = [];
    for(const c of projection.clauses.slice(0, 8)) {
      const r = allResults.find(ar => ar.clauseIndex === c.index);
      const speaker = r?.quoteState;
      const isProse = /[.!?]/.test(c.text.slice(0, 150)) && c.text.split(/\s+/).length > 5;
      if(!isProse) continue;
      const level = (r?.reclassified || r?.confirmed) ? 'L2-read' : 'L2-shadow';
      if(speaker && speaker.depth > 0 && speaker.detectedSpeaker) {
        quotes.push(`[${level}:c${c.index+1}] QUOTED: ${speaker.detectedSpeaker} ${speaker.detectedVia||'said'}: "${c.text.slice(0, 200)}"`);
      } else {
        quotes.push(`[${level}:c${c.index+1}] CITED: ${c.text.slice(0, 200)}`);
      }
    }
    for(const q of quotes.slice(0, GROUND_PARAMS.maxQuotes)) plan += q + '\n';

    plan += `\nQuestion: ${resolvedQuestion}`;

    const isSyntheticQ = /^(what('?s| is| are| was)|identify|describe|tell me about|who wrote|who is the author|what kind|what book|what document|what text|summarize|summary|what are the themes|what genre|when was.*written|where.*set|what period|what century)/i.test(resolvedQuestion || question);

    const groundedPrompt = `You answer questions about a document using ONLY the provided evidence.
HYPOTHESIZED = the system's guess about what the document is. Use as context but don't state it as fact.
CITED = verbatim text from the document. You can quote or paraphrase these.
QUOTED = someone's exact words from the document.

Rules:
- Answer naturally and conversationally.
- Ground your answer in CITED evidence. Reference specific text.
- Don't start with "The text says" — just answer the question directly.
- If you're uncertain, say so. 2-4 sentences.
- Never invent facts not in the evidence.`;

    const syntheticPrompt = `You are identifying a document. You have two sources:
1. EVIDENCE from the document itself (CITED lines below)
2. Your own training knowledge about literature, history, and texts

Use BOTH. If you recognize this text from your training, say so directly:
"This is [title] by [author]" — then add what you know about it.
Ground your identification in the CITED evidence but don't limit yourself to it.
Be direct. 2-4 sentences. Don't hedge if you're confident.`;

    const systemPrompt = isSyntheticQ ? syntheticPrompt : groundedPrompt;

    const gpuOk = !entsNeedingFolds.some(({key}) => {
      const f = graph.computedFolds[resolveEntity(key)];
      return f && f.gpuHealthy === false;
    });

    if(!llmEngine || !gpuOk || readerBusy) {
      if(readerBusy && ollamaAvailable) {
        try {
          const ollamaScroller = document.getElementById('chat-messages');
          smoothedDiv.innerHTML = epistemicCard(isSyntheticQ ? 'SYNTHETIC' : 'INTERPRETED', '', { sublabel: 'via Ollama · streaming…' });
          // Card structure: smoothedDiv > wrapper > [labelDiv, bodyDiv]
          const ollamaBody = smoothedDiv.firstElementChild?.children?.[1] || null;
          const ollamaRaw = await ollamaChatStream([
            { role: 'system', content: systemPrompt },
            { role: 'user', content: plan },
          ], { temperature: 0.2 }, (full) => {
            if(ollamaBody) ollamaBody.textContent = full;
            ollamaScroller.scrollTop = ollamaScroller.scrollHeight;
          });
          let answer = trimRepetition((ollamaRaw || '').replace(/^(Sure,?|Of course,?|The text says that\s)/i, ''));
          smoothedDiv.innerHTML = epistemicCard(isSyntheticQ ? 'SYNTHETIC' : 'INTERPRETED', answer, { sublabel: 'via Ollama' });
          chatHistory.push({ ts: new Date().toISOString(), question: resolvedQuestion, answer, ollama: true });
          updateLastChat('system', provenanceNote);
        } catch(e) {
          smoothedDiv.innerHTML = epistemicCard('ERROR', 'Ollama call failed. Reader is busy — try again when reading completes.');
        }
      } else if(readerBusy) {
        const signalAnswer = allSignals.slice(0, 3).map(s => s.text).filter(t => t.length > 15).join(' ');
        smoothedDiv.innerHTML = epistemicCard('SIGNAL', signalAnswer || 'Reader is still processing. Try again when reading completes.', { sublabel: 'reader busy — signals only' });
        chatHistory.push({ ts: new Date().toISOString(), question: resolvedQuestion, answer: signalAnswer, readerBusy: true });
        evolveParams(resolvedQuestion, allSignals, false, paramSnapshot);
        }
      else if(!gpuOk) {
        let mechAnswer = '';
        for(const c of projection.clauses.slice(0, 4)) {
          const r = allResults.find(ar => ar.clauseIndex === c.index);
          const speaker = r?.quoteState;
          if(speaker && speaker.depth > 0 && speaker.detectedSpeaker) {
            mechAnswer += `${speaker.detectedSpeaker} ${speaker.detectedVia||'said'}: "${c.text.slice(0, 120)}"\n\n`;
          } else {
            mechAnswer += `According to the article: ${c.text.slice(0, 120)}\n\n`;
          }
        }
        smoothedDiv.innerHTML = epistemicCard('ERROR', 'GPU unavailable. Model cannot generate an answer.', { sublabel: 'see signals above' });
        return;
      }
      try { await initWebLLM(); } catch(e) {
        smoothedDiv.innerHTML = epistemicCard('SIGNAL', 'Model could not be loaded. Showing available evidence only.', { sublabel: 'no LLM' });
        return;
      }
    }

    let streamCard = null;
    try {
      if(abort.aborted) { currentAnswerAbort = null; return; }

      const answerArea = smoothedDiv;
      const thinkLog = [];
      const logThink = (op, text) => {
        thinkLog.push({ op, text, ts: Date.now() });
        const el = detailsEl.querySelector('.think-stream') || (() => {
          const d = document.createElement('div'); d.className = 'think-stream';
          d.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--dim);padding:4px 0;max-height:200px;overflow-y:auto';
          detailsEl.appendChild(d); return d;
        })();
        const colors = { NUL:'var(--dim)',SIG:'var(--dim)',INS:'var(--bright)',SEG:'var(--violet)',CON:'var(--accent)',SYN:'var(--violet)',DEF:'var(--accent)',EVA:'var(--green)',REC:'var(--red)',DONE:'var(--amber)' };
        el.innerHTML += `<div style="border-left:2px solid ${colors[op]||'var(--dim)'};padding-left:6px;margin:1px 0">${op} ${text.replace(/</g,'&lt;').slice(0,180)}</div>`;
        el.scrollTop = el.scrollHeight;
      };

      logThink('NUL', `question: "${resolvedQuestion}"`);

      const isWhoQ = /\bwho\b/i.test(resolvedQuestion);
      const isWhatQ = /\bwhat\b/i.test(resolvedQuestion);
      const isWhyQ = /\bwhy\b/i.test(resolvedQuestion);
      const isHowQ = /\bhow\b/i.test(resolvedQuestion);
      const qType = isWhoQ ? 'who' : isWhyQ ? 'why' : isHowQ ? 'how' : 'what';
      logThink('SIG', `type:${qType} keywords:${resolvedQuestion.split(/\s+/).filter(w=>w.length>3).join(',')}`);

      const subQuestions = decomposeQuestion(resolvedQuestion);
      if(subQuestions.length > 1) {
        logThink('SEG', `${subQuestions.length} sub-questions:`);
        for(const sq of subQuestions) logThink('SEG', `  ${sq.op}(${sq.site}): ${sq.text}`);
      }

      const known = projection.docHypothesis || '';
      const answerCards = document.createElement('div');
      answerCards.style.cssText = 'padding:4px 0';

      const firstClause = projection.clauses[0];
      if(firstClause && firstClause.text.length > 15) {
        const knownCard = document.createElement('div');
        const span = firstClause.text.slice(0, 200);
        knownCard.innerHTML = epistemicCard('KNOWN', `"${span}"`, { sublabel: 'span from source', small: true });
        answerCards.appendChild(knownCard);
      }

      if(known) {
        const hypCard = document.createElement('div');
        const hypText = known.split(/[.!?]/).find(s => s.trim().length > 15) || known.split('.')[0];
        hypCard.innerHTML = epistemicCard('HYPOTHESIZED', hypText.trim() + '.', { sublabel: 'system inference' });
        answerCards.appendChild(hypCard);
        logThink('INS', hypText.trim());
      }

      answerDiv.insertBefore(answerCards, detailsEl);

      if(abort.aborted) return;

      const evidenceClauses = projection.clauses.slice(0, 6).map(c => c.text).filter(t => t.length > 20);
      logThink('SEG', `${evidenceClauses.length} evidence clauses found`);

      if(evidenceClauses.length > 0) {
        let conHtml = answerArea.innerHTML;
        conHtml += '<div style="opacity:0.4;font-size:12px;margin-top:4px;border-left:2px solid var(--accent);padding-left:6px">';
        for(const c of evidenceClauses.slice(0, 3)) {
          const short = c.length > 120 ? c.slice(0, c.lastIndexOf(' ', 120)) + '…' : c;
          conHtml += `<div style="margin:2px 0">${short.replace(/</g,'&lt;')}</div>`;
        }
        conHtml += '</div>';
        answerArea.innerHTML = conHtml;
        logThink('CON', `showing ${Math.min(3, evidenceClauses.length)} evidence spans`);
      }

      if(abort.aborted) return;
      await new Promise(r => setTimeout(r, 100));

      logThink('SYN', 'generating answer from plan + evidence…');

      let answerPrompt = plan;
      if(subQuestions.length > 1) {
        answerPrompt += '\n\nThis question has multiple parts. Address each:\n';
        for(const sq of subQuestions) {
          answerPrompt += `- ${sq.text} (needs: ${sq.needs})\n`;
        }
      }
      answerPrompt += '\n\nAnswer the question directly and conversationally. Address all parts.';

      // Live streaming card — text appears as it's generated.
      streamCard = document.createElement('div');
      const streamColor = isSyntheticQ ? 'var(--violet)' : 'var(--amber)';
      const streamBg = isSyntheticQ ? 'color-mix(in srgb, var(--violet) 5%, transparent)' : 'rgba(240,192,96,0.05)';
      streamCard.style.cssText = `border-left:3px solid ${streamColor};padding:6px 10px;margin-bottom:6px;background:${streamBg};border-radius:0 6px 6px 0`;
      streamCard.innerHTML = `<div style="font-size:9px;color:${streamColor};font-family:var(--mono);margin-bottom:2px">${isSyntheticQ ? '✨ SYNTHETIC' : 'INTERPRETED'} <span style="opacity:0.6">· streaming…</span></div><div class="stream-body" style="font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap"></div>`;
      answerCards.appendChild(streamCard);
      const streamBody = streamCard.querySelector('.stream-body');
      const chatScroller = document.getElementById('chat-messages');

      const rawDraft = await streamWebLLM(llmEngine, {
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: answerPrompt },
        ],
        max_tokens: 250,
        temperature: 0.3,
        frequency_penalty: 1.2,
      }, (full) => {
        streamBody.textContent = full;
        chatScroller.scrollTop = chatScroller.scrollHeight;
      });
      let draft = (rawDraft || '').trim();
      draft = draft.replace(/^(Sure,?|Of course,?|Based on the provided evidence,?|Here'?s?\s|The text says that\s)/i, '');
      draft = trimRepetition(draft);
      streamBody.textContent = draft;
      logThink('DEF', draft.slice(0, 150));

      if(abort.aborted) return;

      const respHypotheses = responseHypothesis(subQuestions, promptClassification);
      const respFit = await evaluateResponseFit(draft, respHypotheses, embed);
      if(respFit.issues.length > 0) {
        for(const issue of respFit.issues) logThink('EVA', `⚠ ${issue}`);
      } else {
        logThink('EVA', `✓ response fits expected shape: ${respHypotheses.map(h=>h.expects).join(', ')}`);
      }

      const allEvidence = [
        ...projection.clauses.map(c => c.text),
        projection.docHypothesis || '',
        ...projection.folds,
        ...projection.entities.map(e => e.name),
        plan,
      ].join(' ');
      const allEvidenceLower = allEvidence.toLowerCase();
      const sourceText = projection.clauses.map(c => c.text).join(' ');

      const quotedParts = draft.match(/"([^"]+)"/g) || [];
      let hasQuoteError = false;
      for(const q of quotedParts) {
        const inner = q.slice(1, -1).trim();
        if(inner.length < 10) continue;
        if(!sourceText.includes(inner) && !sourceText.toLowerCase().includes(inner.toLowerCase())) {
          hasQuoteError = true;
          logThink('EVA', `✗ QUOTE NOT FOUND: "${inner.slice(0,60)}…"`);
        } else {
          logThink('EVA', `✓ quote verified: "${inner.slice(0,40)}…"`);
        }
      }

      let operatorMatch = true;
      let sufficiencyNote = '';
      if(embeddingsReady || register.clauseVecs.length > 0) {
        const questionNeeds = {
          'who': 'DEF',
          'what': 'DEF',
          'why': 'CON',
          'how': 'CON',
          'when': 'DEF',
          'where': 'DEF',
          'compare': 'SEG',
          'list': 'SEG',
          'is it': 'EVA',
          'should': 'EVA',
          'summarize': 'SYN',
        };
        let expectedOp = 'DEF';
        for(const [pattern, op] of Object.entries(questionNeeds)) {
          if(resolvedQuestion.toLowerCase().includes(pattern)) { expectedOp = op; break; }
        }

        const answerHasCause = /because|due to|caused by|results? from|leads? to|since/i.test(draft);
        const answerHasDefinition = /\bis\b.*\b(a|an|the)\b/i.test(draft);
        const answerHasEvaluation = /should|better|worse|dangerous|safe|normal|abnormal|recommend/i.test(draft);
        const answerHasList = /\b(first|second|third|also|additionally|another)\b/i.test(draft);

        if(expectedOp === 'CON' && !answerHasCause) {
          operatorMatch = false;
          sufficiencyNote = `asked WHY/HOW but answer has no causal language`;
        }
        if(expectedOp === 'EVA' && !answerHasEvaluation) {
          operatorMatch = false;
          sufficiencyNote = `asked for evaluation but answer doesn't assess`;
        }
        if(expectedOp === 'SEG' && !answerHasList && draft.split(/[.!?]/).length < 3) {
          operatorMatch = false;
          sufficiencyNote = `asked for list/comparison but answer is singular`;
        }

        logThink('EVA', `operator: expected ${expectedOp}, ${operatorMatch ? '✓ matches' : '✗ ' + sufficiencyNote}`);
      }

      if(subQuestions.length > 1) {
        const draftLower = draft.toLowerCase();
        let addressed = 0;
        for(const sq of subQuestions) {
          const sqWords = sq.text.toLowerCase().split(/\s+/).filter(w => w.length > 3);
          const sqHits = sqWords.filter(w => draftLower.includes(w)).length;
          const sqCovered = sqHits / Math.max(sqWords.length, 1);
          if(sqCovered > 0.3) {
            addressed++;
            logThink('EVA', `  ✓ ${sq.op}(${sq.site}): "${sq.text.slice(0,40)}" addressed`);
          } else {
            logThink('EVA', `  ✗ ${sq.op}(${sq.site}): "${sq.text.slice(0,40)}" NOT addressed`);
          }
        }
        if(addressed < subQuestions.length) {
          sufficiencyNote += ` Only ${addressed}/${subQuestions.length} parts addressed.`;
          operatorMatch = false;
        }
      }

      const skipNames = new Set(['The','According','However','Additionally','Notably','Specifically','Based','From','This','That','These','Here','Also','While','During','After','Before','Between']);
      const draftNames = draft.match(/[A-Z][a-z]+(?:\s[A-Z][a-z]+)*/g) || [];
      const ungrounded = draftNames.filter(n => !allEvidenceLower.includes(n.toLowerCase()) && n.length > 3 && !skipNames.has(n));

      const draftNumbers = draft.match(/\b\d[\d,.]+\b/g) || [];
      const badNumbers = draftNumbers.filter(n => n.length > 1 && !sourceText.includes(n));
      if(badNumbers.length > 0) logThink('EVA', `⚠ numbers not in source: ${badNumbers.join(', ')}`);

      const qWords = resolvedQuestion.toLowerCase().split(/\s+/).filter(w => w.length > 3);
      const relevance = qWords.filter(w => draft.toLowerCase().includes(w)).length / Math.max(qWords.length, 1);

      let evaScore = 1.0;
      if(ungrounded.length > 0) evaScore -= 0.15 * ungrounded.length;
      if(badNumbers.length > 0) evaScore -= 0.1 * badNumbers.length;
      if(relevance < 0.3) evaScore -= 0.3;
      if(hasQuoteError) evaScore -= 0.3;
      if(!operatorMatch) evaScore -= 0.2;
      if(respFit.score < 0.7) evaScore -= (1 - respFit.score) * 0.4;
      evaScore = Math.max(0, evaScore);

      logThink('EVA', `composite: ${evaScore.toFixed(2)} names:${ungrounded.length} nums:${badNumbers.length} rel:${Math.round(relevance*100)}% quotes:${hasQuoteError?'✗':'✓'} op:${operatorMatch?'✓':'✗'} fit:${respFit.score.toFixed(2)}`);
      emit('EVA', 'Paradigm', 'Composing', 'answer-eval', `${evaScore.toFixed(2)}`);

      let finalAnswer = draft;
      const issues = [];
      if(hasQuoteError) issues.push('Remove or fix any quoted text that doesn\'t match the source exactly');
      if(!operatorMatch) issues.push(sufficiencyNote);
      if(ungrounded.length > 0) issues.push(`Remove unverified names: ${ungrounded.join(', ')}`);
      if(badNumbers.length > 0) issues.push(`Check numbers: ${badNumbers.join(', ')}`);
      if(respFit.issues.length > 0) issues.push(...respFit.issues);

      if(evaScore < 0.6 && issues.length > 0 && !abort.aborted && llmEngine) {
        logThink('REC', `revising: ${issues.join('; ')}`);
        try {
          const labelEl = streamCard.querySelector('div');
          if(labelEl) labelEl.innerHTML = `${isSyntheticQ ? '✨ SYNTHETIC' : 'INTERPRETED'} <span style="opacity:0.6">· revising…</span>`;
          const recRaw = await streamWebLLM(llmEngine, {
            messages: [
              { role: 'system', content: 'Revise this answer based on the feedback. Only state facts from the evidence. Any quoted text must be verbatim from the source.' },
              { role: 'user', content: `Evidence:\n${plan}\n\nDraft: ${draft}\n\nFeedback:\n${issues.map((is,i)=>`${i+1}. ${is}`).join('\n')}\n\nRevised answer:` },
            ],
            max_tokens: 200,
            temperature: 0.15,
          }, (full) => {
            streamBody.textContent = full;
            chatScroller.scrollTop = chatScroller.scrollHeight;
          });
          finalAnswer = (recRaw || draft).trim().replace(/^(Sure,?|Here'?s?\s)/i, '');
          streamBody.textContent = finalAnswer;
          logThink('REC', 'revised: ' + finalAnswer.slice(0, 150));
        } catch(e) { logThink('REC', 'revision failed, using draft'); }
      }

      // CITED — every source span used as evidence for the assertion above,
      // with clause indices for traceability and speaker tags for quotes.
      const citedClauses = projection.clauses
        .filter(c => c.text && c.text.length > 15)
        .slice(0, 6);
      if(citedClauses.length > 0) {
        const citedCard = document.createElement('div');
        const cBlue = 'var(--blue, #4a9eff)';
        citedCard.style.cssText = `border-left:3px solid ${cBlue};padding:6px 10px;margin-bottom:6px;background:color-mix(in srgb, ${cBlue} 5%, transparent);border-radius:0 6px 6px 0;animation:fadeIn 0.3s ease-in`;
        let citedHtml = `<div style="font-size:9px;color:${cBlue};font-family:var(--mono);margin-bottom:4px">CITED — ${citedClauses.length} source span${citedClauses.length === 1 ? '' : 's'}</div>`;
        for(const c of citedClauses) {
          const r = allResults.find(ar => ar.clauseIndex === c.index);
          const speaker = r?.quoteState;
          const text = c.text.slice(0, 260).replace(/</g, '&lt;');
          const ellipsis = c.text.length > 260 ? '…' : '';
          if(speaker && speaker.depth > 0 && speaker.detectedSpeaker) {
            citedHtml += `<div style="font-family:var(--serif);font-size:13px;line-height:1.55;margin:4px 0;padding:2px 0 2px 8px;border-left:1px solid color-mix(in srgb, ${cBlue} 35%, transparent)"><span style="font-family:var(--mono);font-size:9px;color:var(--amber);margin-right:6px">c${c.index+1} · ${speaker.detectedSpeaker} ${speaker.detectedVia||'said'}</span>"${text}${ellipsis}"</div>`;
          } else {
            citedHtml += `<div style="font-family:var(--serif);font-size:13px;line-height:1.55;margin:4px 0;padding:2px 0 2px 8px;border-left:1px solid color-mix(in srgb, ${cBlue} 35%, transparent)"><span style="font-family:var(--mono);font-size:9px;color:${cBlue};margin-right:6px">c${c.index+1}</span>${text}${ellipsis}</div>`;
          }
        }
        citedCard.innerHTML = citedHtml;
        answerCards.appendChild(citedCard);
      }

      // Replace the live streaming card with the final, animated interp card.
      if(streamCard && streamCard.parentNode) streamCard.remove();
      const interpCard = document.createElement('div');
      const finalNames = finalAnswer.match(/[A-Z][a-z]+(?:\s[A-Z][a-z]+)*/g) || [];
      const stillBad = finalNames.filter(n => !allEvidenceLower.includes(n.toLowerCase()) && n.length > 3 && !skipNames.has(n));

      if(isSyntheticQ) {
        interpCard.style.cssText = 'border-left:3px solid var(--violet);padding:6px 10px;margin-bottom:6px;background:color-mix(in srgb, var(--violet) 8%, transparent);border-radius:0 6px 6px 0;animation:fadeIn 0.3s ease-in';
        interpCard.innerHTML = `<div style="font-size:9px;color:var(--violet);font-family:var(--mono);margin-bottom:2px">✨ SYNTHETIC — model's own knowledge + document evidence</div><div style="font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--text)">${finalAnswer.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
      } else {
        interpCard.style.cssText = 'border-left:3px solid var(--amber);padding:6px 10px;margin-bottom:6px;background:rgba(240,192,96,0.05);border-radius:0 6px 6px 0;animation:fadeIn 0.3s ease-in';
        let interpHtml = `<div style="font-size:9px;color:var(--amber);font-family:var(--mono);margin-bottom:2px">INTERPRETED</div>`;
        interpHtml += `<div style="font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--text)">${finalAnswer.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
        // Only surface factual verification failures. Operator/shape
        // classification mismatches stay in the internal think log so the
        // AI can use them without cluttering the visible thread.
        const warnings = [];
        if(stillBad.length > 0) warnings.push(`unverified: ${stillBad.join(', ')}`);
        if(warnings.length > 0) interpHtml += `<div style="margin-top:4px;font-size:10px;color:var(--red)">⚠ ${warnings.join(' · ')}</div>`;
        interpCard.innerHTML = interpHtml;
      }
      answerCards.appendChild(interpCard);

      if(smoothedDiv && smoothedDiv.parentNode) smoothedDiv.remove();
      const answerTime = ((Date.now() - askStart) / 1000).toFixed(1);
      const budgetLabel = (Date.now() - askStart) > timeBudgetMs ? ' ⚠️ over budget' : '';
      logThink('DONE', `${thinkLog.length} steps, ${answerTime}s, eval:${evaScore.toFixed(2)}, unverified:${stillBad.length}${budgetLabel}`);
      updateLastChat('system', `${provenanceNote} · ${answerTime}s${budgetLabel}`);

      const sourcesEl = document.createElement('details');
      sourcesEl.style.cssText = 'margin-top:6px;font-size:11px;color:var(--dim);cursor:pointer';
      let sourcesHtml = `<summary style="opacity:0.5">${projection.clauses.length} sources · ${projection.entities.length} entities · ${projection.folds.length} folds · ${answerTime}s</summary>`;
      sourcesHtml += '<div style="padding:6px 0">';
      for(const c of projection.clauses.slice(0, 6)) {
        const r = allResults.find(ar => ar.clauseIndex === c.index);
        const op = r?.operator?.name || '?';
        const color = OP_COLORS[op] || 'var(--dim)';
        const speaker = r?.quoteState;
        const spTag = (speaker && speaker.depth > 0 && speaker.detectedSpeaker)
          ? `<span style="color:var(--amber)">${speaker.detectedSpeaker} (${speaker.detectedVia||'said'})</span> `
          : '<span style="color:var(--dim)">narrator</span> ';
        sourcesHtml += `<div style="margin:2px 0;line-height:1.4">${spTag}<span style="color:${color};font-size:9px">${op}</span> c${c.index+1}: ${c.text.slice(0,90).replace(/</g,'&lt;')}</div>`;
      }
      sourcesHtml += '</div>';
      sourcesEl.innerHTML = sourcesHtml;
      detailsEl.appendChild(sourcesEl);

      const answerMs = Date.now() - askStart;
      chatHistory.push({
        ts: new Date().toISOString(),
        question, answer: finalAnswer,
        ms: answerMs,
        budget: timeBudgetMs,
        overBudget: answerMs > timeBudgetMs,
        promptClassification: promptClassification ? {
          op: promptClassification.operator.name,
          site: promptClassification.terrain.name,
          stance: promptClassification.stance.name,
        } : null,
        promptEntities,
        subQuestions: subQuestions.length > 1 ? subQuestions : null,
        provenance: {
          clauseIndices: projection.clauses.map(c => c.index),
          readClauseIndices: projection.clauses.filter(c => c.isRead).map(c => c.index),
          walkedClauseIndices: projection.clauses.filter(c => !c.isRead).map(c => c.index),
          entities: projection.entities.map(e => e.name),
          folds: projection.folds.length,
          foldProvenance: projection.foldProvenance || [],
          miniReads: (projection.miniReads || []).map(m => m.index),
          siblings: projection.siblings || [],
          walking: !!projection.walking,
          section: projection.section?.text,
          docHypothesis: projection.docHypothesis,
          evaScore,
        },
      });

      emit('DEF',
        promptClassification?.terrain?.name || 'Entity',
        promptClassification?.stance?.name || 'Clearing',
        'answer',
        finalAnswer.slice(0, 120),
        graph.clauses.length
      );

    } catch(e) {
      if(streamCard && streamCard.parentNode) streamCard.remove();
      smoothedDiv.innerHTML = epistemicCard('ERROR', e.message, { sublabel: 'helix generation failed' });
    }
    evolveParams(question, allSignals, false, paramSnapshot);
    }

  currentAnswerAbort = null;

  if(resumeReading) {
    appendChat('system', 'Resuming reader…');
    resumeReading();
  }

}


function appendChat(role, text, level) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border)';
  div.dataset.role = role;
  if(role === 'assistant') {
    const cardLevel = level || 'INTERPRETED';
    div.innerHTML = epistemicCard(cardLevel, text);
  } else if(role === 'system') {
    div.style.cssText += ';color:var(--dim);font-size:11px;font-family:var(--mono)';
    div.textContent = '⚙ ' + text;
  } else {
    div.style.cssText += ';color:var(--bright);font-size:13px;font-family:var(--mono)';
    div.textContent = '▸ ' + text;
  }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function updateLastChat(role, text) {
  const el = document.getElementById('chat-messages');
  const msgs = el.querySelectorAll(`div[data-role="${role}"]`);
  if(msgs.length > 0) {
    const labels = { user: '▸ ', assistant: '', system: '⚙ ' };
    msgs[msgs.length-1].textContent = labels[role] + text;
  }
}

// ═══════════════════════════════════════════════════════════
